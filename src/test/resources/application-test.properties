# Propriedades usadas apenas no profile 'test' para evitar uso do ficheiro H2 em disco
# Usa H2 em memÃ³ria para testes isolados
spring.datasource.url=jdbc:h2:mem:efacturacao_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Criar e remover schema entre runs de teste
spring.jpa.hibernate.ddl-auto=create-drop

# Pool mais leve para testes
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# Evitar log muito verboso nos testes
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=ERROR

# Nota: não definir 'spring.profiles.active' dentro de um ficheiro específico de perfil
# spring.profiles.active=test