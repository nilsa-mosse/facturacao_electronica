<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Histórico de Vendas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card-venda {
            border-radius: 10px;
            transition: 0.3s;
        }

        .card-venda:hover {
            transform: scale(1.01);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .total {
            font-size: 18px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h3><i class="fas fa-receipt"></i> Histórico de Vendas</h3>

        <input type="text" id="search" class="form-control w-25" placeholder="Pesquisar...">
    </div>

    <div class="row" id="listaVendas">

        <div class="col-md-6 mb-3" th:each="venda : ${vendas}">
            <div class="card card-venda p-3">

                <div class="d-flex justify-content-between">
                    <div>
                        <h5>Venda #<span th:text="${venda.id}"></span></h5>
                        <small th:text="${venda.data}"></small>
                    </div>

                    <div class="total">
                        <span th:text="${venda.total}"></span> Kz
                    </div>
                </div>

                <hr>

                <ul class="list-group">
                    <li class="list-group-item"
                        th:each="item : ${venda.itens}">
                        
                        <div class="d-flex justify-content-between">
                            <span>
                                <i class="fas fa-box"></i>
                                <span th:text="${item.nome}"></span>
                            </span>

                            <span>
                                <span th:text="${item.qtd}"></span> x 
                                <span th:text="${item.preco}"></span>
                            </span>
                        </div>

                    </li>
                </ul>

            </div>
        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$('#search').on('input', function() {
    let value = $(this).val().toLowerCase();

    $('.card-venda').filter(function() {
        $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
    });
});
</script>

</body>
