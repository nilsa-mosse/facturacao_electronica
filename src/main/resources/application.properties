# Configurações principais do sistema de faturação eletrónica

# Configuração do banco de dados (H2 Embedded - Independente de instalação)
spring.datasource.url=jdbc:h2:file:./data/efacturacao;MODE=MySQL;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Antiga configuração MySQL (Comentada)
# spring.datasource.url=jdbc:mysql://localhost:3306/efacturacao?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL57Dialect

# Configuração do Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Porta do servidor
server.port=8080

# Internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Configuração de upload de arquivos (imagens)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads/produtos/
app.upload.logo.dir=./uploads/logo/

# Configuração de logs
logging.level.org.springframework=INFO
logging.level.ao.co.hzconsultoria=DEBUG

# Configuração de integração AGT (exemplo)
agt.api.url=https://api.agt.gov.ao/facturacao
agt.api.token=SEU_TOKEN_AQUI

# Outras configurações customizadas
app.nome=Sistema de Facturação Eletrónica
app.versao=1.0.0

# Performance tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=60000

# JVM tuning (para produ��o, ajustar conforme recursos)
# -Xms512m
# -Xmx2048m

# Cache
spring.cache.type=simple

# Thymeleaf cache ativado para produ��o
# spring.thymeleaf.cache=true
# Configura��o de Hardware PDV - TPA F�sico
pdv.hardware.tpa.ip=192.168.1.100
pdv.hardware.tpa.porta=9000
pdv.hardware.tpa.usuario=usuario
pdv.hardware.tpa.senha=senha

# Hibernate DDL Management – 'update' cria/altera tabelas automaticamente (incluindo configuracao_sistema)
spring.jpa.hibernate.ddl-auto=update



