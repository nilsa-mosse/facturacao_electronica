# Configurações principais do sistema de faturação eletrónica

# Configuração do banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/efacturacao
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuração do Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Porta do servidor
server.port=8080

# Configuração de upload de arquivos (imagens)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Configuração de logs
logging.level.org.springframework=INFO
logging.level.ao.co.hzconsultoria=DEBUG

# Configuração de integração AGT (exemplo)
agt.api.url=https://api.agt.gov.ao/facturacao
agt.api.token=SEU_TOKEN_AQUI

# Outras configurações customizadas
app.nome=Sistema de Facturação Eletrónica
app.versao=1.0.0

# Performance tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=60000

# JVM tuning (para produ��o, ajustar conforme recursos)
# -Xms512m
# -Xmx2048m

# Cache
spring.cache.type=simple

# Thymeleaf cache ativado para producao
# spring.thymeleaf.cache=true
# Configuracao de Hardware PDV - TPA Fisico
pdv.hardware.tpa.ip=192.168.56.1
pdv.hardware.tpa.porta=8080
pdv.hardware.tpa.usuario=usuario
pdv.hardware.tpa.senha=senha