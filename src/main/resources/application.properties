# ConfiguraĂ§Ă”es principais do sistema de faturaĂ§ĂŁo eletrĂłnica

# ConfiguraĂ§ĂŁo do banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/efacturacao
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ConfiguraĂ§ĂŁo do Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Porta do servidor
server.port=8080

# ConfiguraĂ§ĂŁo de upload de arquivos (imagens)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ConfiguraĂ§ĂŁo de logs
logging.level.org.springframework=INFO
logging.level.ao.co.hzconsultoria=DEBUG

# ConfiguraĂ§ĂŁo de integraĂ§ĂŁo AGT (exemplo)
agt.api.url=https://api.agt.gov.ao/facturacao
agt.api.token=SEU_TOKEN_AQUI

# Outras configuraĂ§Ă”es customizadas
app.nome=Sistema de FacturaĂ§ĂŁo EletrĂłnica
app.versao=1.0.0

# Performance tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=60000

# JVM tuning (para produçăo, ajustar conforme recursos)
# -Xms512m
# -Xmx2048m

# Cache
spring.cache.type=simple

# Thymeleaf cache ativado para produçăo
# spring.thymeleaf.cache=true