# Configurações principais do Kwanza ERP

# Configuração do banco de dados (H2 Embedded - Independente de instalação)
#spring.datasource.url=jdbc:h2:file:./data/efacturacao;MODE=MySQL;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CACHE_SIZE=65536;PAGE_SIZE=1024
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Antiga configuração MySQL (Comentada)
 spring.datasource.url=jdbc:mysql://localhost:3306/efacturacao?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
 spring.datasource.username=root
 spring.datasource.password=root
 spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# 'update' cria tabelas/colunas em falta sem apagar dados existentes
spring.jpa.hibernate.ddl-auto=update
# Flyway desactivado — scripts V2 duplicados causam conflito
spring.flyway.enabled=false
spring.flyway.clean-disabled=true

# Configuração do Thymeleaf (DESATIVADO PARA DESENVOLVIMENTO)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Porta do servidor
server.port=8080
#server.port=80

# Internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Configuração de upload de arquivos (imagens)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads/produtos/
app.upload.logo.dir=./uploads/logo/

# Configuração de logs
logging.level.org.springframework=INFO
logging.level.ao.co.hzconsultoria=DEBUG

# Configuração de integração AGT (exemplo)
agt.api.url=https://api.agt.gov.ao/facturacao
agt.api.token=SEU_TOKEN_AQUI

# Outras configurações customizadas
app.nome=Kwanza ERP
app.versao=1.0.0

# Performance tuning
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.auto-commit=true

# JVM tuning (para produção, ajustar conforme recursos)
# -Xms512m
# -Xmx2048m

# Cache
spring.cache.type=simple

# Thymeleaf cache ativado para produção
# spring.thymeleaf.cache=true
# Configuração de Hardware PDV - TPA Físico
pdv.hardware.tpa.ip=192.168.1.100
pdv.hardware.tpa.porta=9000
pdv.hardware.tpa.usuario=usuario
pdv.hardware.tpa.senha=senha


# Compressao Gzip (Acelera o carregamento das paginas)
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024
