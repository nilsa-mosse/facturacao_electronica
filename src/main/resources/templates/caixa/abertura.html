<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="menu :: head"></head>
<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper d-flex justify-content-center align-items-center" style="min-height: 80vh;">
            <div class="card card-outline card-success shadow-lg" style="width: 100%; max-width: 500px; border-radius: 15px;">
                <div class="card-header text-center border-0 pt-4 pb-0">
                    <div class="mx-auto bg-success text-white rounded-circle d-flex align-items-center justify-content-center mb-3 shadow" style="width: 80px; height: 80px;">
                        <i class="fas fa-box-open fa-2x"></i>
                    </div>
                    <h3 class="card-title w-100 fw-bold fs-4">Abertura de Caixa</h3>
                    <p class="text-muted small">Inicie o seu turno informando o fundo de maneio</p>
                </div>
                
                <div class="card-body">
                    <div th:if="${mensagem_erro}" class="alert alert-danger shadow-sm rounded-3">
                        <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${mensagem_erro}"></span>
                    </div>

                    <form th:action="@{/caixa/abrir}" method="post">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted"><i class="fas fa-money-bill-wave me-1"></i> Fundo de Maneio (Saldo Inicial)</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-light border-end-0">AKZ</span>
                                <input type="number" step="0.01" min="0" class="form-control border-start-0 ps-0 form-control-lg fw-bold" name="saldoInicial" value="0.00" required>
                            </div>
                            <small class="text-muted d-block mt-2">Valor em numerário atualmente gaveta do caixa.</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted"><i class="fas fa-comment-alt me-1"></i> Observações (Opcional)</label>
                            <textarea class="form-control" name="observacoes" rows="2" placeholder="Ex: Falta de trocos de 50 kzs..."></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg rounded-pill shadow-sm fw-bold">
                                <i class="fas fa-check-circle me-2"></i> Confirmar Abertura
                            </button>
                            <a th:href="@{/home}" class="btn btn-light rounded-pill">Voltar ao Início</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
