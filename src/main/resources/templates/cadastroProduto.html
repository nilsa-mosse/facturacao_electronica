<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <th:block th:replace="menu :: head"></th:block>
  <style>
    :root {
      --primary: #4361ee;
      --primary-soft: rgba(67, 97, 238, 0.1);
      --dark: #0f172a;
      --light: #f8fafc;
      --glass: rgba(255, 255, 255, 0.9);
      --text-muted: #64748b;
    }

    body.dark-mode {
      --light: #0f172a;
      --glass: rgba(15, 23, 42, 0.8);
      --bg: #0f172a;
      --dark: #f8fafc;
    }

    .content-wrapper {
      background: var(--light);
      padding: 30px;
    }

    .page-header {
      background: linear-gradient(135deg, var(--primary) 0%, #3a0ca3 100%);
      border-radius: 24px;
      padding: 40px;
      color: white;
      margin-bottom: 40px;
      box-shadow: 0 20px 40px rgba(67, 97, 238, 0.15);
      position: relative;
      overflow: hidden;
    }

    .page-header::after {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
    }

    .form-card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      border: none;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.05);
      padding: 50px;
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 2px;
      background: #f1f5f9;
      border-radius: 2px;
    }

    .form-label {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 10px;
      color: #334155;
    }

    .input-premium {
      border-radius: 16px;
      border: 2px solid #e2e8f0;
      padding: 16px 20px;
      transition: all 0.3s;
      background: #f8fafc;
      font-size: 1rem;
      font-weight: 500;
    }

    .input-premium:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px var(--primary-soft);
      outline: none;
    }

    .input-group-premium {
      position: relative;
    }

    .input-group-premium i {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      transition: color 0.3s;
      font-size: 1.1rem;
    }

    .input-group-premium .form-control,
    .input-group-premium .form-select {
      padding-left: 55px;
    }

    .input-group-premium:focus-within i {
      color: var(--primary);
    }

    /* File Upload Styling */
    .file-upload-wrapper {
      position: relative;
      border: 2px dashed #cbd5e1;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      background: #f8fafc;
      transition: all 0.3s;
      cursor: pointer;
    }

    .file-upload-wrapper:hover {
      border-color: var(--primary);
      background: var(--primary-soft);
      transform: translateY(-2px);
    }

    .file-upload-wrapper input[type="file"] {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      opacity: 0;
      cursor: pointer;
    }

    .btn-submit {
      background: linear-gradient(135deg, var(--primary) 0%, #3a0ca3 100%);
      color: white;
      border: none;
      padding: 20px 50px;
      border-radius: 18px;
      font-weight: 800;
      font-size: 1.1rem;
      transition: all 0.3s;
      box-shadow: 0 10px 25px rgba(67, 97, 238, 0.25);
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(67, 97, 238, 0.35);
      color: white;
    }

    .fw-900 {
      font-weight: 900 !important;
    }

    .fw-800 {
      font-weight: 800 !important;
    }

    .fw-700 {
      font-weight: 700 !important;
    }

    /* Fix dark mode colors */
    body.dark-mode .form-card {
      background: var(--glass);
    }

    body.dark-mode .form-label {
      color: #e2e8f0;
    }

    body.dark-mode .input-premium {
      background: #1e293b;
      border-color: #334155;
      color: white;
    }

    body.dark-mode .input-premium:focus {
      background: #0f172a;
      border-color: var(--primary);
    }

    body.dark-mode .file-upload-wrapper {
      background: #1e293b;
      border-color: #334155;
    }

    body.dark-mode .section-title::after {
      background: #334155;
    }
  </style>
</head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
  <div class="wrapper">
    <nav th:replace="menu :: topbar"></nav>
    <aside th:replace="menu :: sidebar" class="main-sidebar"></aside>

    <div class="content-wrapper">
      <div class="container-fluid">

        <!-- Header Section -->
        <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-4">
          <div>
            <span class="badge bg-white text-primary rounded-pill px-3 py-2 fw-800 mb-3 shadow-sm">
              <i class="fas fa-box-open me-1"></i> GESTÃO COMERCIAL
            </span>
            <h1 class="fw-900 mb-2" style="font-size: 2.5rem; letter-spacing: -1px;">Novo Artigo</h1>
            <p class="opacity-75 mb-0 fs-5">Cadastre os seus produtos de forma inteligente e segura no catálogo.</p>
          </div>
          <div>
            <a href="/produtos/listar" class="btn btn-white btn-lg fw-800 px-4 py-3 rounded-4 shadow-lg text-primary">
              <i class="fas fa-list me-2"></i> VER CATÁLOGO
            </a>
          </div>
        </div>

        <div th:if="${mensagem}"
          class="alert alert-success border-0 rounded-4 shadow-sm p-4 d-flex align-items-center gap-3 mb-4">
          <i class="fas fa-check-circle fa-2x"></i>
          <span th:text="${mensagem}" class="fw-800 fs-5"></span>
        </div>

        <div th:if="${erro}"
          class="alert alert-danger border-0 rounded-4 shadow-sm p-4 d-flex align-items-center gap-3 mb-4">
          <i class="fas fa-exclamation-triangle fa-2x"></i>
          <span th:text="${erro}" class="fw-800 fs-5"></span>
        </div>

        <div class="form-card">
          <form th:action="@{/salvarProduto}" method="post" enctype="multipart/form-data">

            <div class="row g-5">
              <!-- COLUNA ESQUERDA -->
              <div class="col-lg-6">
                <!-- Identificação Section -->
                <div class="section-title">
                  <i class="fas fa-tag"></i> Identificação do Produto
                </div>

                <div class="row g-4 mb-5">
                  <div class="col-12">
                    <label class="form-label">Nome Completo do Artigo</label>
                    <div class="input-group-premium">
                      <i class="fas fa-cube"></i>
                      <input type="text" name="nome" class="form-control input-premium"
                        th:placeholder="#{produto.placeholder.nome}" required>
                    </div>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Categoria do Artigo</label>
                    <div class="input-group-premium">
                      <i class="fas fa-folder-open"></i>
                      <select name="categoriaId" class="form-select input-premium" required>
                        <option value="" th:text="#{produto.selecione_categoria}">Selecione a categoria</option>
                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nome}"></option>
                      </select>
                    </div>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Descrição Detalhada</label>
                    <textarea name="descricao" class="form-control input-premium" rows="5"
                      th:placeholder="#{produto.placeholder.descricao}"></textarea>
                  </div>
                </div>

                <!-- Logística Section -->
                <div class="section-title">
                  <i class="fas fa-barcode"></i> Logística e Controlo
                </div>
                <div class="row g-4 mb-4">
                  <div class="col-sm-6">
                    <label class="form-label">Stock Inicial</label>
                    <div class="input-group-premium">
                      <i class="fas fa-layer-group"></i>
                      <input type="number" name="quantidadeEstoque" class="form-control input-premium" placeholder="0"
                        required>
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Contagem (Unidade)</label>
                    <div class="input-group-premium">
                      <i class="fas fa-boxes"></i>
                      <select name="unidadeMedida" class="form-select input-premium">
                        <option value="Unidade (UN)"
                          th:selected="${produto != null and produto.unidadeMedida == 'Unidade (UN)'}">Unidade (UN)
                        </option>
                        <option value="Peça (PÇ)"
                          th:selected="${produto != null and produto.unidadeMedida == 'Peça (PÇ)'}">Peça (PÇ)</option>
                        <option value="Item" th:selected="${produto != null and produto.unidadeMedida == 'Item'}">Item
                        </option>
                        <option value="Caixa" th:selected="${produto != null and produto.unidadeMedida == 'Caixa'}">
                          Caixa</option>
                        <option value="Pacote" th:selected="${produto != null and produto.unidadeMedida == 'Pacote'}">
                          Pacote</option>
                      </select>
                    </div>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Código (SKU/EAN)</label>
                    <div class="input-group-premium">
                      <i class="fas fa-barcode"></i>
                      <input type="text" name="codigoBarra" class="form-control input-premium"
                        placeholder="ex: 789123...">
                    </div>
                  </div>
                </div>
              </div>

              <!-- COLUNA DIREITA -->
              <div class="col-lg-6">
                <!-- Finanças & Impostos Section -->
                <div class="section-title">
                  <i class="fas fa-coins"></i> Preços e Fiscalidade
                </div>
                <div class="row g-4 mb-5">
                  <div class="col-sm-4">
                    <label class="form-label">Preço de Compra (Kz)</label>
                    <div class="input-group-premium">
                      <i class="fas fa-shopping-basket"></i>
                      <input type="number" step="0.01" name="precoCompra" class="form-control input-premium"
                        placeholder="0.00">
                    </div>
                  </div>
                  <div class="col-sm-4">
                    <label class="form-label">Preço de Venda (Kz)</label>
                    <div class="input-group-premium">
                      <i class="fas fa-wallet"></i>
                      <input type="number" step="0.01" name="preco" class="form-control input-premium"
                        placeholder="0.00" required>
                    </div>
                  </div>
                  <div class="col-sm-4">
                    <label class="form-label">Taxa de IVA (%) <span
                        class="badge bg-light text-muted ms-1"></span></label>
                    <div class="input-group-premium">
                      <i class="fas fa-percent"></i>
                      <select name="ivaPercentual" class="form-select input-premium">
                        <option value="0">Isento / Não Aplicável</option>
                        <!-- Regime Geral -->
                        <th:block th:if="${regimeFiscal == 'GERAL'}">
                          <option th:each="imp : ${impostos}"
                            th:if="${imp.percentagem != null and (imp.percentagem.floatValue() == 14.0 or imp.percentagem.floatValue() == 1.0)}"
                            th:value="${imp.percentagem}" th:text="${imp.nome} + ' (' + ${imp.percentagem} + '%)'">
                          </option>
                        </th:block>
















                        <!-- Regime Simplificado -->
                        <th:block th:if="${regimeFiscal == 'SIMPLIFICADO'}">
                          <option th:each="imp : ${impostos}"
                            th:if="${imp.percentagem != null and (imp.percentagem.floatValue() == 7.0 or imp.percentagem.floatValue() == 1.0)}"
                            th:value="${imp.percentagem}" th:text="${imp.nome} + ' (' + ${imp.percentagem} + '%)'">
                          </option>
                        </th:block>

                        <!-- Regime de Exclusão -->
                        <th:block th:if="${regimeFiscal == 'EXCLUSAO' or regimeFiscal == 'Regime de Exclusão'}">
                          <option th:each="imp : ${impostos}"
                            th:if="${imp.percentagem != null and (imp.percentagem.doubleValue() == 1.0)}"
                            th:value="${imp.percentagem}" th:text="${imp.nome} + ' (' + ${imp.percentagem} + '%)'">
                          </option>
                        </th:block>
                      </select>
                    </div>
                  </div>
                </div>

                <!-- Datas de Validade Section -->
                <div class="section-title">
                  <i class="fas fa-calendar-alt"></i> Validade e Segurança
                </div>
                <div class="row g-4 mb-5">
                  <div class="col-sm-6">
                    <label class="form-label text-info">Data de Fabrico</label>
                    <div class="input-group-premium">
                      <i class="fas fa-calendar-day text-info"></i>
                      <input type="date" name="dataFabrico" class="form-control input-premium border-info-subtle">
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label text-danger">Data de Expiração</label>
                    <div class="input-group-premium">
                      <i class="fas fa-calendar-times text-danger"></i>
                      <input type="date" name="dataExpiracao" class="form-control input-premium border-danger-subtle">
                    </div>
                  </div>
                </div>

                <!-- Fotografia Section -->
                <div class="section-title">
                  <i class="fas fa-image"></i> Fotografia do Produto
                </div>
                <div class="row g-4 mb-4">
                  <div class="col-12">
                    <div class="file-upload-wrapper" style="padding: 30px;">
                      <i class="fas fa-cloud-upload-alt fa-3x mb-3 text-primary opacity-50"></i>
                      <h6 class="fw-800 text-dark mb-2">Arraste a imagem ou clique</h6>
                      <p class="text-muted small mb-0">PNG, JPG, WEBP (Max: 5MB)</p>
                      <input type="file" name="imagem" accept="image/*" onchange="previewFile(this)">
                    </div>
                    <div id="fileName"
                      class="text-center mt-3 fw-bold text-primary px-4 py-2 bg-primary-soft rounded-pill"
                      style="display: none;"></div>
                  </div>
                </div>
              </div>
            </div>

            <hr class="my-4 border-light">

            <div class="d-flex justify-content-end gap-3">
              <a href="/produtos/listar" class="btn btn-light px-5 py-3 rounded-4 fw-800 text-muted">
                CANCELAR
              </a>
              <button type="submit" class="btn btn-submit">
                CADASTRAR PRODUTO NO CATÁLOGO <i class="fas fa-arrow-right ms-2"></i>
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    function previewFile(input) {
      const fileNameDiv = document.getElementById('fileName');
      if (input.files && input.files[0]) {
        fileNameDiv.textContent = "✓ " + input.files[0].name;
        fileNameDiv.style.setProperty('display', 'inline-block', 'important');
      }
    }
  </script>
</body>

</html>
