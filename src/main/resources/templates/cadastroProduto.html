<head th:replace="menu :: head"></head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <aside th:replace="menu :: sidebar"></aside>
    <main class="py-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title" th:text="#{produto.cadastro.titulo}">Cadastro de Produto</h3>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/salvarProduto}" method="post" enctype="multipart/form-data">
                                <div class="form-group mb-3">
                                    <label for="nome" class="form-label" th:text="#{produto.nome}">Nome:</label>
                                    <input type="text" name="nome" id="nome" class="form-control"
                                        th:placeholder="#{produto.placeholder.nome}" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="descricao" class="form-label" th:text="#{produto.descricao}">Descrição:</label>
                                    <textarea name="descricao" id="descricao" class="form-control" rows="3"
                                        th:placeholder="#{produto.placeholder.descricao}"></textarea>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="preco" class="form-label" th:text="#{produto.preco}">Preço:</label>
                                    <input type="number" step="0.01" name="preco" id="preco" class="form-control"
                                        th:placeholder="#{produto.placeholder.preco}" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="quantidadeEstoque" class="form-label" th:text="#{produto.estoque}">Estoque:</label>
                                    <input type="number" name="quantidadeEstoque" id="quantidadeEstoque"
                                        class="form-control" th:placeholder="#{produto.placeholder.estoque}" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="codigoBarra" class="form-label" th:text="#{produto.codigo_barra}">Código de Barras:</label>
                                    <input type="text" name="codigoBarra" id="codigoBarra" class="form-control"
                                        th:placeholder="#{produto.placeholder.codigo_barra}" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="imagem" class="form-label" th:text="#{produto.imagem}">Imagem:</label>
                                    <input type="file" name="imagem" id="imagem" class="form-control">
                                </div>
                                <div class="form-group mb-3">
                                    <label for="categoriaId" class="form-label" th:text="#{produto.categoria}">Categoria:</label>
                                    <select name="categoriaId" id="categoriaId" class="form-select" required>
                                        <option value="" th:text="#{produto.selecione_categoria}">Selecione a categoria</option>
                                        <option th:each="cat : ${categorias}" th:value="${cat.id}"
                                            th:text="${cat.nome}"></option>
                                    </select>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="ivaPercentual" class="form-label" th:text="#{produto.iva}">IVA (%):</label>
                                    <input type="number" step="0.01" min="0" max="100" name="ivaPercentual"
                                        id="ivaPercentual" class="form-control"
                                        th:placeholder="#{produto.placeholder.iva}">
                                    <small class="form-text text-muted" th:text="#{produto.ajuda.iva}">Preencha apenas se o produto possuir
                                        IVA.</small>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 mt-3" th:text="#{produto.btn.cadastrar}">Cadastrar Produto</button>
                            </form>
                            <div th:if="${mensagem}" class="alert alert-success mt-3" th:text="${mensagem}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
