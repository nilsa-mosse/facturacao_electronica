<head th:replace="menu :: head"></head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <aside th:replace="menu :: sidebar"></aside>
    <main class="py-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Cadastro de Produto</h3>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/salvarProduto}" method="post" enctype="multipart/form-data">
                                <div class="form-group mb-3">
                                    <label for="nome" class="form-label">Nome:</label>
                                    <input type="text" name="nome" id="nome" class="form-control"
                                        placeholder="Digite o nome do produto" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="descricao" class="form-label">Descrição:</label>
                                    <textarea name="descricao" id="descricao" class="form-control" rows="3"
                                        placeholder="Digite a descrição do produto"></textarea>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="preco" class="form-label">Preço:</label>
                                    <input type="number" step="0.01" name="preco" id="preco" class="form-control"
                                        placeholder="Digite o preço" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="quantidadeEstoque" class="form-label">Estoque:</label>
                                    <input type="number" name="quantidadeEstoque" id="quantidadeEstoque"
                                        class="form-control" placeholder="Digite a quantidade em estoque" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="codigoBarra" class="form-label">Código de Barras:</label>
                                    <input type="text" name="codigoBarra" id="codigoBarra" class="form-control"
                                        placeholder="Digite o código de barras" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="imagem" class="form-label">Imagem:</label>
                                    <input type="file" name="imagem" id="imagem" class="form-control">
                                </div>
                                <div class="form-group mb-3">
                                    <label for="categoriaId" class="form-label">Categoria:</label>
                                    <select name="categoriaId" id="categoriaId" class="form-select" required>
                                        <option value="">Selecione a categoria</option>
                                        <option th:each="cat : ${categorias}" th:value="${cat.id}"
                                            th:text="${cat.nome}"></option>
                                    </select>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="ivaPercentual" class="form-label">IVA (%):</label>
                                    <input type="number" step="0.01" min="0" max="100" name="ivaPercentual"
                                        id="ivaPercentual" class="form-control"
                                        placeholder="Digite o IVA em % (opcional)">
                                    <small class="form-text text-muted">Preencha apenas se o produto possuir
                                        IVA.</small>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 mt-3">Cadastrar Produto</button>
                            </form>
                            <div th:if="${mensagem}" class="alert alert-success mt-3" th:text="${mensagem}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
