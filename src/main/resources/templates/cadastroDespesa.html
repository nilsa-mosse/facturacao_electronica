<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Despesa</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
        crossorigin="anonymous">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous">

    <style>
        .form-card {
            max-width: 600px;
            margin: 40px auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .form-card-header {
            background-color: #dc3545;
            color: #fff;
            padding: 1.5rem;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            text-align: center;
        }
    </style>
</head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <section class="content py-4">
                <div class="container-fluid">
                    <div class="card form-card">
                        <div class="form-card-header">
                            <h3 class="fw-bold mb-0">Cadastro de Despesa</h3>
                        </div>
                        <div class="card-body p-4">
                            <form th:action="${despesa.id == null} ? @{/despesas/adicionar} : @{/despesas/atualizar}" 
                                  th:object="${despesa}" method="POST">
                                <input type="hidden" th:field="*{id}" />

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Descrição</label>
                                    <input type="text" class="form-control" th:field="*{descricao}" placeholder="Ex: Renda Mensal, Energia, Salários..." required>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Valor (Kz)</label>
                                        <input type="number" step="0.01" class="form-control" th:field="*{valor}" placeholder="0.00" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Data</label>
                                        <input type="date" class="form-control" th:field="*{dataDespesa}" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Categoria</label>
                                        <select class="form-select" th:field="*{categoria}">
                                            <option value="Operacional">Operacional</option>
                                            <option value="Administrativa">Administrativa</option>
                                            <option value="Manutenção">Manutenção</option>
                                            <option value="Impostos">Impostos</option>
                                            <option value="Outros">Outros</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Estado</label>
                                        <select class="form-select" th:field="*{status}">
                                            <option value="PENDENTE">Pendente</option>
                                            <option value="PAGO">Pago</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="d-grid gap-2 mt-4">
                                    <button type="submit" class="btn btn-danger py-2 fw-bold">
                                        <i class="fas fa-save me-1"></i> Salvar Despesa
                                    </button>
                                    <a th:href="@{/despesas/listar}" class="btn btn-outline-secondary">
                                        Cancelar
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
