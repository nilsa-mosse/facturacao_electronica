<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="menu :: head"></head>
<body class="hold-transition sidebar-mini layout-fixed">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <section class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1>Categorias de Produtos</h1>
                        </div>
                        <div class="col-sm-6 text-right">
                            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCadastro">
                                <i class="fas fa-plus"></i> Nova Categoria
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="content">
                <div class="container-fluid">
                    <div class="card card-outline card-primary shadow-sm">
                        <div class="card-body p-0">
                            <table class="table table-hover table-striped mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th style="width: 80px">ID</th>
                                        <th>Nome da Categoria</th>
                                        <th style="width: 150px" class="text-center">Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="cat : ${categorias}">
                                        <td th:text="${cat.id}"></td>
                                        <td th:text="${cat.nome}" class="font-weight-bold"></td>
                                        <td class="text-center">
                                            <button class="btn btn-sm btn-info" title="Editar"><i class="fas fa-edit"></i></button>
                                            <button class="btn btn-sm btn-danger" title="Eliminar"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(categorias)}">
                                        <td colspan="3" class="text-center py-4 text-muted">
                                            Nenhuma categoria encontrada.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Modal Cadastro -->
        <div class="modal fade" id="modalCadastro" tabindex="-1" aria-labelledby="modalCadastroLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="modalCadastroLabel"><i class="fas fa-tag"></i> Cadastrar Nova Categoria</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="formCategoria">
                        <div class="modal-body">
                            <div class="form-group">
                                <label for="nome">Nome da Categoria</label>
                                <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: Bebidas, Limpeza..." required>
                                <small class="text-muted">Este nome será exibido no cadastro de produtos.</small>
                            </div>
                        </div>
                        <div class="modal-footer bg-light">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary px-4">Gravar Categoria</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <footer th:replace="menu :: footer"></footer>
    </div>

    <script th:inline="javascript">
        $(document).ready(function() {
            // Configurar CSRF para AJAX
            const token = $("meta[name='_csrf']").attr("content");
            const header = $("meta[name='_csrf_header']").attr("content");

            $('#formCategoria').on('submit', function(e) {
                e.preventDefault();
                
                const categoria = {
                    nome: $('#nome').val()
                };

                $.ajax({
                    url: '/api/categorias',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(categoria),
                    beforeSend: function(xhr) {
                        if (header && token) {
                            xhr.setRequestHeader(header, token);
                        }
                    },
                    success: function(response) {
                        alert('Categoria cadastrada com sucesso!');
                        location.reload();
                    },
                    error: function(xhr) {
                        if (xhr.status === 403) {
                            alert('Erro de permissão (CSRF). Por favor, recarregue a página.');
                        } else {
                            alert('Erro ao cadastrar categoria: ' + (xhr.responseText || 'Erro desconhecido'));
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
