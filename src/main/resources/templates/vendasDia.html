<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10 mb-4">
                <div class="card shadow-lg border-0 overflow-hidden">
                    <div class="grad-success p-4 d-flex align-items-center justify-content-between text-white">
                        <div class="d-flex align-items-center">
                            <i class="fas fa-cash-register fa-2x me-3"></i>
                            <h2 class="mb-0 fw-bold" th:text="#{dashboard.vendas_dia.titulo}">Vendas do Dia</h2>
                        </div>
                        <div class="text-end">
                            <h3 class="mb-0 fw-bold" th:text="${#numbers.formatDecimal(totalVendasDia, 1, 'COMMA', 2, 'POINT')} + ' Kz'">0,00 Kz</h3>
                        </div>
                    </div>
                    
                    <div class="card-body p-4">
                        <div class="mb-4">
                            <a th:href="@{/dashboard}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-2"></i> <span th:text="#{btn.voltar}">Voltar</span>
                            </a>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light text-muted">
                                    <tr>
                                        <th class="border-0 ps-4" th:text="#{vendas.col.id}">ID</th>
                                        <th class="border-0" th:text="#{vendas.col.data}">Data</th>
                                        <th class="border-0 text-end pe-4" th:text="#{vendas.col.total}">Total</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="venda : ${vendasDoDia}">
                                        <td class="ps-4 fw-bold text-success" th:text="'#' + ${venda.id}">#1</td>
                                        <td>
                                            <i class="far fa-calendar-alt text-muted me-2"></i>
                                            <span th:text="${#temporals.format(venda.dataCompra, 'dd/MM/yyyy HH:mm')}">20/03/2026</span>
                                        </td>
                                        <td class="text-end pe-4 fw-bold"
                                            th:text="${#numbers.formatDecimal(venda.total, 1, 'COMMA', 2, 'POINT').replace('.', ',').replace(',', '.')} + ' Kz'">
                                            0,00 Kz</td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(vendasDoDia)}">
                                        <td colspan="3" class="text-center py-5 text-muted">
                                            <i class="fas fa-search mb-3 fa-3x d-block opacity-25"></i>
                                            <span th:text="#{clientes.historico.vazio}">Nenhuma venda realizada hoje.</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
