<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
        crossorigin="anonymous">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous">

    <style>
        .summary-card {
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .summary-card:hover {
            transform: translateY(-5px);
        }

        .badge-entrada {
            background-color: #28a745;
            color: white;
        }

        .badge-saida {
            background-color: #dc3545;
            color: white;
        }

        .text-entrada {
            color: #28a745 !important;
        }

        .text-saida {
            color: #dc3545 !important;
        }
    </style>
</head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <section class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="fw-bold"><i class="fas fa-file-invoice-dollar me-2"></i> Fluxo de Caixa</h1>
                        </div>
                    </div>
                </div>
            </section>

            <section class="content">
                <div class="container-fluid">
                    <!-- Filtros -->
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <form th:action="@{/financeiro/fluxo-caixa}" method="GET" class="row g-3 align-items-end">
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Data Início</label>
                                    <input type="date" name="inicio" th:value="${inicio}" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Data Fim</label>
                                    <input type="date" name="fim" th:value="${fim}" class="form-control">
                                </div>
                                <div class="col-md-4 d-flex gap-2">
                                    <button type="submit" class="btn btn-primary flex-grow-1">
                                        <i class="fas fa-filter me-1"></i> Filtrar
                                    </button>
                                    <a th:href="@{/financeiro/fluxo-caixa/pdf(inicio=${inicio}, fim=${fim})}" class="btn btn-danger">
                                        <i class="fas fa-file-pdf me-1"></i> PDF
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Cards de Resumo -->
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="small-box bg-success shadow-sm summary-card">
                                <div class="inner">
                                    <h4 th:text="${'Kz ' + #numbers.formatDecimal(totalEntradas, 1, 'COMMA', 2, 'POINT').replace('.', ',').replace(',', '.')}">
                                        Kz 0,00</h4>
                                    <p class="fw-bold">Total de Entradas</p>
                                </div>
                                <div class="icon">
                                    <i class="fas fa-arrow-up"></i>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="small-box bg-danger shadow-sm summary-card">
                                <div class="inner">
                                    <h4 th:text="${'Kz ' + #numbers.formatDecimal(totalSaidas, 1, 'COMMA', 2, 'POINT').replace('.', ',').replace(',', '.')}">
                                        Kz 0,00</h4>
                                    <p class="fw-bold">Total de Saídas</p>
                                </div>
                                <div class="icon">
                                    <i class="fas fa-arrow-down"></i>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="small-box shadow-sm summary-card" 
                                 th:classappend="${saldoConsolidado >= 0 ? 'bg-info' : 'bg-warning'}">
                                <div class="inner">
                                    <h4 th:text="${'Kz ' + #numbers.formatDecimal(saldoConsolidado, 1, 'COMMA', 2, 'POINT').replace('.', ',').replace(',', '.')}">
                                        Kz 0,00</h4>
                                    <p class="fw-bold">Saldo Consolidado</p>
                                </div>
                                <div class="icon">
                                    <i class="fas fa-balance-scale"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Tabela de Movimentações -->
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white py-3">
                            <h3 class="card-title fw-bold">Extrato de Movimentações</h3>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Data / Hora</th>
                                            <th>Descrição</th>
                                            <th>Categoria</th>
                                            <th>Tipo</th>
                                            <th class="text-end pe-4">Valor (Kz)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="mov : ${movimentacoes}">
                                            <td th:text="${#temporals.format(mov.data, 'dd/MM/yyyy HH:mm')}"></td>
                                            <td th:text="${mov.descricao}"></td>
                                            <td th:text="${mov.categoria}"></td>
                                            <td>
                                                <span class="badge px-3 py-2" 
                                                      th:classappend="${mov.tipo == 'ENTRADA' ? 'badge-entrada' : 'badge-saida'}"
                                                      th:text="${mov.tipo}"></span>
                                            </td>
                                            <td class="text-end pe-4 fw-bold"
                                                th:classappend="${mov.tipo == 'ENTRADA' ? 'text-entrada' : 'text-saida'}"
                                                th:text="${(mov.tipo == 'SAIDA' ? '- ' : '+ ') + #numbers.formatDecimal(mov.valor, 1, 'COMMA', 2, 'POINT').replace('.', ',').replace(',', '.')}">
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(movimentacoes)}">
                                            <td colspan="5" class="text-center py-5 bg-light">
                                                <i class="fas fa-info-circle me-2"></i>Nenhuma movimentação financeira registrada.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
