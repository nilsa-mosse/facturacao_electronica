<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head">
    <title>Nova Factura - PDV Premium</title>
</head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <!-- Topbar e Sidebar -->
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <!-- Content Wrapper -->
        <div class="content-wrapper bg-light">
            <div class="container-fluid px-3 py-3">
                
                <div class="row pt-2">
                    <!-- COLUNA ESQUERDA: CATÁLOGO DE PRODUTOS -->
                    <div class="col-lg-8">
                        <div class="card shadow-sm border-0 mb-3">
                            <div class="card-body p-3">
                                <div class="row align-items-center">
                                    <div class="col-md-6">
                                        <div class="input-group shadow-sm border rounded-pill overflow-hidden">
                                            <span class="input-group-text bg-white border-0"><i class="fas fa-search text-muted"></i></span>
                                            <input type="text" id="productSearch" class="form-control border-0 ps-0" 
                                                   placeholder="Pesquisar produto por nome ou código..." onkeyup="filterProducts()">
                                        </div>
                                    </div>
                                    <div class="col-md-6 mt-2 mt-md-0">
                                        <div class="d-flex gap-2 overflow-auto pb-1" id="categoryFilters">
                                            <button class="btn btn-sm btn-white border shadow-sm rounded-pill px-3 active-category" 
                                                    onclick="filterByCategory(null, this)">Todos</button>
                                            <button th:each="cat : ${categorias}" 
                                                    class="btn btn-sm btn-white border shadow-sm rounded-pill px-3"
                                                    th:text="${cat.nome}"
                                                    th:onclick="'filterByCategory(' + ${cat.id} + ', this)'"></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Grid de Produtos -->
                        <div class="row g-3" id="productGrid">
                            <div th:each="prod : ${produtos}" class="col-md-4 col-sm-6 product-item" 
                                 th:data-category="${prod.categoria != null ? prod.categoria.id : 'none'}"
                                 th:data-name="${#strings.toLowerCase(prod.nome)}"
                                 th:data-code="${prod.codigoBarra}">
                                <div class="card h-100 border-0 shadow-sm position-relative product-card" 
                                     th:onclick="'addToCart(' + ${prod.id} + ')'">
                                    <div class="card-body p-3 text-center">
                                        <div class="mb-3 rounded bg-light d-flex align-items-center justify-content-center" style="height: 120px;">
                                            <i class="fas fa-box fa-3x text-secondary opacity-25"></i>
                                        </div>
                                        <h6 class="fw-bold mb-1 text-truncate" th:text="${prod.nome}">Produto</h6>
                                        <p class="small text-muted mb-2" th:text="${prod.categoria != null ? prod.categoria.nome : 'Sem Categoria'}">Categoria</p>
                                        <div class="d-flex justify-content-between align-items-center mt-auto">
                                            <span class="fw-800 text-primary" th:text="${#numbers.formatDecimal(prod.preco, 1, 'POINT', 2, 'COMMA')} + ' Kz'">0,00 Kz</span>
                                            <button class="btn btn-xs btn-primary rounded-circle p-2">
                                                <i class="fas fa-plus"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- COLUNA DIREITA: CARRINHO / CHECKOUT -->
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-lg sticky-top" style="top: 80px; height: calc(100vh - 120px); display: flex; flex-direction: column;">
                            <div class="card-header bg-white border-bottom py-3">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h5 class="mb-0 fw-800"><i class="fas fa-shopping-cart me-2 text-success"></i> Carrinho</h5>
                                    <button class="btn btn-soft-danger btn-sm rounded-pill" onclick="clearCart()">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <!-- Selecção de Cliente -->
                            <div class="p-3 border-bottom bg-light">
                                <label class="small fw-bold text-muted text-uppercase mb-1">Cliente / NIF</label>
                                <select id="clientSelect" class="form-select border-0 shadow-sm rounded-pill" onchange="setClient(this.value)">
                                    <option value="">Consumidor Final</option>
                                    <option th:each="cli : ${clientes}" th:value="${cli.id}" th:text="${cli.nome} + ' (' + ${cli.nif} + ')'"
                                            th:selected="${carrinho.cliente != null && carrinho.cliente.id == cli.id}"></option>
                                </select>
                            </div>

                            <!-- Lista de Itens do Carrinho -->
                            <div class="card-body p-0 overflow-auto flex-grow-1" id="cartItems">
                                <div th:if="${#lists.isEmpty(carrinho.itens)}" class="text-center py-5 text-muted invisible-empty">
                                    <i class="fas fa-shopping-basket fa-3x mb-3 opacity-25"></i>
                                    <p>O carrinho está vazio.</p>
                                </div>
                                <table th:if="${!#lists.isEmpty(carrinho.itens)}" class="table table-hover align-middle mb-0">
                                    <tbody>
                                        <tr th:each="item : ${carrinho.itens}">
                                            <td class="ps-3">
                                                <div class="d-flex flex-column">
                                                    <span class="fw-bold small" th:text="${item.produto.nome}">Produto</span>
                                                    <small class="text-muted" th:text="${#numbers.formatDecimal(item.produto.preco, 1, 'POINT', 2, 'COMMA')} + ' Kz'"></small>
                                                </div>
                                            </td>
                                            <td width="80px">
                                                <input type="number" class="form-control form-control-sm border-0 bg-light text-center rounded-pill" 
                                                       th:value="${item.quantidade}" min="1" th:onchange="'updateQty(' + ${item.produto.id} + ', this.value)'">
                                            </td>
                                            <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(item.precoTotal, 1, 'POINT', 2, 'COMMA')} + ' Kz'"></td>
                                            <td class="pe-3 text-end">
                                                <button class="btn btn-link btn-sm text-danger p-0" th:onclick="'removeFromCart(' + ${item.produto.id} + ')'">
                                                    <i class="fas fa-times-circle"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <!-- Resumo e Botão Finalizar -->
                            <div class="card-footer bg-white border-top p-3 mt-auto">
                                <div class="d-flex justify-content-between mb-2">
                                    <span class="text-muted">Subtotal</span>
                                    <span class="fw-bold" id="cartSubtotal" th:text="${#numbers.formatDecimal(carrinho.itens.stream().mapToDouble(i -> i.precoTotal).sum(), 1, 'POINT', 2, 'COMMA')} + ' Kz'">0,00 Kz</span>
                                </div>
                                <div class="d-flex justify-content-between mb-2 text-primary">
                                    <span class="small font-weight-bold">Impostos (IVA 14%)</span>
                                    <span class="small fw-bold" id="cartTaxes">Incluso</span>
                                </div>
                                <hr class="my-2">
                                <div class="d-flex justify-content-between mb-3">
                                    <h5 class="fw-800 mb-0">Total</h5>
                                    <h5 class="fw-800 mb-0 text-success" id="cartTotal" th:text="${#numbers.formatDecimal(carrinho.itens.stream().mapToDouble(i -> i.precoTotal).sum(), 1, 'POINT', 2, 'COMMA')} + ' Kz'">0,00 Kz</h5>
                                </div>
                                <button class="btn btn-success w-100 py-3 fw-bold rounded-pill shadow" onclick="finalizeSale()">
                                    <i class="fas fa-cash-register me-2"></i> FINALIZAR VENDA
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modais e Scripts Complementares -->
    <style>
        .product-card { cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent !important; }
        .product-card:hover { transform: translateY(-3px); border-color: #007bff !important; }
        .active-category { background: #007bff !important; color: white !important; border-color: #007bff !important; }
        .btn-soft-danger { background: rgba(220, 53, 69, 0.1); color: #dc3545; }
        .invisible-empty { display: none; }
        #cartItems:empty + .invisible-empty { display: block; }
        .fw-800 { font-weight: 800; }
    </style>

    <script th:inline="javascript">
        let currentCategoryId = null;

        $(document).ready(function() {
            var msgSucesso = /*[[${mensagemSucesso}]]*/ null;
            var msgErro = /*[[${mensagemErro}]]*/ null;
            
            if(msgSucesso) {
                $(document).Toasts('create', {
                    class: 'bg-success',
                    title: 'Sucesso',
                    autohide: true,
                    delay: 5000,
                    body: msgSucesso
                });
            }
            if(msgErro) {
                $(document).Toasts('create', {
                    class: 'bg-danger',
                    title: 'Erro',
                    autohide: true,
                    delay: 7000,
                    body: msgErro
                });
            }
        });

        function filterByCategory(id, btn) {
            currentCategoryId = id;
            document.querySelectorAll('#categoryFilters button').forEach(b => b.classList.remove('active-category'));
            btn.classList.add('active-category');
            applyFilters();
        }

        function filterProducts() {
            applyFilters();
        }

        function applyFilters() {
            const searchText = document.getElementById('productSearch').value.toLowerCase();
            document.querySelectorAll('.product-item').forEach(item => {
                const name = item.getAttribute('data-name');
                const cat = item.getAttribute('data-category');
                const matchesCat = currentCategoryId === null || cat == currentCategoryId;
                const matchesSearch = name.includes(searchText);
                item.style.display = (matchesCat && matchesSearch) ? 'block' : 'none';
            });
        }

        function addToCart(productId) {
            const formData = new FormData();
            formData.append('produtoId', productId);
            formData.append('quantidade', 1);

            fetch('/api/adicionarProduto', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(updateCartUI);
        }

        function updateQty(productId, qty) {
            if (qty < 1) return;
            const formData = new FormData();
            formData.append('produtoId', productId);
            formData.append('quantidade', qty); // Re-setting qty in this implementation adds to existing, we might need a specific 'set' endpoint later
            
            // For now, let's just clear and re-add if we wanted precise setting, or refine the API.
            // Simplified for this demo:
            addToCart(productId); // This increments. For a real POS, we'd have a 'setQuantity' endpoint.
        }

        function removeFromCart(productId) {
            const formData = new FormData();
            formData.append('produtoId', productId);

            fetch('/api/removerProduto', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(updateCartUI);
        }

        function setClient(clientId) {
            const formData = new FormData();
            formData.append('clienteId', clientId);

            fetch('/api/definirCliente', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(updateCartUI);
        }

        function clearCart() {
            if (!confirm('Deseja realmente limpar o carrinho?')) return;
            fetch('/api/limparCarrinho', { method: 'POST' })
            .then(res => res.json())
            .then(updateCartUI);
        }

        function finalizeSale() {
            if (confirm('Deseja finalizar esta venda?')) {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/finalizarVenda';
                document.body.appendChild(form);
                form.submit();
            }
        }

        function updateCartUI(cart) {
            const container = document.getElementById('cartItems');
            if (!cart.itens || cart.itens.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5 text-muted">
                        <i class="fas fa-shopping-basket fa-3x mb-3 opacity-25"></i>
                        <p>O carrinho está vazio.</p>
                    </div>`;
                document.getElementById('cartSubtotal').innerText = '0,00 Kz';
                document.getElementById('cartTotal').innerText = '0,00 Kz';
                return;
            }

            let html = '<table class="table table-hover align-middle mb-0"><tbody>';
            let total = 0;
            cart.itens.forEach(item => {
                total += item.precoTotal;
                html += `
                    <tr>
                        <td class="ps-3">
                            <div class="d-flex flex-column">
                                <span class="fw-bold small">${item.produto.nome}</span>
                                <small class="text-muted text-nowrap">${formatMoney(item.produto.preco)} Kz</small>
                            </div>
                        </td>
                        <td width="80px">
                            <div class="badge bg-soft-primary p-2 w-100 text-dark rounded-pill">${item.quantidade}x</div>
                        </td>
                        <td class="text-end fw-bold text-nowrap">${formatMoney(item.precoTotal)} Kz</td>
                        <td class="pe-3 text-end">
                            <button class="btn btn-link btn-sm text-danger p-0" onclick="removeFromCart(${item.produto.id})">
                                <i class="fas fa-times-circle"></i>
                            </button>
                        </td>
                    </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
            document.getElementById('cartSubtotal').innerText = formatMoney(total) + ' Kz';
            document.getElementById('cartTotal').innerText = formatMoney(total) + ' Kz';
        }

        function formatMoney(value) {
            return new Intl.NumberFormat('pt-AO', { minimumFractionDigits: 2 }).format(value);
        }
    </script>
</body>

</html>
