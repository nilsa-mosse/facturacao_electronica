<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <!-- Top Navbar -->
        <nav th:replace="menu :: topbar"></nav>

        <!-- Includes the sidebar menu -->
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <div class="container py-5">
                <div class="row justify-content-center">
                    <div class="col-lg-10">
                        <div class="card p-4">
                            <div class="d-flex align-items-center mb-4">
                                 <i class="fas fa-exclamation-triangle fa-2x header-icon"></i>
                                <h2 class="mb-0" th:text="#{dashboard.estoque.titulo}">Produtos com Stock Baixo</h2>
                            </div>
                             <a th:href="@{/dashboard}" class="btn btn-outline-secondary mb-3"
                                style="width: fit-content;">
                                <i class="fas fa-arrow-left"></i> <span th:text="#{btn.voltar}">Voltar</span>
                            </a>
                            <div class="table-responsive">
                                <table class="table table-bordered table-striped align-middle">
                                    <thead>
                                         <tr>
                                            <th th:text="#{produtos.col.nome}">Nome</th>
                                            <th th:text="#{produtos.col.quantidade}">Quantidade em Estoque</th>
                                            <th th:text="#{produtos.col.preco}">Preço</th>
                                            <th th:text="#{produtos.col.cod_barras}">Código de Barra</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="produto : ${produtosEstoqueBaixo}">
                                            <td th:text="${produto.nome}">Nome</td>
                                            <td>
                                                <span class="badge badge-estoque"
                                                    th:text="${produto.quantidadeEstoque}">0</span>
                                            </td>
                                            <td
                                                th:text="${#numbers.formatDecimal(produto.preco, 1, 'COMMA', 2, 'POINT').replace('.', ',').replace(',', '.')} + ' Kz'">
                                                0,00 Kz</td>
                                            <td th:text="${produto.codigoBarra}">-</td>
                                        </tr>
                                         <tr th:if="${#lists.isEmpty(produtosEstoqueBaixo)}">
                                            <td colspan="4" class="text-center" th:text="#{clientes.historico.vazio}">Nenhum produto com estoque baixo.</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts already loaded in menu :: head -->
</body>

</html>
