<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card p-4">
                    <div class="d-flex align-items-center mb-4">
                        <i class="fas fa-coins fa-2x header-icon"></i>
                        <h2 class="mb-0">Receita Mensal
                            <span class="badge badge-total"
                                th:text="${#numbers.formatDecimal(#aggregates.sum(vendasDoMes.![total]), 1, 'COMMA', 2, 'POINT')}">0,00
                                Kz</span>

                        </h2>
                    </div>
                    <a th:href="@{/dashboard}" class="btn btn-outline-secondary mb-3">
                        <i class="fas fa-arrow-left"></i> Voltar ao Dashboard
                    </a>
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Data</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="venda : ${vendasDoMes}">
                                    <td th:text="${venda.id}">1</td>
                                    <td th:text="${#temporals.format(venda.dataCompra, 'dd/MM/yyyy HH:mm')}">20/03/2026
                                    </td>
                                    <td
                                        th:text="${#numbers.formatDecimal(venda.total, 1, 'COMMA', 2, 'POINT').replace('.', ',').replace(',', '.')} + ' Kz'">
                                        0,00 Kz</td>
                                </tr>
                                <tr th:if="${vendasDoMes.size() == 0}">
                                    <td colspan="3" class="text-center">Nenhuma venda realizada neste mês.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
