<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>

    <!-- Bootstrap e AdminLTE -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/all.min.css">
    <link rel="stylesheet" href="/assets/bootstrap.min.css">

 <style>

    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
    <!-- Top Navbar -->
    <nav th:replace="menu :: topbar"></nav>

    <!-- Menu lateral -->
    <aside th:replace="menu :: sidebar"></aside>
    <div class="content-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card p-4">
                        <div class="card-header">
                            <h3><i class="fas fa-user-plus"></i> Cadastro de Cliente</h3>
                            <p class="text-muted">Preencha os dados abaixo</p>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/clientes/adicionar}" method="post">
                                <div class="form-group">
                                    <i class="fas fa-user"></i>
                                    <input type="text" class="form-control" name="nome" placeholder="Nome do cliente" required>
                                </div>
                                <div class="form-group">
                                    <i class="fas fa-address-card"></i>
                                    <input type="text" class="form-control" name="nif" placeholder="NIF" required>
                                </div>
                                <div class="form-group">
                                    <i class="fas fa-envelope"></i>
                                    <input type="email" class="form-control" name="email" placeholder="Email" required>
                                </div>
                                <div class="form-group">
                                    <i class="fas fa-phone"></i>
                                    <input type="text" class="form-control" name="telefone" placeholder="Telefone" required>
                                </div>
                                <div class="form-group">
                                    <i class="fas fa-location-dot"></i>
                                    <textarea class="form-control" name="endereco" rows="3" placeholder="Endereço" required></textarea>
                                </div>
                                <div class="d-flex justify-content-between mt-4">
                                    <a th:href="@{/clientes/listar}" class="btn btn-secondary btn-custom">
                                        <i class="fas fa-xmark"></i> Cancelar
                                    </a>
                                    <button type="submit" class="btn btn-primary btn-custom">
                                        <i class="fas fa-floppy-disk"></i> Salvar
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
    <script src="/assets/jquery-3.6.0.min.js"></script>
    <script src="/assets/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
