<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>

    <!-- Bootstrap e AdminLTE -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/all.min.css">
    <link rel="stylesheet" href="/assets/bootstrap.min.css">

 <style>
  /* ===== DARK SIDEBAR MODERNA ===== */
.main-sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: 250px;
    background: #1e1e2f; /* fundo escuro moderno */
    color: #cbd5e1;
    z-index: 1000;
    box-shadow: 2px 0 10px rgba(0,0,0,0.5);
}

/* Área do usuário */
.main-sidebar .user-panel {
    background: #111827;
    padding: 15px;
    border-bottom: 1px solid #2d3748;
}

/* Links */
.main-sidebar .nav-sidebar > .nav-item > .nav-link {
    color: #cbd5e1;
    border-radius: 8px;
    margin: 5px 10px;
    transition: all 0.3s ease;
}

/* Hover */
.main-sidebar .nav-sidebar > .nav-item > .nav-link:hover {
    background: #4e73df;
    color: #fff;
    padding-left: 20px;
}

/* Link ativo */
.main-sidebar .nav-sidebar > .nav-item > .nav-link.active {
    background: #1cc88a;
    color: #fff;
}

/* Ícones */
.main-sidebar .nav-icon {
    color: #94a3b8;
}

/* Texto do menu */
.main-sidebar .nav-sidebar .nav-link p {
    font-weight: 500;
}

/* Submenu */
.nav-treeview {
    background: #111827;
    border-left: 2px solid #4e73df;
}


/* Efeito de brilho ao passar no menu */
.main-sidebar .nav-sidebar > .nav-item > .nav-link:hover i {
    color: #fff;
    transform: scale(1.1);
}
    </style>
</head>
<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <!-- Menu lateral -->
    <aside th:replace="menu :: sidebar"></aside>
    <div class="content-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card p-4">
                        <div class="card-header">
                            <h3><i class="fas fa-user-plus"></i> Cadastro de Cliente</h3>
                            <p class="text-muted">Preencha os dados abaixo</p>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/clientes/adicionar}" method="post">
                                <div class="form-group">
                                    <i class="fas fa-user"></i>
                                    <input type="text" class="form-control" name="nome" placeholder="Nome do cliente" required>
                                </div>
                                <div class="form-group">
                                    <i class="fas fa-address-card"></i>
                                    <input type="text" class="form-control" name="nif" placeholder="NIF" required>
                                </div>
                                <div class="form-group">
                                    <i class="fas fa-envelope"></i>
                                    <input type="email" class="form-control" name="email" placeholder="Email" required>
                                </div>
                                <div class="form-group">
                                    <i class="fas fa-phone"></i>
                                    <input type="text" class="form-control" name="telefone" placeholder="Telefone" required>
                                </div>
                                <div class="form-group">
                                    <i class="fas fa-location-dot"></i>
                                    <textarea class="form-control" name="endereco" rows="3" placeholder="Endereço" required></textarea>
                                </div>
                                <div class="d-flex justify-content-between mt-4">
                                    <a th:href="@{/clientes/listar}" class="btn btn-secondary btn-custom">
                                        <i class="fas fa-xmark"></i> Cancelar
                                    </a>
                                    <button type="submit" class="btn btn-primary btn-custom">
                                        <i class="fas fa-floppy-disk"></i> Salvar
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/assets/jquery-3.6.0.min.js"></script>
    <script src="/assets/bootstrap.bundle.min.js"></script>
</body>
</html>
