<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head th:replace="menu :: head"></head>

<style>
    :root {
        --primary-grad: linear-gradient(135deg, #f43f5e 0%, #be123c 100%); /* Rose/Crimson for returns */
    }

    .content-wrapper {
        background-color: #f8fafc !important;
    }

    .page-header-modern {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .page-header-modern h2 {
        font-weight: 800;
        color: #1e293b;
        margin: 0;
        letter-spacing: -0.02em;
    }

    .premium-table-card {
        background: white;
        border-radius: 24px;
        border: 1px solid rgba(226, 232, 240, 0.8);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        overflow: hidden;
    }

    .table thead th {
        background: #f8fafc;
        color: #64748b;
        font-weight: 700;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        padding: 20px 24px;
        border-bottom: 1px solid #f1f5f9;
    }

    .table tbody td {
        padding: 20px 24px;
        color: #1e293b;
        font-weight: 500;
        vertical-align: middle;
        border-bottom: 1px solid #f1f5f9;
    }

    .return-id {
        font-weight: 700;
        color: #94a3b8;
    }

    .return-date {
        font-weight: 700;
        color: #1e293b;
    }

    .return-total {
        font-weight: 800;
        color: #be123c;
    }

    .btn-add-premium {
        background: var(--primary-grad);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 16px;
        font-weight: 700;
        box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.3);
        transition: all 0.3s ease;
        text-decoration: none !important;
    }

    .btn-add-premium:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 25px -5px rgba(244, 63, 94, 0.4);
        color: white;
    }

    .empty-state {
        padding: 60px 20px;
        text-align: center;
    }

    .empty-state i {
        font-size: 4rem;
        color: #e2e8f0;
        margin-bottom: 20px;
    }

    .text-slate-500 { color: #64748b; }
</style>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <main class="content-wrapper">
            <div class="container-fluid px-4 py-4">
                
                <div class="page-header-modern">
                    <div>
                        <h2>Devoluções de Venda</h2>
                        <p class="text-slate-500 mb-0">Histórico de reembolsos e retornos de mercadoria</p>
                    </div>
                    <a th:href="@{/devolucoes/novo}" class="btn btn-add-premium">
                        <i class="fas fa-undo me-2"></i> <span>Nova Devolução</span>
                    </a>
                </div>

                <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-4" role="alert" style="border-radius: 16px;">
                    <i class="fas fa-check-circle me-2"></i>
                    <span th:text="${mensagem}">Sucesso</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="premium-table-card">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Data / Hora</th>
                                    <th>Factura Ref.</th>
                                    <th>Nota de Crédito</th>
                                    <th>Motivo</th>
                                    <th>Operador</th>
                                    <th class="text-end">Valor Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="dev : ${devolucoes}">
                                    <td><span class="return-id" th:text="'#' + ${dev.id}"></span></td>
                                    <td>
                                        <div class="return-date" th:text="${#temporals.format(dev.dataDevolucao, 'dd/MM/yyyy HH:mm')}">Data</div>
                                    </td>
                                    <td>
                                        <a th:if="${dev.fatura != null}" th:href="@{'/uploads/faturas/' + ${dev.fatura.numeroFatura} + '.pdf'}" target="_blank" class="badge bg-light text-dark border text-decoration-none" title="Ver Factura Original">
                                            <i class="fas fa-file-invoice me-1 text-primary"></i> <span th:text="${dev.fatura.numeroFatura}">Factura</span>
                                        </a>
                                        <span th:if="${dev.fatura == null}" class="text-muted">---</span>
                                    </td>
                                    <td>
                                        <a th:if="${dev.notaCredito != null}" th:href="@{'/uploads/faturas/' + ${dev.notaCredito.numeroFatura} + '.pdf'}" target="_blank" class="text-primary fw-bold">
                                            <i class="fas fa-file-pdf me-1"></i> <span th:text="${dev.notaCredito.numeroFatura}">NC</span>
                                        </a>
                                        <span th:if="${dev.notaCredito == null}" class="text-muted">N/A</span>
                                    </td>
                                    <td class="text-slate-500" th:text="${dev.motivo}">Motivo</td>
                                    <td th:text="${dev.usuario != null ? dev.usuario.nome : 'N/A'}">Operador</td>
                                    <td class="text-end">
                                        <span class="return-total" th:text="${#numbers.formatDecimal(dev.total, 1, 'POINT', 2, 'COMMA')} + ' Kz'">0,00</span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(devolucoes)}">
                                    <td colspan="7">
                                        <div class="empty-state">
                                            <i class="fas fa-box-open"></i>
                                            <h5 class="text-slate-700 fw-bold">Nenhuma devolução registrada</h5>
                                            <p class="text-slate-500">O histórico de devoluções aparecerá aqui.</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
