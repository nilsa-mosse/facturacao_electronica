<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Sistema de Facturação Eletrónica</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
</head>
<body>
<div class="container-fluid p-0">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">eFacturação</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a th:href="@{/}" class="nav-link">Home</a></li>
                    <li class="nav-item"><a th:href="@{/produtos}" class="nav-link">Produtos</a></li>
                    <li class="nav-item"><a th:href="@{/empresa}" class="nav-link">Empresa</a></li>
                    <li class="nav-item"><a th:href="@{/servicos}" class="nav-link">Serviços</a></li>
                    <li class="nav-item"><a th:href="@{/noticias}" class="nav-link">Notícias</a></li>
                    <li class="nav-item"><a th:href="@{/contato}" class="nav-link">Contato</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a href="https://www.facebook.com/ncrangola" class="nav-link" target="_blank"><i class="fab fa-facebook"></i></a></li>
                    <li class="nav-item"><a href="https://www.instagram.com/ncrangola" class="nav-link" target="_blank"><i class="fab fa-instagram"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="py-4">
        <div class="container">
            <div th:fragment="content">
                <!-- Conteúdo será inserido aqui pelos templates filhos -->
            </div>
        </div>
    </main>
    <footer class="bg-light text-center py-3 mt-4">
        <strong>&copy; 2026 eFacturação.</strong> Todos os direitos reservados.
    </footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/js/all.min.js"></script>
</body>
</html>
