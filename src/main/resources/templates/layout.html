<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Kwanza ERP</title>
    <!-- Resource Bundle from menu :: head logic -->
    <!-- Local Resource Bundle -->
    <link rel="stylesheet" th:href="@{/plugins/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/plugins/adminlte/css/adminlte.min.css}">
    <link rel="stylesheet" th:href="@{/plugins/fontawesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/premium-style.css}">
</head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="container-fluid p-0">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" th:href="@{/}">Kwanza ERP</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a th:href="@{/}" class="nav-link">Home</a></li>
                        <li class="nav-item"><a th:href="@{/produtos}" class="nav-link">Produtos</a></li>
                        <li class="nav-item"><a th:href="@{/empresa}" class="nav-link">Empresa</a></li>
                        <li class="nav-item"><a th:href="@{/servicos}" class="nav-link">Serviços</a></li>
                        <li class="nav-item"><a th:href="@{/noticias}" class="nav-link">Notícias</a></li>
                        <li class="nav-item"><a th:href="@{/contato}" class="nav-link">Contato</a></li>
                    </ul>
                    <ul class="navbar-nav ms-auto align-items-center">
                        <!-- Idioma Dropdown -->
                        <li class="nav-item dropdown me-2">
                            <a class="nav-link dropdown-toggle d-flex align-items-center gap-1" href="#" id="langDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="fas fa-globe"></i>
                                <span th:text="${#locale.language == 'pt' ? 'PT' : (#locale.language == 'en' ? 'EN' : 'FR')}">Idioma</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" aria-labelledby="langDropdown">
                                <li><a class="dropdown-item" th:href="@{${#request.requestURI}(lang='pt')}">🇵🇹 Português</a></li>
                                <li><a class="dropdown-item" th:href="@{${#request.requestURI}(lang='en')}">🇺🇸 English</a></li>
                                <li><a class="dropdown-item" th:href="@{${#request.requestURI}(lang='fr')}">🇫🇷 Français</a></li>
                            </ul>
                        </li>

                        <!-- User Dropdown & Logout -->
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle btn btn-light rounded-pill px-3 shadow-sm d-flex align-items-center gap-2" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
                                    <i class="fas fa-user-circle"></i>
                                </div>
                                <span th:if="${#authentication != null}" th:text="${#authentication.name}" class="fw-bold fw-semibold">Usuário</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2 p-2" aria-labelledby="userDropdown" style="min-width: 200px; border-radius: 1rem;">
                                <li><a class="dropdown-item rounded-3 p-2 d-flex align-items-center" href="#"><i class="fas fa-user-gear me-2 text-muted"></i> A Minha Conta</a></li>
                                <li><a class="dropdown-item rounded-3 p-2 d-flex align-items-center" href="#"><i class="fas fa-history me-2 text-muted"></i> Atividade</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <form th:action="@{/logout}" method="post" id="logoutForm" class="d-none">
                                        <!-- O token CSRF é injetado automaticamente pelo Thymeleaf se estiver configurado -->
                                    </form>
                                    <a class="dropdown-item rounded-3 p-2 d-flex align-items-center text-danger fw-bold" href="javascript:void(0)" onclick="document.getElementById('logoutForm').submit();">
                                        <i class="fas fa-arrow-right-from-bracket me-2"></i> Terminar Sessão
                                    </a>
                                </li>
                            </ul>
                        </li>
                        
                        <li class="nav-item ms-3 d-none d-lg-block">
                            <a href="https://www.facebook.com/ncrangola" class="nav-link p-1" target="_blank"><i class="fab fa-facebook text-muted"></i></a>
                        </li>
                        <li class="nav-item d-none d-lg-block">
                            <a href="https://www.instagram.com/ncrangola" class="nav-link p-1" target="_blank"><i class="fab fa-instagram text-muted"></i></a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <main class="py-4">
            <div class="container">
                <div th:fragment="content">
                    <!-- Conteúdo será inserido aqui pelos templates filhos -->
                </div>
            </div>
        </main>
        <footer class="bg-light text-center py-3 mt-4">
            <strong>&copy; 2026 Kwanza ERP.</strong> Todos os direitos reservados.
        </footer>
    </div>
    <script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
