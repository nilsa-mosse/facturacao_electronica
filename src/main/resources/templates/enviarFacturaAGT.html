<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head th:replace="menu :: head"></head>
<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
    <nav th:replace="menu :: topbar"></nav>
    <aside th:replace="menu :: sidebar"></aside>
    <div class="content-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card p-4">
                        <div class="card-header bg-transparent text-center">
                            <h3><i class="fas fa-paper-plane"></i> Enviar Factura para AGT</h3>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/factura-eletronica/enviar}" method="post" enctype="multipart/form-data">
                                <div class="mb-3">
                                    <label for="numeroFactura" class="form-label">Número da Factura</label>
                                    <input type="text" class="form-control" id="numeroFactura" name="numeroFactura" required>
                                </div>
                                <div class="mb-3">
                                    <label for="dataEmissao" class="form-label">Data de Emissão</label>
                                    <input type="date" class="form-control" id="dataEmissao" name="dataEmissao" required>
                                </div>
                                <div class="mb-3">
                                    <label for="nifCliente" class="form-label">NIF do Cliente</label>
                                    <input type="text" class="form-control" id="nifCliente" name="nifCliente" required>
                                </div>
                                <div class="mb-3">
                                    <label for="valorTotal" class="form-label">Valor Total</label>
                                    <input type="number" step="0.01" class="form-control" id="valorTotal" name="valorTotal" required>
                                </div>
                                <div class="mb-3">
                                    <label for="tipoDocumento" class="form-label">Tipo de Documento</label>
                                    <select class="form-control" id="tipoDocumento" name="tipoDocumento" required>
                                        <option value="Factura">Factura</option>
                                        <option value="Nota de Crédito">Nota de Crédito</option>
                                        <option value="Nota de Débito">Nota de Débito</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="serie" class="form-label">Série</label>
                                    <input type="text" class="form-control" id="serie" name="serie" required>
                                </div>
                                <div class="mb-3">
                                    <label for="xml" class="form-label">XML da Factura</label>
                                    <input type="file" class="form-control" id="xml" name="xml" accept=".xml" required>
                                </div>
                                <div class="text-end">
                                    <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Enviar para AGT</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- JS already loaded via menu :: head -->
</body>
</html>
