<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
    <!-- Top Navbar -->
    <nav th:replace="menu :: topbar"></nav>
    <aside th:replace="menu :: sidebar"></aside>
    
    <div class="content-wrapper">
        <section class="content py-4">
            <div class="container-fluid">
                <div class="card">
                    <div class="card-header">Lista de Clientes</div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-3">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>NIF</th>
                            <th>Email</th>
                            <th>Telefone</th>
                            <th>Endereço</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cliente : ${clientes}">
                            <td th:text="${cliente.id}"></td>
                            <td th:text="${cliente.nome}"></td>
                            <td th:text="${cliente.nif}"></td>
                            <td th:text="${cliente.email}"></td>
                            <td th:text="${cliente.telefone}"></td>
                            <td th:text="${cliente.endereco}"></td>
                            <td>
                                <div class="btn-group">
                                    <a th:href="@{'/clientes/editar/' + ${cliente.id}}"
                                        class="btn btn-warning btn-sm"><i class="fas fa-edit me-1"></i>Editar</a>
                                    <a th:href="@{'/clientes/delete/' + ${cliente.id}}" class="btn btn-danger btn-sm"><i
                                            class="fas fa-trash me-1"></i>Excluir</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/clientes/adicionar}" class="btn btn-primary"><i class="fas fa-plus me-1"></i> Cadastrar
                    Novo Cliente</a>
            </div>
        </div>
                </div>
            </div>
        </section>
    </div>
    </div>    <!-- Scripts already loaded via menu :: head -->
</body>

</html>
