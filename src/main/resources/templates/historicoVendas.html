<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Histórico de Vendas</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f4f6f9;
        }

        .erp-toolbar {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .erp-toolbar input,
        .erp-toolbar select {
            min-width: 180px;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
            margin-bottom: 24px;
        }

        .card-header {
            background: #198754;
            color: #fff;
            border-radius: 12px 12px 0 0;
        }

        .table th,
        .table td {
            vertical-align: middle;
        }

        .table-striped tbody tr:nth-of-type(odd) {
            background-color: #e9ecef;
        }

        .icon {
            color: #198754;
            margin-right: 8px;
        }

        .badge {
            font-size: 0.9em;
        }

        .pagination .page-link {
            color: #198754;
        }

        .pagination .active .page-link {
            background: #198754;
            color: #fff;
            border-color: #198754;
        }

        .erp-toolbar .form-control {
            border-radius: 8px box-shadow: none;
            border: 1px solid #d1d5db;
        }

        .erp-toolbar .btn-success {
            border-radius: 8px;
            font-weight: 500;
            padding: 8px 24px;
        }

        .erp-toolbar .btn-success i {
            margin-right: 6px;
        }

        .erp-toolbar input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.5);
        }
    </style>
</head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">

    <!-- Sidebar e Wrapper do AdminLTE -->
    <aside th:replace="menu :: sidebar"></aside>

    <div class="content-wrapper">
        <section class="content">
            <div class="container-fluid pt-4">
                <div class="row justify-content-center">
                    <div class="col-lg-10">
                        <div class="erp-toolbar mb-4">
                            <form th:action="@{/historico-vendas}" method="get"
                                class="d-flex flex-wrap gap-3 w-100 align-items-center">
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fa fa-calendar"></i></span>
                                    <input type="date" name="dataInicio" th:value="${dataInicio}" class="form-control"
                                        placeholder="Data início">
                                </div>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fa fa-calendar"></i></span>
                                    <input type="date" name="dataFim" th:value="${dataFim}" class="form-control"
                                        placeholder="Data fim">
                                </div>
                                <div class="input-group flex-grow-1">
                                    <span class="input-group-text bg-light"><i class="fa fa-search"></i></span>
                                    <input type="text" name="pesquisa" th:value="${pesquisa}" class="form-control"
                                        placeholder="Pesquisar produto ou ID">
                                </div>
                                <button type="submit" class="btn btn-success"><i class="fas fa-filter"></i>
                                    Filtrar</button>
                            </form>
                        </div>
                        <div class="card">
                            <div class="card-header d-flex align-items-center">
                                <i class="fas fa-history fa-lg icon"></i>
                                <h3 class="mb-0">Histórico de Vendas</h3>
                            </div>
                            <div class="card-body">
                                <table class="table table-bordered table-striped table-hover">
                                    <thead class="table-success">
                                        <tr>
                                            <th>ID</th>
                                            <th>Data</th>
                                            <th>Total</th>
                                            <th>Itens</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="compra : ${compras}">
                                            <td th:text="${compra.id}"></td>
                                            <td th:text="${#temporals.format(compra.dataCompra, 'dd/MM/yyyy HH:mm')}">
                                            </td>
                                            <td>
                                                <span class="badge bg-success" th:text="${compra.total} + ' Kz'"></span>
                                            </td>
                                            <td>
                                                <ul class="list-unstyled mb-0">
                                                    <li th:each="item : ${compra.itens}">
                                                        <span class="fw-bold" th:text="${item.nomeProduto}"></span>
                                                        <span class="badge bg-secondary ms-2"
                                                            th:text="'x ' + ${item.quantidade}"></span>
                                                        <span class="badge bg-info ms-2"
                                                            th:text="${item.subtotal} + ' Kz'"></span>
                                                    </li>
                                                </ul>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                                <nav th:if="${totalPages > 1}" class="mt-4">
                                    <ul class="pagination justify-content-center">
                                        <li th:each="page : ${#numbers.sequence(1, totalPages)}"
                                            th:classappend="${page == currentPage} ? 'active'">
                                            <a class="page-link"
                                                th:href="@{/historico-vendas(dataInicio=${dataInicio},dataFim=${dataFim},pesquisa=${pesquisa},page=${page})}"
                                                th:text="${page}"></a>
                                        </li>
                                    </ul>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
