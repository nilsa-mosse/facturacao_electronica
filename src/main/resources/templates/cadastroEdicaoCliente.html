<!DOCTYPE html>
<html lang="pt">

<head th:replace="menu :: head"></head>

<body>

    <div class="card">
        <div class="card-header">
            Cadastro e Edição de Clientes
        </div>
        <div class="card-body">
            <form action="/clientes/save" method="post">
                <div class="mb-3">
                    <label for="name" class="form-label">Nome</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Digite o nome do cliente"
                        required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email"
                        placeholder="Digite o email do cliente" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Telefone</label>
                    <input type="text" class="form-control" id="phone" name="phone"
                        placeholder="Digite o telefone do cliente" required>
                </div>
                <div class="mb-3">
                    <label for="address" class="form-label">Endereço</label>
                    <textarea class="form-control" id="address" name="address" rows="3"
                        placeholder="Digite o endereço do cliente" required></textarea>
                </div>
                <div class="btn-group mt-4">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i> Salvar</button>
                    <a href="/clientes" class="btn btn-secondary"><i class="fas fa-times me-1"></i> Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts already loaded via menu :: head -->
</body>

</html>
