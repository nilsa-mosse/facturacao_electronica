<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="menu :: head">
    <title>Redefinir Palavra-passe</title>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Redefinir Palavra-passe</div>
                <div class="card-body">
                    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
                    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
                    <form th:action="@{/reset-password}" method="post">
                        <input type="hidden" name="token" th:value="${token}">
                        <div class="mb-3">
                            <label class="form-label">Nova Palavra-passe</label>
                            <input type="password" name="novaSenha" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <button class="btn btn-primary">Redefinir Palavra-passe</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
