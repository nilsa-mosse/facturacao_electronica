<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <aside th:replace="menu :: sidebar"></aside>
    <main class="py-4">
        <div class="container">
            <div class="produto-card mx-auto col-md-8">
                <div class="row mb-4 align-items-center">
                    <div class="col-md-4 text-center">
                        <div class="produto-imagem mb-3">
                            <div th:if="${produto.imagemBlob != null}">
                                <img th:src="@{/produto/imagem/{id}(id=${produto.id})}" alt="Imagem do Produto"
                                    style="max-width:180px; max-height:180px;" />
                            </div>
                            <div th:if="${produto.imagemBlob == null}" class="text-muted" style="font-size:1.2rem;">Sem
                                imagem</div>
                        </div>
                        <input type="file" name="imagem" class="form-control mt-2">
                    </div>
                    <div class="col-md-8">
                        <div class="produto-titulo">Detalhes do Produto</div>
                        <table class="table produto-tabela table-bordered">
                            <tr>
                                <th>Nome</th>
                                <td><input type="text" name="nome" class="form-control" th:value="${produto.nome}"
                                        required></td>
                            </tr>
                            <tr>
                                <th>Categoria</th>
                                <td>
                                    <select name="categoriaId" class="form-select">
                                        <option th:each="catObj : ${categorias}" th:value="${catObj.id}"
                                            th:text="${catObj.nome}"
                                            th:selected="${produto.categoria != null && produto.categoria.id == catObj.id}">
                                        </option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <th>Código de Barras</th>
                                <td><input type="text" name="codigoBarra" class="form-control"
                                        th:value="${produto.codigoBarra}"></td>
                            </tr>
                            <tr>
                                <th>Preço</th>
                                <td><input type="number" name="preco" class="form-control" th:value="${produto.preco}"
                                        min="0" step="0.01"></td>
                            </tr>
                            <tr>
                                <th>Descrição</th>
                                <td><textarea name="descricao" class="form-control" th:text="${produto.descricao}"
                                        rows="3"></textarea></td>
                            </tr>
                            <tr>
                                <th>Quantidade em Estoque</th>
                                <td><input type="number" name="quantidadeEstoque" class="form-control"
                                        th:value="${produto.quantidadeEstoque}" min="0"></td>
                            </tr>
                            <tr>
                                <th>IVA (%)</th>
                                <td>
                                    <input type="number" name="ivaPercentual" class="form-control"
                                        th:value="${produto.ivaPercentual}" min="0" max="100" step="0.01"
                                        placeholder="Digite o IVA em % (opcional)">
                                    <small class="form-text text-muted">Preencha apenas se o produto possuir
                                        IVA.</small>
                                </td>
                            </tr>
                        </table>
                        <input type="hidden" name="id" th:value="${produto.id}">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12 text-end">
                        <button type="submit" class="btn btn-success btn-custom">Salvar Alterações</button>
                        <a th:href="@{/produtos/listar}" class="btn btn-secondary btn-custom ms-2">Voltar</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
