<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Editar ' + ${produto.nome} + ' - eFacturacao'">Detalhes do Produto</title>
    <link rel="stylesheet" th:href="@{/plugins/fontawesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/plugins/bootstrap/css/bootstrap.min.css}">
    <style>
        :root {
            --primary: #4361ee;
            --primary-soft: rgba(67, 97, 238, 0.1);
            --dark: #0f172a;
            --bg: #f8fafc;
            --text-muted: #64748b;
        }
        
        body { 
            background: var(--bg); 
            font-family: 'Outfit', sans-serif; 
            color: var(--dark);
            min-height: 100vh;
        }

        .main-wrapper {
            padding: 50px 0;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card-premium {
            background: white;
            border-radius: 28px;
            border: none;
            box-shadow: 0 25px 60px rgba(0,0,0,0.04);
            overflow: hidden;
        }

        .card-header-premium {
            background: linear-gradient(135deg, var(--primary) 0%, #3a0ca3 100%);
            padding: 40px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .product-image-container {
            width: 140px;
            height: 140px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .product-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body-premium {
            padding: 50px;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #f1f5f9;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #475569;
        }

        .input-premium {
            border-radius: 14px;
            border: 2px solid #f1f5f9;
            padding: 12px 18px;
            transition: all 0.3s;
            background: #f8fafc;
            font-size: 0.95rem;
        }
        .input-premium:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-soft);
            outline: none;
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 14px;
            font-weight: 800;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.2);
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(67, 97, 238, 0.3);
            filter: brightness(1.1);
            color: white;
        }

        .btn-back {
            background: #f1f5f9;
            color: #475569;
            padding: 16px 30px;
            border-radius: 14px;
            font-weight: 800;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-back:hover {
            background: #e2e8f0;
            color: var(--dark);
        }

        .file-input-wrapper {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <form th:action="@{/produtos/editar}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="id" th:value="${produto.id}">
            
            <div class="card-premium">
                <!-- Header with current product info -->
                <div class="card-header-premium">
                    <div class="product-image-container">
                        <img th:if="${produto.imagemBlob != null}" th:src="@{/produto/imagem/{id}(id=${produto.id})}" alt="Artigo">
                        <i th:if="${produto.imagemBlob == null}" class="fas fa-image fa-3x text-white-50"></i>
                    </div>
                    <div>
                        <span class="badge bg-white text-primary fw-bold mb-2">MODO EDIÇÃO</span>
                        <h2 class="fw-900 mb-0" th:text="${produto.nome}" style="font-size: 2.2rem; letter-spacing: -1px;">Nome do Produto</h2>
                        <p class="mb-0 text-white-50"><i class="fas fa-barcode me-1"></i> <span th:text="${produto.codigoBarra}">SKU</span></p>
                    </div>
                </div>

                <div class="card-body-premium">
                    <!-- General Details -->
                    <div class="section-title">
                        <i class="fas fa-info-circle"></i> Dados Principais
                    </div>
                    <div class="row g-4 mb-5">
                        <div class="col-md-8">
                            <label class="form-label">Denominação do Artigo</label>
                            <input type="text" name="nome" class="form-control input-premium" th:value="${produto.nome}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Categoria</label>
                            <select name="categoriaId" class="form-select input-premium">
                                <option th:each="cat : ${categorias}" th:value="${cat.id}" 
                                        th:text="${cat.nome}" 
                                        th:selected="${produto.categoria != null && produto.categoria.id == cat.id}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Descrição Geral</label>
                            <textarea name="descricao" class="form-control input-premium" rows="3" th:text="${produto.descricao}"></textarea>
                        </div>
                    </div>

                    <!-- Pricing & Tax -->
                    <div class="section-title">
                        <i class="fas fa-coins"></i> Finanças & Impostos
                    </div>
                    <div class="row g-4 mb-5">
                        <div class="col-md-4">
                            <label class="form-label">Preço de Venda (Kz)</label>
                            <input type="number" name="preco" class="form-control input-premium" th:value="${produto.preco}" step="0.01" min="0" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Taxa de IVA (%)</label>
                            
                            <!-- Filtro de IVA por Regime -->
                            <select name="ivaPercentual" class="form-select input-premium">
                                <option value="0" th:selected="${produto.ivaPercentual == null or produto.ivaPercentual == 0}">Isento / Não Aplicável</option>
                                
                                <th:block th:if="${regimeFiscal == 'GERAL'}">
                                    <option th:each="imp : ${impostos}"
                                            th:if="${imp.percentagem != null and (imp.percentagem.floatValue() == 14.0 or imp.percentagem.floatValue() == 1.0)}"
                                            th:value="${imp.percentagem}"
                                            th:text="${imp.nome} + ' (' + ${imp.percentagem} + '%)'"
                                            th:selected="${produto.ivaPercentual != null and produto.ivaPercentual.doubleValue() == imp.percentagem.doubleValue()}">
                                    </option>
                                </th:block>
                                
                                <th:block th:if="${regimeFiscal == 'SIMPLIFICADO'}">
                                    <option th:each="imp : ${impostos}"
                                            th:if="${imp.percentagem != null and (imp.percentagem.floatValue() == 7.0 or imp.percentagem.floatValue() == 1.0)}"
                                            th:value="${imp.percentagem}"
                                            th:text="${imp.nome} + ' (' + ${imp.percentagem} + '%)'"
                                            th:selected="${produto.ivaPercentual != null and produto.ivaPercentual.doubleValue() == imp.percentagem.doubleValue()}">
                                    </option>
                                </th:block>
                                
                                <th:block th:if="${regimeFiscal == 'EXCLUSAO'}">
                                    <option th:each="imp : ${impostos}"
                                            th:if="${imp.percentagem != null and (imp.percentagem.floatValue() == 1.0)}"
                                            th:value="${imp.percentagem}"
                                            th:text="${imp.nome} + ' (' + ${imp.percentagem} + '%)'"
                                            th:selected="${produto.ivaPercentual != null and produto.ivaPercentual.doubleValue() == imp.percentagem.doubleValue()}">
                                    </option>
                                </th:block>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Stock Actual</label>
                            <input type="number" name="quantidadeEstoque" class="form-control input-premium" th:value="${produto.quantidadeEstoque}" min="0" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Unidade de Medida</label>
                            <select name="unidadeMedida" class="form-select input-premium">
                                <option value="Unidade (UN)" th:selected="${produto.unidadeMedida == 'Unidade (UN)'}">Unidade (UN)</option>
                                <option value="Peça (PÇ)" th:selected="${produto.unidadeMedida == 'Peça (PÇ)'}">Peça (PÇ)</option>
                                <option value="Item" th:selected="${produto.unidadeMedida == 'Item'}">Item</option>
                                <option value="Caixa" th:selected="${produto.unidadeMedida == 'Caixa'}">Caixa</option>
                                <option value="Pacote" th:selected="${produto.unidadeMedida == 'Pacote'}">Pacote</option>
                            </select>
                        </div>
                    </div>

                    <!-- Datas Section -->
                    <div class="section-title">
                        <i class="fas fa-calendar-alt"></i> Datas de Validade
                    </div>
                    <div class="row g-4 mb-5">
                        <div class="col-md-6">
                            <label class="form-label">Data de Fabrico</label>
                            <input type="date" name="dataFabrico" class="form-control input-premium" th:value="${produto.dataFabrico}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data de Expiração</label>
                            <input type="date" name="dataExpiracao" class="form-control input-premium" th:value="${produto.dataExpiracao}">
                        </div>
                    </div>

                    <!-- Visual Update -->

                    <div class="section-title">
                        <i class="fas fa-camera"></i> Actualizar Imagem
                    </div>
                    <div class="row g-4 mb-5">
                        <div class="col-md-6">
                            <label class="form-label">Novo Ficheiro de Imagem</label>
                            <input type="file" name="imagem" class="form-control input-premium" accept="image/*">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Código de Barras / EAN</label>
                            <input type="text" name="codigoBarra" class="form-control input-premium" th:value="${produto.codigoBarra}">
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="d-flex justify-content-between align-items-center mt-5">
                        <a th:href="@{/listarProdutos}" class="btn-back">
                            <i class="fas fa-chevron-left me-2"></i> VOLTAR À LISTA
                        </a>
                        <button type="submit" class="btn-save">
                            <i class="fas fa-save me-2"></i> GUARDAR ALTERAÇÕES
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
