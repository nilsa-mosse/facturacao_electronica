<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="menu :: head"></head>

<style>
    :root {
        --primary-grad: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
        --success-grad: linear-gradient(135deg, #10b981 0%, #059669 100%);
        --info-grad: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        --danger-grad: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    }

    .content-wrapper {
        background-color: #f8fafc !important;
    }

    .welcome-hero {
        background: var(--primary-grad);
        border-radius: 20px;
        padding: 40px;
        color: white;
        margin-bottom: 40px;
        box-shadow: 0 10px 25px -5px rgba(67, 56, 202, 0.3);
        position: relative;
        overflow: hidden;
    }

    .welcome-hero::after {
        content: '';
        position: absolute;
        top: -50px;
        right: -50px;
        width: 200px;
        height: 200px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
    }

    .action-card {
        background: white;
        border-radius: 24px;
        padding: 40px 30px;
        border: 1px solid rgba(226, 232, 240, 0.8);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
        text-align: center;
        height: 100%;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .action-card:hover {
        transform: translateY(-12px);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        border-color: #6366f1;
    }

    .action-icon-wrapper {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        color: white;
        margin-bottom: 25px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .action-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 10px;
    }

    .action-desc {
        color: #64748b;
        font-size: 1rem;
    }

    .card-bg-icon {
        position: absolute;
        right: -20px;
        bottom: -20px;
        font-size: 8rem;
        opacity: 0.03;
        transform: rotate(-15deg);
        transition: all 0.4s ease;
    }

    .action-card:hover .card-bg-icon {
        opacity: 0.08;
        transform: rotate(-5deg) scale(1.1);
    }
</style>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <main class="content-wrapper">
            <div class="container-fluid px-4 pt-4">
                
                <!-- Welcome Hero Section -->
                <div class="welcome-hero">
                    <div class="row align-items-center">
                        <div class="col-md-8">
                            <h1 class="fw-bold mb-2">Bem-vindo ao Portal, <span th:text="${usuario_NOME}">Utilizador</span>! 👋</h1>
                            <p class="mb-0 opacity-75 fs-5">O que deseja processar hoje?</p>
                        </div>
                        <div class="col-md-4 text-md-end d-none d-md-block">
                            <i class="fas fa-desktop fa-4x opacity-25"></i>
                        </div>
                    </div>
                </div>

                <!-- Messages -->
                <div th:if="${mensagem}" class="alert alert-success border-0 shadow-sm rounded-pill px-4 mb-4" role="alert">
                    <i class="fas fa-check-circle me-2"></i> <span th:text="${mensagem}"></span>
                </div>
                <div th:if="${mensagem_erro}" class="alert alert-danger border-0 shadow-sm rounded-pill px-4 mb-4" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${mensagem_erro}"></span>
                </div>

                <!-- Actions Grid -->
                <div class="row justify-content-center">
                    
                    <!-- Abrir Caixa -->
                    <div class="col-xl-4 col-lg-5 mb-4" th:if="${!isCaixaAberto}">
                        <a th:href="@{/caixa/abertura}" class="text-decoration-none">
                            <div class="action-card">
                                <div class="action-icon-wrapper" style="background: var(--success-grad)">
                                    <i class="fas fa-door-open"></i>
                                </div>
                                <h2 class="action-title">Abrir Caixa</h2>
                                <p class="action-desc">Inicie o seu turno e comece a vender.</p>
                                <i class="fas fa-unlock card-bg-icon"></i>
                            </div>
                        </a>
                    </div>

                    <!-- Aceder ao POS -->
                    <div class="col-xl-4 col-lg-5 mb-4" th:if="${isCaixaAberto}">
                        <a th:href="@{/pos}" class="text-decoration-none">
                            <div class="action-card">
                                <div class="action-icon-wrapper" style="background: var(--success-grad)">
                                    <i class="fas fa-cash-register"></i>
                                </div>
                                <h2 class="action-title">Aceder ao POS</h2>
                                <p class="action-desc">Realize vendas e emita faturas rapidamente.</p>
                                <i class="fas fa-shopping-cart card-bg-icon"></i>
                            </div>
                        </a>
                    </div>

                    <!-- Histórico -->
                    <div class="col-xl-4 col-lg-5 mb-4">
                        <a th:href="@{/historico-vendas}" class="text-decoration-none">
                            <div class="action-card">
                                <div class="action-icon-wrapper" style="background: var(--info-grad)">
                                    <i class="fas fa-history"></i>
                                </div>
                                <h2 class="action-title">Histórico</h2>
                                <p class="action-desc">Consulte vendas anteriores e emita 2ª vias.</p>
                                <i class="fas fa-list-alt card-bg-icon"></i>
                            </div>
                        </a>
                    </div>

                    <!-- Fechar Caixa -->
                    <div class="col-xl-4 col-lg-5 mb-4" th:if="${isCaixaAberto}">
                        <a th:href="@{/caixa/fecho}" class="text-decoration-none">
                            <div class="action-card">
                                <div class="action-icon-wrapper" style="background: var(--danger-grad)">
                                    <i class="fas fa-power-off"></i>
                                </div>
                                <h2 class="action-title">Fechar Caixa</h2>
                                <p class="action-desc">Encerre o turno e verifique o fecho de caixa.</p>
                                <i class="fas fa-lock card-bg-icon"></i>
                            </div>
                        </a>
                    </div>

                </div>
            </div>
        </main>
    </div>
</body>
</html>
