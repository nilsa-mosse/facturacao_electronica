<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Bem-vindo, <span th:text="${usuario_NOME}">Utilizador</span>!</h1>
                        </div>
                    </div>
                </div>
            </div>

            <section class="content">
                <div class="container-fluid">
                    <div class="row mt-4 mb-5 justify-content-center">
                        <div class="col-lg-10">
                            <div class="text-center mb-5">
                                <h2 class="display-5 fw-bold text-dark">Portal do Operador</h2>
                                <p class="lead text-muted">Selecione uma das opções abaixo para continuar</p>
                            </div>
                        </div>
                    </div>

                    <div class="row justify-content-center">
                        <!-- Nova Venda (POS) -->
                        <div class="col-md-5 mb-4 d-flex">
                            <a th:href="@{/pos}" class="text-decoration-none w-100">
                                <div class="card bg-success text-white shadow-lg border-0 btn-hover overflow-hidden h-100"
                                    style="border-radius: 20px; cursor: pointer; min-height: 250px; position: relative;">
                                    <i class="fas fa-cash-register"
                                        style="position: absolute; right: -10px; bottom: -20px; font-size: 14rem; opacity: 0.15; transform: rotate(-10deg);"></i>
                                    <div class="card-body d-flex flex-column justify-content-center align-items-center text-center position-relative"
                                        style="z-index: 1;">
                                        <i class="fas fa-shopping-cart fa-4x mb-3"></i>
                                        <h2 class="fw-bold fs-1 m-0">Aceder ao POS</h2>
                                        <p class="fs-5 mt-2 mb-0">Ponto de Venda e Emissão de Faturas</p>
                                    </div>
                                </div>
                            </a>
                        </div>

                        <!-- Histórico de Vendas -->
                        <div class="col-md-5 mb-4 d-flex">
                            <a th:href="@{/historico-vendas}" class="text-decoration-none w-100">
                                <div class="card bg-info text-white shadow-lg border-0 btn-hover overflow-hidden h-100"
                                    style="border-radius: 20px; cursor: pointer; min-height: 250px; position: relative;">
                                    <i class="fas fa-history"
                                        style="position: absolute; right: -10px; bottom: -20px; font-size: 14rem; opacity: 0.15; transform: rotate(-10deg);"></i>
                                    <div class="card-body d-flex flex-column justify-content-center align-items-center text-center position-relative"
                                        style="z-index: 1;">
                                        <i class="fas fa-list-alt fa-4x mb-3"></i>
                                        <h2 class="fw-bold fs-1 m-0">Histórico de Vendas</h2>
                                        <p class="fs-5 mt-2 mb-0">Consultar vendas e reimprimir faturas</p>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <style>
        .btn-hover:hover {
            transform: translateY(-10px);
            transition: all 0.3s ease;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, .175) !important;
        }

        .btn-hover {
            transition: all 0.3s ease;
        }
    </style>
</body>

</html>
