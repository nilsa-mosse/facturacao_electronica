<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Ativação de Licença | eFacturação</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4338ca;
            --primary-glow: rgba(67, 56, 202, 0.4);
            --accent: #f59e0b;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(67, 56, 202, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(245, 158, 11, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: rgba(67, 56, 202, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
            border: 1px solid rgba(67, 56, 202, 0.3);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .machine-id-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px dashed var(--border);
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }

        .machine-id {
            font-family: monospace;
            font-size: 1.25rem;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
            display: block;
            margin-bottom: 5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .btn-activate {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #3730a3);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(67, 56, 202, 0.3);
        }

        .btn-activate:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(67, 56, 202, 0.4);
        }

        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .contact-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .contact-link {
            color: var(--text-main);
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
            transition: color 0.3s;
        }

        .contact-link:hover {
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="icon-box">🔑</div>
            <h1>Ativação de Licença</h1>
            <p>Seu período de teste expirou. Introduza a chave profissional para continuar.</p>
        </div>

        <div th:if="${erro}" class="alert alert-error" th:text="${erro}"></div>
        <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>

        <div class="machine-id-section">
            <span class="label">ID desta Máquina</span>
            <span class="machine-id" th:text="${machineId}">A1B2C3D4</span>
            <p style="font-size: 0.75rem;">Envie este código ao suporte para gerar sua chave.</p>
        </div>

        <form th:action="@{/ativar-licenca}" method="post">
            <div class="form-group">
                <label class="label">Chave de Ativação</label>
                <input type="text" name="chave" placeholder="Insira o código recebido..." required autocomplete="off">
            </div>
            <button type="submit" class="btn-activate">ATIVAR SISTEMA AGORA</button>
        </form>

        <div class="contact-info">
            <p style="margin-bottom: 10px;">Ainda não tem uma chave?</p>
            <a href="tel:+244934068121" class="contact-link">📞 +244 934 068 121</a>
            <a href="mailto:sebastiao_vunda@hotmail.com" class="contact-link">📧 sebastiao_vunda@hotmail.com</a>
        </div>

        <div class="footer">
            &copy; 2026 eFacturação &bull; Eng. Sebastião Mosse
        </div>
    </div>
</body>

</html>
