<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<!-- Custom POS Styles -->
<style>
    :root {
        --pos-primary: #4361ee;
        --pos-secondary: #3f37c9;
        --pos-accent: #4cc9f0;
        --pos-bg: #f8f9fa;
        --pos-card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        --pos-glass-bg: rgba(255, 255, 255, 0.85);
        --pos-glass-border: rgba(255, 255, 255, 0.5);
    }

    .dark-mode {
        --pos-bg: #1a1d20;
        --pos-glass-bg: rgba(30, 34, 40, 0.9);
        --pos-glass-border: rgba(255, 255, 255, 0.1);
    }

    body {
        background-color: var(--pos-bg) !important;
        font-family: 'Outfit', sans-serif;
    }

    .pos-container {
        display: flex;
        height: calc(100vh - 60px);
        overflow: hidden;
    }

    /* Product Section */
    .product-section {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        background: var(--pos-bg);
    }

    .search-wrapper {
        position: relative;
        margin-bottom: 2rem;
    }

    .search-wrapper .form-control {
        height: 55px;
        border-radius: 30px;
        padding-left: 55px;
        border: 2px solid transparent;
        box-shadow: var(--pos-card-shadow);
        transition: all 0.3s ease;
        background: white;
    }

    .dark-mode .search-wrapper .form-control {
        background: #2c3136;
        color: white;
        border-color: #3f474e;
    }

    .search-wrapper .form-control:focus {
        border-color: var(--pos-primary);
        box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15);
    }

    .search-icon {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: #adb5bd;
        font-size: 1.2rem;
    }

    /* Product Card */
    .product-card {
        background: white;
        border-radius: 20px;
        border: none;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        height: 100%;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }

    .dark-mode .product-card {
        background: #2c3136;
    }

    .product-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .product-img-container {
        height: 160px;
        position: relative;
        overflow: hidden;
    }

    .product-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }

    .product-card:hover .product-img {
        transform: scale(1.1);
    }

    .btn-quick-add {
        position: absolute;
        bottom: 12px;
        right: 12px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--pos-primary);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(67, 97, 238, 0.3);
        transition: all 0.2s ease;
        border: none;
    }

    .btn-quick-add:hover {
        transform: scale(1.1);
        background: var(--pos-secondary);
    }

    .product-info {
        padding: 1rem;
    }

    .product-name {
        font-size: 0.95rem;
        font-weight: 700;
        margin-bottom: 0.3rem;
        color: #343a40;
    }

    .dark-mode .product-name { color: #f8f9fa; }

    .product-price {
        font-weight: 800;
        color: var(--pos-primary);
        font-size: 1.1rem;
    }

    /* Cart Section */
    .cart-section {
        width: 400px;
        background: var(--pos-glass-bg);
        backdrop-filter: blur(15px);
        border-left: 1px solid var(--pos-glass-border);
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        box-shadow: -10px 0 30px rgba(0,0,0,0.03);
    }

    .cart-header {
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--pos-glass-border);
    }

    .cart-items-container {
        flex: 1;
        overflow-y: auto;
        margin-bottom: 1.5rem;
        padding-right: 5px;
    }

    .cart-item-card {
        background: white;
        border-radius: 15px;
        padding: 0.8rem;
        margin-bottom: 0.8rem;
        display: flex;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        animation: slideIn 0.3s ease;
    }

    .dark-mode .cart-item-card { background: #343a40; }

    @keyframes slideIn {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    .cart-item-info { flex: 1; }
    
    .cart-item-qty {
        display: flex;
        align-items: center;
        background: #f1f3f5;
        border-radius: 10px;
        padding: 2px;
    }

    .dark-mode .cart-item-qty { background: #2c3136; }

    .qty-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: none;
        background: white;
        color: var(--pos-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        transition: all 0.2s;
    }

    .dark-mode .qty-btn { background: #3f474e; color: white; }

    .qty-btn:hover { background: var(--pos-primary); color: white; }

    .qty-count {
        margin: 0 10px;
        font-weight: 700;
        font-size: 0.9rem;
    }

    .cart-summary {
        background: #f8f9fa;
        border-radius: 20px;
        padding: 1.2rem;
    }

    .dark-mode .cart-summary { background: #2c3136; }

    .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
    }

    .summary-total {
        border-top: 1px dashed #dee2e6;
        margin-top: 0.8rem;
        padding-top: 0.8rem;
        font-weight: 800;
        font-size: 1.4rem;
        color: var(--pos-primary);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #dee2e6; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #ced4da; }
</style>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper p-0">
            <div class="pos-container">
                <!-- Seção de Produtos -->
                <div class="product-section">
                    <div class="container-fluid">
                        <div class="search-wrapper">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" id="search" class="form-control" th:placeholder="#{pos.procurar}">
                        </div>

                        <!-- Categorias (Fictícias para UI) -->
                        <div class="d-flex gap-2 mb-4 overflow-auto pb-2" id="categoryFilters">
                            <button class="btn btn-sm btn-primary rounded-pill px-3 fw-bold">Todos</button>
                            <button class="btn btn-sm btn-outline-dark rounded-pill px-3 fw-bold">Bebidas</button>
                            <button class="btn btn-sm btn-outline-dark rounded-pill px-3 fw-bold">Alimentos</button>
                            <button class="btn btn-sm btn-outline-dark rounded-pill px-3 fw-bold">Mercearia</button>
                            <button class="btn btn-sm btn-outline-dark rounded-pill px-3 fw-bold">Higiene</button>
                        </div>

                        <!-- Grid de Produtos -->
                        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4" id="productList">
                            <div class="col" th:each="produto : ${produtos}">
                                <div class="product-card">
                                    <div class="product-img-container">
                                        <img th:src="${produto.imagem}" class="product-img" alt="Produto">
                                        <button class="btn-quick-add" 
                                            th:attr="data-id=${produto.id},data-nome=${produto.nome},data-preco=${produto.preco},data-iva=${produto.ivaPercentual}"
                                            onclick="addToCart(this)">
                                            <i class="fas fa-plus"></i>
                                        </button>
                                    </div>
                                    <div class="product-info">
                                        <div class="product-name text-truncate" th:text="${produto.nome}">Nome do Produto</div>
                                        <div class="d-flex justify-content-between align-items-center mt-2">
                                            <div class="product-price"><span th:text="${produto.preco}">0</span> Kz</div>
                                            <span th:if="${produto.ivaPercentual != null}" class="badge bg-soft-info text-info small">IVA <span th:text="${produto.ivaPercentual}">0</span>%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Seção de Carrinho -->
                <div class="cart-section">
                    <div class="cart-header d-flex justify-content-between align-items-center">
                        <h4 class="fw-bold mb-0"><i class="fas fa-shopping-basket me-2 text-primary"></i><span th:text="#{pos.carrinho.titulo}">Carrinho</span></h4>
                        <span id="cartCountBadge" class="badge bg-primary rounded-pill">0 Itens</span>
                    </div>

                    <div class="cart-items-container" id="cartItemsList">
                        <!-- Gerado via JS -->
                    </div>

                    <div class="cart-footer">
                        <div class="cart-summary shadow-sm mb-4">
                            <div class="summary-row">
                                <span class="text-muted" th:text="#{pos.total.sem_imposto}">Subtotal</span>
                                <span class="fw-bold" id="totalSemImposto">0.00 Kz</span>
                            </div>
                            <div class="summary-row">
                                <span class="text-muted" th:text="#{pos.iva}">IVA Acumulado</span>
                                <span class="fw-bold text-info" id="valorIva">0.00 Kz</span>
                            </div>
                            <div class="summary-row summary-total">
                                <span th:text="#{pos.total}">Total Final</span>
                                <span id="totalFinal">0.00 Kz</span>
                            </div>
                        </div>

                        <button type="button" id="finalizarCompra" class="btn btn-success w-100 py-3 rounded-pill fw-bold shadown-sm">
                            <i class="fas fa-receipt me-2"></i><span th:text="#{pos.btn.finalizar}">Finalizar Venda</span>
                        </button>

                        <div id="pdfLinkBox" class="mt-3 d-none text-center">
                            <a id="pdfLink" href="#" target="_blank" class="btn btn-outline-primary w-100 rounded-pill">
                                <i class="fas fa-file-pdf me-2"></i><span th:text="#{pos.fatura.baixar}">Baixar Factura</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS Logic Refactored -->
    <script th:inline="javascript">
        let cart = [];

        function addToCart(btn) {
            const id = parseInt(btn.dataset.id);
            const nome = btn.dataset.nome;
            const preco = parseFloat(btn.dataset.preco);
            const ivaPercentual = btn.dataset.iva ? parseFloat(btn.dataset.iva) : 0;

            let item = cart.find(p => p.id === id);
            if (item) {
                item.qtd++;
            } else {
                cart.push({ id, nome, preco, qtd: 1, ivaPercentual });
                // Animate add
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => { btn.innerHTML = '<i class="fas fa-plus"></i>'; }, 1000);
            }
            renderCart();
        }

        function renderCart() {
            let container = $("#cartItemsList");
            container.empty();
            let subtotal = 0;
            let totalIva = 0;
            let count = 0;

            cart.forEach((item, index) => {
                let itemTotal = item.qtd * item.preco;
                subtotal += itemTotal;
                totalIva += itemTotal * (item.ivaPercentual / 100);
                count += item.qtd;

                container.append(`
                    <div class="cart-item-card">
                        <div class="cart-item-info">
                            <h6 class="fw-bold mb-1 small text-truncate" style="max-width: 150px;">${item.nome}</h6>
                            <div class="text-muted small">${item.preco} Kz</div>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <div class="cart-item-qty">
                                <button class="qty-btn" onclick="decreaseQty(${index})"><i class="fas fa-minus"></i></button>
                                <span class="qty-count">${item.qtd}</span>
                                <button class="qty-btn" onclick="increaseQty(${index})"><i class="fas fa-plus"></i></button>
                            </div>
                            <button class="btn btn-sm btn-link text-danger p-0 border-0" onclick="removeItem(${index})"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                `);
            });

            $("#cartCountBadge").text(`${count} Itens`);
            $("#totalSemImposto").text(`${subtotal.toFixed(2)} Kz`);
            $("#valorIva").text(`${totalIva.toFixed(2)} Kz`);
            $("#totalFinal").text(`${(subtotal + totalIva).toFixed(2)} Kz`);
        }

        function increaseQty(index) {
            cart[index].qtd++;
            renderCart();
        }

        function decreaseQty(index) {
            if (cart[index].qtd > 1) {
                cart[index].qtd--;
            } else {
                removeItem(index);
            }
            renderCart();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            renderCart();
        }

        $(document).ready(function () {
            // Search functionality
            $('#search').on('input', function() {
                let searchTerm = $(this).val().toLowerCase();
                $('#productList .col').each(function() {
                    let text = $(this).find('.product-name').text().toLowerCase();
                    $(this).toggle(text.includes(searchTerm));
                });
            });

            $('#finalizarCompra').click(function () {
                if (cart.length === 0) {
                    alert('Carrinho vazio!');
                    return;
                }
                
                let compra = {
                    itens: cart.map(item => ({
                        nomeProduto: item.nome,
                        quantidade: item.qtd,
                        preco: item.preco,
                        subtotal: item.qtd * item.preco
                    })),
                    total: cart.reduce((sum, item) => sum + (item.qtd * item.preco * (1 + (item.ivaPercentual / 100))), 0)
                };

                $(this).prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span> Processando...');

                $.ajax({
                    url: '/api/compras/single',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(compra),
                    success: function (pdfPath) {
                        alert('Venda finalizada com sucesso!');
                        cart = [];
                        renderCart();
                        if (pdfPath) {
                            $('#pdfLink').attr('href', pdfPath);
                            $('#pdfLinkBox').removeClass('d-none');
                        }
                    },
                    error: function (xhr) {
                        alert('Erro ao finalizar venda: ' + (xhr.responseText || 'Erro desconhecido'));
                    },
                    complete: function() {
                        $('#finalizarCompra').prop('disabled', false).html('<i class="fas fa-receipt me-2"></i><span>Finalizar Venda</span>');
                    }
                });
            });

            // simulated categories filter click
            $('#categoryFilters button').click(function() {
                $('#categoryFilters button').removeClass('btn-primary').addClass('btn-outline-dark');
                $(this).removeClass('btn-outline-dark').addClass('btn-primary');
            });
        });
    </script>
</body>
</html>
