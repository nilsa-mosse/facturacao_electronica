<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${globalSistemaNome != null ? 'Recuperar Senha - ' + globalSistemaNome : 'Recuperar Senha'}">Recuperar Senha</title>
    <link rel="stylesheet" th:href="@{/plugins/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/plugins/fontawesome/css/all.min.css}">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #06b6d4;
            --accent: #f43f5e;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { font-family: 'Outfit', sans-serif; }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            overflow-x: hidden;
        }

        .bg-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0) 70%);
            filter: blur(60px);
            z-index: -1;
            border-radius: 50%;
            animation: float 20s infinite alternate;
        }
        .blob-1 { top: -10%; left: -10%; }
        .blob-2 { bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        .card-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .card-glass {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px 45px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        .page-title {
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .form-group-custom {
            position: relative;
            margin-bottom: 25px;
        }

        .form-group-custom i.input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .form-control-custom {
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 0 20px 0 55px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control-custom::placeholder { color: var(--text-muted); }

        .form-control-custom:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            color: var(--text-main);
        }

        .btn-submit {
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        .modern-alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.4s ease;
        }

        .modern-alert-error {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: #fb7185;
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="card-container">
        <div class="card-glass">
            <div class="brand-icon">
                <i class="fas fa-key"></i>
            </div>

            <h1 class="page-title">Recuperar Senha</h1>
            <p class="page-subtitle">Introduza o seu utilizador ou email. Se existir, receberá instruções para redefinir a sua palavra-passe.</p>

            <!-- Mensagem de sucesso -->
            <div th:if="${mensagem}" class="modern-alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${mensagem}"></span>
            </div>

            <!-- Mensagem de erro -->
            <div th:if="${erro}" class="modern-alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${erro}"></span>
            </div>

            <form th:action="@{/forgot-password}" method="post" th:unless="${mensagem}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
                <div class="form-group-custom">
                    <input type="text"
                           id="loginInput"
                           name="login"
                           class="form-control-custom"
                           placeholder="Email ou utilizador"
                           required
                           autofocus>
                    <i class="fas fa-user input-icon"></i>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i>
                    Enviar Instruções
                </button>
            </form>

            <a th:href="@{/login}" href="/login" class="back-link">
                <i class="fas fa-arrow-left"></i> Voltar ao Login
            </a>
        </div>
    </div>
</body>
</html>
