<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Compras do Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous">
    <style>
        .main-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 250px;
            background-color: #2c3e50;
            color: #ecf0f1;
            z-index: 1000;
        }

        .content-wrapper {
            margin-left: 250px;
            padding: 40px 20px 20px 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .table thead {
            background: #4e73df;
            color: #fff;
        }

        .table tbody tr {
            background: #fff;
        }

        .table tbody tr:hover {
            background: #e3e9ff;
        }

        @media (max-width: 900px) {
            .content-wrapper {
                margin-left: 0;
                padding: 10px;
            }

            .main-sidebar {
                display: none;
            }
        }
    </style>
</head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <aside th:replace="menu :: sidebar"></aside>
    <div class="content-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="card p-4">
                        <div class="card-header bg-transparent text-center">
                            <h3><i class="fas fa-history"></i> Histórico de Compras do Cliente</h3>
                            <p class="text-muted mb-0" th:text="${cliente.nome}"></p>
                        </div>
                        <div class="card-body">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Data</th>
                                        <th>Total</th>
                                        <th>Itens</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="compra, iterStat : ${compras}">
                                        <td th:text="${iterStat.count}"></td>
                                        <td th:text="${#dates.format(compra.dataCompra, 'dd/MM/yyyy HH:mm')}"></td>
                                        <td th:text="${compra.total}"></td>
                                        <td>
                                            <ul class="mb-0">
                                                <li th:each="item : ${compra.itens}"
                                                    th:text="${item.nomeProduto} + ' x' + ${item.quantidade} + ' (' + ${item.subtotal} + ')' ">
                                                </li>
                                            </ul>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(compras)}">
                                        <td colspan="4" class="text-center text-muted">Nenhuma compra encontrada para
                                            este cliente.</td>
                                    </tr>
                                </tbody>
                            </table>
                            <div class="text-end mt-3">
                                <a th:href="@{/clientes/listar}" class="btn btn-secondary"><i
                                        class="fas fa-arrow-left"></i> Voltar</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
