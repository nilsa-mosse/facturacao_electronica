<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
    <nav th:replace="menu :: topbar"></nav>
    <aside th:replace="menu :: sidebar"></aside>
    <div class="content-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="card p-4">
                        <div class="card-header bg-transparent text-center">
                             <h3><i class="fas fa-history"></i> <span th:text="#{clientes.historico.titulo}">Histórico de Compras do Cliente</span></h3>
                            <p class="text-muted mb-0" th:text="${cliente.nome}"></p>
                        </div>
                        <div class="card-body">
                            <table class="table table-hover align-middle">
                                <thead>
                                     <tr>
                                        <th>#</th>
                                        <th th:text="#{vendas.col.data}">Data</th>
                                        <th th:text="#{vendas.col.total}">Total</th>
                                        <th th:text="#{vendas.col.itens}">Itens</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="compra, iterStat : ${compras}">
                                        <td th:text="${iterStat.count}"></td>
                                        <td th:text="${#dates.format(compra.dataCompra, 'dd/MM/yyyy HH:mm')}"></td>
                                        <td th:text="${compra.total}"></td>
                                        <td>
                                            <ul class="mb-0">
                                                <li th:each="item : ${compra.itens}"
                                                    th:text="${item.nomeProduto} + ' x' + ${item.quantidade} + ' (' + ${item.subtotal} + ')' ">
                                                </li>
                                            </ul>
                                        </td>
                                    </tr>
                                     <tr th:if="${#lists.isEmpty(compras)}">
                                        <td colspan="4" class="text-center text-muted" th:text="#{clientes.historico.vazio}">Nenhuma compra encontrada para
                                            este cliente.</td>
                                    </tr>
                                </tbody>
                            </table>
                            <div class="text-end mt-3">
                                 <a th:href="@{/clientes/listar}" class="btn btn-secondary"><i
                                        class="fas fa-arrow-left"></i> <span th:text="#{btn.voltar}">Voltar</span></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
    <!-- Scripts already loaded in menu :: head -->
</body>

</html>
