<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Séries de Facturação</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
        crossorigin="anonymous">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous">

    <style>
        .main-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 250px;
            background-color: #2c3e50;
            color: #ecf0f1;
            z-index: 1000;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link {
            color: #bdc3c7;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link:hover {
            background-color: #34495e;
            color: #ffffff;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link.active {
            background-color: #2980b9;
            color: #ffffff;
        }

        .main-sidebar .user-panel {
            background-color: #34495e;
            padding: 10px;
            border-bottom: 1px solid #4b545c;
        }

        .content-wrapper {
            margin-left: 250px;
            padding: 20px;
        }
    </style>
</head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <aside th:replace="menu :: sidebar"></aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1><i class="fas fa-layer-group me-2"></i>Séries de Facturação</h1>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    <strong>Sucesso!</strong> Série salva correctamente.
                </div>
                <div th:if="${param.deleted}" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    <strong>Eliminada!</strong> Série removida com sucesso.
                </div>

                <!-- Tabela de Séries -->
                <div class="card card-outline card-primary">
                    <div class="card-header">
                        <h3 class="card-title">Séries Registadas</h3>
                    </div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover table-striped table-valign-middle">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Prefixo</th>
                                    <th>Descrição</th>
                                    <th>Ano</th>
                                    <th>Próximo Nº</th>
                                    <th>Estado</th>
                                    <th>Acções</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="s : ${series}">
                                    <td th:text="${s.id}">1</td>
                                    <td><strong th:text="${s.prefixo}">FT</strong></td>
                                    <td th:text="${s.descricao}">Factura</td>
                                    <td th:text="${s.ano}">2026</td>
                                    <td><span class="badge bg-secondary" th:text="${s.proximoNumero}">1</span></td>
                                    <td>
                                        <span class="badge" th:classappend="${s.activo ? 'bg-success' : 'bg-danger'}"
                                            th:text="${s.activo ? 'Activa' : 'Inactiva'}">Activa</span>
                                    </td>
                                    <td>
                                        <a th:href="@{'/configuracoes/series/eliminar/' + ${s.id}}"
                                            class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Tem certeza que deseja eliminar esta série?')">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Formulário Nova Série -->
                <div class="card card-outline card-success">
                    <div class="card-header">
                        <h3 class="card-title">Adicionar Nova Série</h3>
                    </div>
                    <form th:action="@{/configuracoes/series/salvar}" th:object="${novaSerie}" method="post">
                        <div class="card-body">
                            <div class="row">
                                <div class="form-group col-md-3">
                                    <label>Prefixo</label>
                                    <input type="text" class="form-control" th:field="*{prefixo}"
                                        placeholder="Ex: FT, FR, NC" required>
                                </div>
                                <div class="form-group col-md-3">
                                    <label>Descrição</label>
                                    <input type="text" class="form-control" th:field="*{descricao}"
                                        placeholder="Ex: Factura, Factura/Recibo">
                                </div>
                                <div class="form-group col-md-2">
                                    <label>Ano</label>
                                    <input type="number" class="form-control" th:field="*{ano}" placeholder="2026"
                                        required>
                                </div>
                                <div class="form-group col-md-2">
                                    <label>Nº Inicial</label>
                                    <input type="number" class="form-control" th:field="*{proximoNumero}" value="1"
                                        required>
                                </div>
                                <div class="form-group col-md-2">
                                    <label>Estado</label>
                                    <select class="form-select" th:field="*{activo}">
                                        <option value="true">Activa</option>
                                        <option value="false">Inactiva</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i>Salvar
                                Série</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
