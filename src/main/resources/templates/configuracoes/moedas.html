<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <section class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1><i class="fas fa-coins me-2"></i><span th:text="#{config.moedas.titulo}">Moedas e Câmbios</span></h1>
                        </div>
                    </div>
                </div>
            </section>

            <section class="content">
                <div class="container-fluid">
                     <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        <i class="fas fa-check-circle me-1"></i>
                        <span th:text="${mensagem}">Moeda salva correctamente.</span>
                    </div>

                    <!-- Tabela de Moedas -->
                    <div class="card card-outline card-primary">
                         <div class="card-header">
                            <h3 class="card-title" th:text="#{config.moedas.registadas}">Moedas Registadas</h3>
                        </div>
                        <div class="card-body table-responsive p-0">
                            <table class="table table-hover table-striped table-valign-middle">
                                 <thead>
                                    <tr>
                                        <th>#</th>
                                        <th th:text="#{config.moedas.sigla}">Sigla</th>
                                        <th th:text="#{produto.label.nome}">Nome</th>
                                        <th th:text="#{config.moedas.cambio}">Taxa de Câmbio</th>
                                        <th th:text="#{config.moedas.padrao}">Padrão</th>
                                        <th th:text="#{column.acoes}">Acções</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="m : ${moedas}">
                                        <td th:text="${m.id}">1</td>
                                        <td><strong th:text="${m.sigla}">AOA</strong></td>
                                        <td th:text="${m.nome}">Kwanza</td>
                                        <td th:text="${m.taxaCambio}">1.0000</td>
                                        <td>
                                             <span class="badge"
                                                th:classappend="${m.padrao ? 'bg-success' : 'bg-secondary'}"
                                                th:text="${m.padrao ? #messages.msg('config.moedas.sim') : #messages.msg('config.moedas.nao')}">Sim</span>
                                        </td>
                                        <td>
                                             <a th:href="@{'/configuracoes/moedas/eliminar/' + ${m.id}}"
                                                class="btn btn-sm btn-outline-danger"
                                                th:onclick="return confirm([[#{config.moedas.confirmar_eliminar}]])">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Formulário Nova Moeda -->
                    <div class="card card-outline card-success">
                         <div class="card-header">
                            <h3 class="card-title" th:text="#{config.moedas.novo}">Adicionar Nova Moeda</h3>
                        </div>
                        <form th:action="@{/configuracoes/moedas/salvar}" th:object="${novaMoeda}" method="post">
                            <div class="card-body">
                                 <div class="row">
                                    <div class="form-group col-md-3">
                                        <label th:text="#{config.moedas.sigla}">Sigla</label>
                                        <input type="text" class="form-control" th:field="*{sigla}"
                                            placeholder="AOA, USD" maxlength="10" required>
                                    </div>
                                    <div class="form-group col-md-3">
                                        <label th:text="#{produto.label.nome}">Nome</label>
                                        <input type="text" class="form-control" th:field="*{nome}" required>
                                    </div>
                                    <div class="form-group col-md-3">
                                        <label th:text="#{config.moedas.cambio}">Taxa de Câmbio</label>
                                        <input type="number" step="0.0001" class="form-control" th:field="*{taxaCambio}" required>
                                    </div>
                                    <div class="form-group col-md-3">
                                        <label th:text="#{config.moedas.padrao}">Moeda Padrão?</label>
                                        <select class="form-select" th:field="*{padrao}">
                                            <option value="false" th:text="#{config.moedas.nao}">Não</option>
                                            <option value="true" th:text="#{config.moedas.sim}">Sim</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                             <div class="card-footer">
                                <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i><span th:text="#{config.moedas.btn.salvar}">Salvar
                                    Moeda</span></button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Scripts already loaded via menu :: head -->
</body>

</html>
