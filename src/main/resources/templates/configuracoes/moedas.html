<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Moedas e Câmbios</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
        crossorigin="anonymous">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous">

    <style>
        .main-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 250px;
            background-color: #2c3e50;
            color: #ecf0f1;
            z-index: 1000;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link {
            color: #bdc3c7;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link:hover {
            background-color: #34495e;
            color: #ffffff;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link.active {
            background-color: #2980b9;
            color: #ffffff;
        }

        .main-sidebar .user-panel {
            background-color: #34495e;
            padding: 10px;
            border-bottom: 1px solid #4b545c;
        }

        .content-wrapper {
            margin-left: 250px;
            padding: 20px;
        }
    </style>
</head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <aside th:replace="menu :: sidebar"></aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1><i class="fas fa-coins me-2"></i>Moedas e Câmbios</h1>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    <strong>Sucesso!</strong> Moeda salva correctamente.
                </div>
                <div th:if="${param.deleted}" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    <strong>Eliminada!</strong> Moeda removida com sucesso.
                </div>

                <!-- Tabela de Moedas -->
                <div class="card card-outline card-primary">
                    <div class="card-header">
                        <h3 class="card-title">Moedas Registadas</h3>
                    </div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover table-striped table-valign-middle">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Sigla</th>
                                    <th>Nome</th>
                                    <th>Taxa de Câmbio</th>
                                    <th>Padrão</th>
                                    <th>Acções</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="m : ${moedas}">
                                    <td th:text="${m.id}">1</td>
                                    <td><strong th:text="${m.sigla}">AOA</strong></td>
                                    <td th:text="${m.nome}">Kwanza</td>
                                    <td th:text="${m.taxaCambio}">1.0000</td>
                                    <td>
                                        <span class="badge" th:classappend="${m.padrao ? 'bg-success' : 'bg-secondary'}"
                                            th:text="${m.padrao ? 'Sim' : 'Não'}">Sim</span>
                                    </td>
                                    <td>
                                        <a th:href="@{'/configuracoes/moedas/eliminar/' + ${m.id}}"
                                            class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Tem certeza que deseja eliminar esta moeda?')">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Formulário Nova Moeda -->
                <div class="card card-outline card-success">
                    <div class="card-header">
                        <h3 class="card-title">Adicionar Nova Moeda</h3>
                    </div>
                    <form th:action="@{/configuracoes/moedas/salvar}" th:object="${novaMoeda}" method="post">
                        <div class="card-body">
                            <div class="row">
                                <div class="form-group col-md-3">
                                    <label>Sigla</label>
                                    <input type="text" class="form-control" th:field="*{sigla}"
                                        placeholder="Ex: AOA, USD, EUR" maxlength="10" required>
                                </div>
                                <div class="form-group col-md-3">
                                    <label>Nome</label>
                                    <input type="text" class="form-control" th:field="*{nome}"
                                        placeholder="Ex: Kwanza Angolano" required>
                                </div>
                                <div class="form-group col-md-3">
                                    <label>Taxa de Câmbio</label>
                                    <input type="number" step="0.0001" class="form-control" th:field="*{taxaCambio}"
                                        placeholder="Ex: 1.0000" required>
                                </div>
                                <div class="form-group col-md-3">
                                    <label>Moeda Padrão?</label>
                                    <select class="form-select" th:field="*{padrao}">
                                        <option value="false">Não</option>
                                        <option value="true">Sim</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i>Salvar
                                Moeda</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
