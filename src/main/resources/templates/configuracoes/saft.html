<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="menu :: head">
    <title>Gestão SAF-T (AO)</title>
</head>
<style>
    .saft-container {
        padding: 2rem;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        margin-top: 20px;
    }
    .action-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer;
        border: none;
        border-radius: 15px;
        overflow: hidden;
    }
    .action-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .status-badge {
        font-size: 0.8rem;
        padding: 5px 12px;
        border-radius: 20px;
    }
    .btn-gradient {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 10px;
        font-weight: bold;
    }
    .btn-gradient-submit {
        background: linear-gradient(135deg, #007bff 0%, #6610f2 100%);
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 10px;
        font-weight: bold;
    }
</style>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <section class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="fw-bold">Gestão Integrada SAF-T (AO)</h1>
                        </div>
                    </div>
                </div>
            </section>

            <section class="content">
                <div class="container-fluid">
                    
                    <!-- Painel de Accões Principais -->
                    <div class="row">
                        <div class="col-md-12">
                            <div class="card saft-container shadow-lg">
                                <div class="card-body">
                                    <h4 class="mb-4"><i class="fas fa-file-export me-2"></i> Exportação e Submissão</h4>
                                    
                                    <form id="saftForm" class="row g-3 align-items-end">
                                        <div class="col-md-4">
                                            <label class="form-label">Data de Início</label>
                                            <input type="date" id="dataInicio" class="form-control form-control-lg" required>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">Data de Fim</label>
                                            <input type="date" id="dataFim" class="form-control form-control-lg" required>
                                        </div>
                                        <div class="col-md-4 d-flex gap-2">
                                            <button type="button" onclick="gerarSaft()" class="btn btn-gradient flex-grow-1">
                                                <i class="fas fa-download me-2"></i> Gerar XML
                                            </button>
                                            <button type="button" onclick="submeterAgt()" class="btn btn-gradient-submit flex-grow-1">
                                                <i class="fas fa-paper-plane me-2"></i> Submeter à AGT
                                            </button>
                                        </div>
                                    </form>
                                    
                                    <div id="statusMessage" class="mt-4 d-none">
                                        <div class="alert alert-info d-flex align-items-center" role="alert">
                                            <i class="fas fa-sync fa-spin me-3"></i>
                                            <div id="statusText">Processando ficheiro...</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Histórico de Submissões -->
                    <div class="row mt-4">
                        <div class="col-md-12">
                            <div class="card shadow-sm border-0" style="border-radius: 15px;">
                                <div class="card-header bg-white">
                                    <h5 class="mb-0 fw-bold">Histórico de Exportações</h5>
                                </div>
                                <div class="card-body p-0">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead class="bg-light">
                                            <tr>
                                                <th>Ref. Protocolo</th>
                                                <th>Período</th>
                                                <th>Data Execução</th>
                                                <th>Estado na AGT</th>
                                                <th>Accões</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td>AO-SAFT-2026-X01</td>
                                                <td>2026-03-01 a 2026-03-31</td>
                                                <td>2026-04-01 09:15</td>
                                                <td><span class="status-badge bg-success text-white">Aceite</span></td>
                                                <td>
                                                    <button class="btn btn-sm btn-outline-info"><i class="fas fa-eye"></i></button>
                                                    <button class="btn btn-sm btn-outline-secondary"><i class="fas fa-print"></i></button>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>AO-SAFT-2026-X02</td>
                                                <td>2026-04-01 a 2026-04-15</td>
                                                <td>Hoje, 14:00</td>
                                                <td><span class="status-badge bg-warning text-dark">Em Processamento</span></td>
                                                <td>
                                                    <button class="btn btn-sm btn-outline-info"><i class="fas fa-eye"></i></button>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </section>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function gerarSaft() {
            const inicio = document.getElementById('dataInicio').value;
            const fim = document.getElementById('dataFim').value;
            
            if (!inicio || !fim) {
                Swal.fire('Erro', 'Por favor, selecione as datas de início e fim.', 'error');
                return;
            }

            window.location.href = `/api/saft/export?inicio=${inicio}&fim=${fim}`;
            Swal.fire('Sucesso', 'O download do ficheiro SAF-T AO 1.01 foi iniciado.', 'success');
        }

        async function submeterAgt() {
            const inicio = document.getElementById('dataInicio').value;
            const fim = document.getElementById('dataFim').value;
            
            if (!inicio || !fim) {
                Swal.fire('Erro', 'Por favor, selecione o período para submissão.', 'error');
                return;
            }

            document.getElementById('statusMessage').classList.remove('d-none');
            
            try {
                const response = await fetch(`/api/saft/enviar?inicio=${inicio}&fim=${fim}`, { method: 'POST' });
                const result = await response.text();
                
                document.getElementById('statusMessage').classList.add('d-none');
                
                Swal.fire({
                    title: 'Submetido com Sucesso!',
                    text: result,
                    icon: 'success',
                    confirmButtonText: 'OK'
                });
            } catch (error) {
                document.getElementById('statusMessage').classList.add('d-none');
                Swal.fire('Erro', 'Falha na comunicação com os servidores da AGT.', 'error');
            }
        }
    </script>
</body>
</html>
