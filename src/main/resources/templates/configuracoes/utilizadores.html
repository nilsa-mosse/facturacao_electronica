<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <section class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1><i class="fas fa-users-cog me-2"></i><span th:text="#{config.utilizadores.titulo}">Utilizadores e Perfis</span></h1>
                        </div>
                    </div>
                </div>
            </section>

            <section class="content">
                <div class="container-fluid">
                     <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        <i class="fas fa-check-circle me-1"></i>
                        <span th:text="${mensagem}">Operação realizada correctamente.</span>
                    </div>

                    <!-- Tabela de Utilizadores -->
                    <div class="card card-outline card-dark">
                         <div class="card-header border-0 d-flex justify-content-between align-items-center">
                            <h3 class="card-title" th:text="#{config.utilizadores.listagem}">Listagem de Utilizadores</h3>
                            <button class="btn btn-dark shadow-sm btn-sm rounded-pill px-4 ms-auto" onclick="novoUtilizador()">
                                <i class="fas fa-user-plus me-1"></i> Cadastrar Novo Utilizador
                            </button>
                        </div>
                        <div class="card-body table-responsive p-0">
                            <table class="table table-striped table-valign-middle">
                                 <thead>
                                    <tr>
                                        <th th:text="#{config.utilizadores.nome}">Nome</th>
                                        <th th:text="#{config.utilizadores.login}">Login</th>
                                        <th>Empresa</th>
                                        <th>Estabelecimentos</th>
                                        <th th:text="#{config.utilizadores.perfil}">Perfil (Role)</th>
                                        <th th:text="#{column.acoes}">Acções</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="u : ${utilizadores}">
                                        <td th:text="${u.nome}" class="fw-bold text-dark"></td>
                                        <td th:text="${u.login}" class="text-muted"></td>
                                        <td th:text="${u.empresa != null ? u.empresa.nome : 'N/A'}"></td>
                                        <td>
                                            <div class="d-flex flex-wrap gap-1">
                                                <span th:each="est : ${u.estabelecimentos}" 
                                                      class="badge bg-light border text-dark fw-normal"
                                                      th:text="${est.nome}"></span>
                                                <span th:if="${#lists.isEmpty(u.estabelecimentos)}" class="text-muted small italicText">Nenhum associado</span>
                                            </div>
                                        </td>
                                        <td>
                                            <span class="badge rounded-pill px-3 py-2 shadow-sm"
                                                th:classappend="${u.role == 'ADMIN' ? 'bg-danger' : 'bg-primary'}"
                                                th:text="${u.role}">ADMIN</span>
                                        </td>
                                         <td>
                                             <div class="d-flex gap-2">
                                                 <button class="btn btn-sm btn-outline-info rounded-pill px-3 shadow-sm btn-editar-local"
                                                         th:data-id="${u.id}"
                                                         th:data-nome="${u.nome}"
                                                         th:data-login="${u.login}"
                                                         th:data-role="${u.role}"
                                                         th:data-estabelecimentos="${#strings.arrayJoin(u.estabelecimentos.![id], ',')}"
                                                         title="Editar Utilizador">
                                                     <i class="fas fa-edit"></i>
                                                 </button>
                                                 <a th:href="@{'/configuracoes/utilizadores/eliminar/' + ${u.id}}"
                                                    class="btn btn-sm btn-outline-danger rounded-pill px-3 shadow-sm"
                                                    th:onclick="return confirm([[#{config.utilizadores.confirmar_eliminar}]])"
                                                    title="Eliminar Utilizador">
                                                    <i class="fas fa-trash"></i>
                                                 </a>
                                             </div>
                                         </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Modal Utilizador -->
                    <div class="modal fade" id="modalUtilizador" tabindex="-1" aria-labelledby="modalUtilizadorLabel" aria-hidden="true">
                        <div class="modal-dialog modal-lg">
                            <div class="modal-content">
                                <div class="modal-header bg-dark text-white">
                                    <h5 class="modal-title" id="formHeader">Novo Utilizador</h5>
                                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <form th:action="@{/configuracoes/utilizadores/salvar}" method="post">
                                    <input type="hidden" id="userId" name="id">
                                    <div class="modal-body">
                                        <div class="row g-3">
                                            <div class="col-md-6">
                                                <label class="form-label" th:text="#{config.utilizadores.nome}">Nome Completo</label>
                                                <input type="text" class="form-control" id="uNome" name="nome" required>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label" th:text="#{config.utilizadores.login}">Login de Acesso</label>
                                                <input type="text" class="form-control" id="uLogin" name="login" required>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label" th:text="#{config.utilizadores.senha}">Palavra-passe</label>
                                                <input type="password" class="form-control" id="uSenha" name="senha" placeholder="Palavra-passe">
                                                <small class="text-muted d-block" id="senhaHelp">Obrigatório para novos utilizadores.</small>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label" th:text="#{config.utilizadores.perfil}">Perfil (Role)</label>
                                                <select class="form-select" id="uRole" name="role" required>
                                                    <option value="OPERADOR">OPERADOR (Ponto de Venda)</option>
                                                    <option value="GESTOR">GESTOR (Gestão Operacional)</option>
                                                    <option value="CONSULTOR">CONSULTOR (Apenas Leitura)</option>
                                                    <option th:if="${isSuperAdmin}" value="ADMIN">ADMINISTRADOR (Gestão)</option>
                                                </select>
                                            </div>
                                            <div class="col-md-12 mt-3">
                                                <label class="form-label">Atribuir Estabelecimentos da Empresa</label>
                                                <select class="form-select" id="uEst" name="estabelecimentoIds" multiple="multiple" size="5">
                                                    <option th:each="est : ${estabelecimentos}" 
                                                            th:value="${est.id}" 
                                                            th:text="${est.nome} + ' (' + ${est.tipo} + ')'"></option>
                                                </select>
                                                <small class="text-info d-block mt-1"><i class="fas fa-info-circle me-1"></i>Estes utilizadores apenas verão dados relativos aos estabelecimentos selecionados.</small>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                                        <button type="submit" class="btn btn-dark shadow-sm">
                                            <i class="fas fa-save me-1"></i> Gravar Utilizador
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script th:inline="javascript">
        const modal = new bootstrap.Modal(document.getElementById('modalUtilizador'));

        $(document).ready(function() {
            $('.btn-editar-local').on('click', function() {
                const btn = $(this);
                limpar();
                document.getElementById('userId').value = btn.data('id');
                document.getElementById('uNome').value = btn.data('nome');
                document.getElementById('uLogin').value = btn.data('login');
                document.getElementById('uRole').value = btn.data('role');
                document.getElementById('formHeader').innerText = "Editar Utilizador";
                document.getElementById('uSenha').required = false;
                document.getElementById('senhaHelp').innerText = "Deixe vazio para manter a senha actual.";
                
                // Pré-selecionar estabelecimentos
                const ests = String(btn.data('estabelecimentos')).split(',');
                const estSelect = document.getElementById('uEst');
                for (let i = 0; i < estSelect.options.length; i++) {
                    if (ests.includes(estSelect.options[i].value)) {
                        estSelect.options[i].selected = true;
                    }
                }

                modal.show();
            });
        });

        function novoUtilizador() {
            limpar();
            modal.show();
        }

        function limpar() {
            document.getElementById('userId').value = "";
            document.getElementById('uNome').value = "";
            document.getElementById('uLogin').value = "";
            document.getElementById('uRole').selectedIndex = 0;
            document.getElementById('uSenha').value = "";
            document.getElementById('formHeader').innerText = "Novo Utilizador";
            document.getElementById('uSenha').required = true;
            document.getElementById('senhaHelp').innerText = "Obrigatório para novos utilizadores.";
            
            // Limpar estabelecimentos
            const estSelect = document.getElementById('uEst');
            for (let i = 0; i < estSelect.options.length; i++) {
                estSelect.options[i].selected = false;
            }
        }
    </script>
</body>

</html>
