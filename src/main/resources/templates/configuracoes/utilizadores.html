<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Utilizadores e Perfis</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
        crossorigin="anonymous">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous">

    <style>
        .main-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 250px;
            background-color: #2c3e50;
            color: #ecf0f1;
            z-index: 1000;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link {
            color: #bdc3c7;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link:hover {
            background-color: #34495e;
            color: #ffffff;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link.active {
            background-color: #2980b9;
            color: #ffffff;
        }

        .main-sidebar .user-panel {
            background-color: #34495e;
            padding: 10px;
            border-bottom: 1px solid #4b545c;
        }

        .content-wrapper {
            margin-left: 250px;
            padding: 20px;
        }
    </style>
</head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <aside th:replace="menu :: sidebar"></aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1><i class="fas fa-users-cog me-2"></i>Utilizadores e Perfis</h1>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    <strong>Sucesso!</strong> Operação realizada correctamente.
                </div>
                <div th:if="${param.deleted}" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    <strong>Eliminado!</strong> Utilizador removido com sucesso.
                </div>

                <!-- Tabela de Utilizadores -->
                <div class="card card-outline card-dark">
                    <div class="card-header border-0">
                        <h3 class="card-title">Listagem de Utilizadores</h3>
                    </div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-striped table-valign-middle">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Login</th>
                                    <th>Perfil (Role)</th>
                                    <th>Acções</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u : ${utilizadores}">
                                    <td th:text="${u.nome}">João Silva</td>
                                    <td th:text="${u.login}">jsilva</td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${u.role == 'ADMIN' ? 'bg-danger' : 'bg-info'}"
                                            th:text="${u.role}">ADMIN</span>
                                    </td>
                                    <td>
                                        <a th:href="@{'/configuracoes/utilizadores/eliminar/' + ${u.id}}"
                                            class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Tem certeza que deseja eliminar este utilizador?')">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Formulário Novo Utilizador -->
                <div class="card card-outline card-secondary">
                    <div class="card-header">
                        <h3 class="card-title">Novo Utilizador</h3>
                    </div>
                    <form th:action="@{/configuracoes/utilizadores/salvar}" th:object="${novoUsuario}" method="post">
                        <div class="card-body">
                            <div class="row">
                                <div class="form-group col-md-3">
                                    <label>Nome Completo</label>
                                    <input type="text" class="form-control" th:field="*{nome}" required>
                                </div>
                                <div class="form-group col-md-3">
                                    <label>Login de Acesso</label>
                                    <input type="text" class="form-control" th:field="*{login}" required>
                                </div>
                                <div class="form-group col-md-3">
                                    <label>Palavra-passe</label>
                                    <input type="password" class="form-control" th:field="*{senha}" required>
                                </div>
                                <div class="form-group col-md-3">
                                    <label>Perfil (Role)</label>
                                    <select class="form-select" th:field="*{role}">
                                        <option value="ADMIN">ADMIN</option>
                                        <option value="OPERADOR">OPERADOR</option>
                                        <option value="CONSULTOR">CONSULTOR</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button type="submit" class="btn btn-secondary"><i class="fas fa-save me-1"></i>Adicionar
                                Utilizador</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
