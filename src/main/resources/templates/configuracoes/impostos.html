<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <section class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1><i class="fas fa-percent me-2"></i><span th:text="#{config.impostos.titulo}">Impostos e Taxas</span></h1>
                        </div>
                    </div>
                </div>
            </section>

            <section class="content">
                <div class="container-fluid">
                     <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        <i class="fas fa-check-circle me-1"></i>
                        <span th:text="${mensagem}">Imposto salvo correctamente.</span>
                    </div>

                    <!-- Tabela de Impostos -->
                    <div class="card card-outline card-primary">
                         <div class="card-header">
                            <h3 class="card-title" th:text="#{config.impostos.configurados}">Impostos Configurados</h3>
                        </div>
                        <div class="card-body table-responsive p-0">
                            <table class="table table-hover table-striped table-valign-middle">
                                 <thead>
                                    <tr>
                                        <th>#</th>
                                        <th th:text="#{produto.label.nome}">Nome</th>
                                        <th th:text="#{financeiro.col.tipo}">Tipo</th>
                                        <th th:text="#{config.impostos.percentagem}">Percentagem</th>
                                        <th th:text="#{config.impostos.codigo_agt}">Código AGT</th>
                                        <th th:text="#{config.impostos.motivo_isencao}">Motivo de Isenção</th>
                                        <th th:text="#{column.acoes}">Acções</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="imp : ${impostos}">
                                        <td th:text="${imp.id}">1</td>
                                        <td th:text="${imp.nome}">IVA Normal</td>
                                        <td><span class="badge bg-info" th:text="${imp.tipo}">IVA</span></td>
                                        <td><span class="badge bg-success" th:text="${imp.percentagem + '%'}">14%</span>
                                        </td>
                                        <td th:text="${imp.codigoAgt}">NOR</td>
                                        <td th:text="${imp.motivoIsencao != null ? imp.motivoIsencao : '—'}">—</td>
                                        <td>
                                             <a th:href="@{'/configuracoes/impostos/eliminar/' + ${imp.id}}"
                                                class="btn btn-sm btn-outline-danger"
                                                th:onclick="return confirm([[#{config.impostos.confirmar_eliminar}]])">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Formulário Novo Imposto -->
                    <div class="card card-outline card-success">
                         <div class="card-header">
                            <h3 class="card-title" th:text="#{config.impostos.novo}">Adicionar Novo Imposto</h3>
                        </div>
                        <form th:action="@{/configuracoes/impostos/salvar}" th:object="${novoImposto}" method="post">
                            <div class="card-body">
                                 <div class="row">
                                    <div class="form-group col-md-4">
                                        <label th:text="#{config.impostos.label.nome}">Nome do Imposto</label>
                                        <input type="text" class="form-control" th:field="*{nome}"
                                            th:placeholder="#{produto.placeholder.nome}" required>
                                    </div>
                                    <div class="form-group col-md-4">
                                        <label th:text="#{financeiro.col.tipo}">Tipo</label>
                                        <select class="form-select" th:field="*{tipo}">
                                            <option value="IVA">IVA</option>
                                            <option value="IS">Imposto de Selo</option>
                                            <option value="IEC">Imposto Especial de Consumo</option>
                                            <option value="ISENTO">Isento</option>
                                        </select>
                                    </div>
                                    <div class="form-group col-md-4">
                                        <label th:text="#{config.impostos.percentagem}">Percentagem (%)</label>
                                        <input type="number" step="0.01" class="form-control" th:field="*{percentagem}"
                                            placeholder="14.00" required>
                                    </div>
                                </div>
                                 <div class="row mt-3">
                                    <div class="form-group col-md-4">
                                        <label th:text="#{config.impostos.codigo_agt}">Código AGT</label>
                                        <input type="text" class="form-control" th:field="*{codigoAgt}"
                                            placeholder="NOR, ISE, RED">
                                    </div>
                                    <div class="form-group col-md-8">
                                        <label th:text="#{config.impostos.motivo_isencao}">Motivo de Isenção (se aplicável)</label>
                                        <input type="text" class="form-control" th:field="*{motivoIsencao}">
                                    </div>
                                </div>
                            </div>
                             <div class="card-footer">
                                <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i><span th:text="#{config.impostos.btn.salvar}">Salvar
                                    Imposto</span></button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Scripts already loaded via menu :: head -->
</body>

</html>
