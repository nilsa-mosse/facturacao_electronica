<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Impostos e Taxas</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
        crossorigin="anonymous">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous">

    <style>
        .main-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 250px;
            background-color: #2c3e50;
            color: #ecf0f1;
            z-index: 1000;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link {
            color: #bdc3c7;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link:hover {
            background-color: #34495e;
            color: #ffffff;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link.active {
            background-color: #2980b9;
            color: #ffffff;
        }

        .main-sidebar .user-panel {
            background-color: #34495e;
            padding: 10px;
            border-bottom: 1px solid #4b545c;
        }

        .content-wrapper {
            margin-left: 250px;
            padding: 20px;
        }
    </style>
</head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <aside th:replace="menu :: sidebar"></aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1><i class="fas fa-percent me-2"></i>Impostos e Taxas</h1>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    <strong>Sucesso!</strong> Imposto salvo correctamente.
                </div>
                <div th:if="${param.deleted}" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    <strong>Eliminado!</strong> Imposto removido com sucesso.
                </div>

                <!-- Tabela de Impostos -->
                <div class="card card-outline card-primary">
                    <div class="card-header">
                        <h3 class="card-title">Impostos Configurados</h3>
                    </div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover table-striped table-valign-middle">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Nome</th>
                                    <th>Tipo</th>
                                    <th>Percentagem</th>
                                    <th>Código AGT</th>
                                    <th>Motivo de Isenção</th>
                                    <th>Acções</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="imp : ${impostos}">
                                    <td th:text="${imp.id}">1</td>
                                    <td th:text="${imp.nome}">IVA Normal</td>
                                    <td><span class="badge bg-info" th:text="${imp.tipo}">IVA</span></td>
                                    <td><span class="badge bg-success" th:text="${imp.percentagem + '%'}">14%</span>
                                    </td>
                                    <td th:text="${imp.codigoAgt}">NOR</td>
                                    <td th:text="${imp.motivoIsencao != null ? imp.motivoIsencao : '—'}">—</td>
                                    <td>
                                        <a th:href="@{'/configuracoes/impostos/eliminar/' + ${imp.id}}"
                                            class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Tem certeza que deseja eliminar este imposto?')">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Formulário Novo Imposto -->
                <div class="card card-outline card-success">
                    <div class="card-header">
                        <h3 class="card-title">Adicionar Novo Imposto</h3>
                    </div>
                    <form th:action="@{/configuracoes/impostos/salvar}" th:object="${novoImposto}" method="post">
                        <div class="card-body">
                            <div class="row">
                                <div class="form-group col-md-4">
                                    <label>Nome do Imposto</label>
                                    <input type="text" class="form-control" th:field="*{nome}"
                                        placeholder="Ex: IVA Normal" required>
                                </div>
                                <div class="form-group col-md-4">
                                    <label>Tipo</label>
                                    <select class="form-select" th:field="*{tipo}">
                                        <option value="IVA">IVA</option>
                                        <option value="IS">Imposto de Selo</option>
                                        <option value="IEC">Imposto Especial de Consumo</option>
                                        <option value="ISENTO">Isento</option>
                                    </select>
                                </div>
                                <div class="form-group col-md-4">
                                    <label>Percentagem (%)</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{percentagem}"
                                        placeholder="Ex: 14.00" required>
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="form-group col-md-4">
                                    <label>Código AGT</label>
                                    <input type="text" class="form-control" th:field="*{codigoAgt}"
                                        placeholder="Ex: NOR, ISE, RED">
                                </div>
                                <div class="form-group col-md-8">
                                    <label>Motivo de Isenção (se aplicável)</label>
                                    <input type="text" class="form-control" th:field="*{motivoIsencao}"
                                        placeholder="Ex: Artigo 12.º do CIVA">
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i>Salvar
                                Imposto</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
