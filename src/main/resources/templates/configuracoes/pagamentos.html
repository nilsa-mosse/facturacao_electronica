<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <section class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1><i class="fas fa-credit-card me-2"></i><span th:text="#{config.pagamentos.titulo}">Métodos de Pagamento</span></h1>
                        </div>
                    </div>
                </div>
            </section>

            <section class="content">
                <div class="container-fluid">
                     <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        <i class="fas fa-check-circle me-1"></i>
                        <span th:text="${mensagem}">Método de pagamento salvo correctamente.</span>
                    </div>

                    <!-- Tabela de Métodos de Pagamento -->
                    <div class="card card-outline card-primary">
                         <div class="card-header">
                            <h3 class="card-title" th:text="#{config.pagamentos.registados}">Métodos de Pagamento Registados</h3>
                        </div>
                        <div class="card-body table-responsive p-0">
                            <table class="table table-hover table-striped table-valign-middle">
                                 <thead>
                                    <tr>
                                        <th>#</th>
                                        <th th:text="#{produto.label.nome}">Nome</th>
                                        <th th:text="#{config.impostos.codigo_agt}">Código AGT</th>
                                        <th th:text="#{config.series.estado}">Estado</th>
                                        <th th:text="#{column.acoes}">Acções</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="mp : ${metodos}">
                                        <td th:text="${mp.id}">1</td>
                                        <td th:text="${mp.nome}">Numerário</td>
                                        <td><span class="badge bg-info" th:text="${mp.codigoAgt}">NU</span></td>
                                        <td>
                                             <span class="badge"
                                                th:classappend="${mp.activo ? 'bg-success' : 'bg-danger'}"
                                                th:text="${mp.activo ? #messages.msg('config.series.activa') : #messages.msg('config.series.inactiva')}">Activo</span>
                                        </td>
                                        <td>
                                             <a th:href="@{'/configuracoes/pagamentos/eliminar/' + ${mp.id}}"
                                                class="btn btn-sm btn-outline-danger"
                                                th:onclick="return confirm([[#{config.pagamentos.confirmar_eliminar}]])">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Formulário Novo Método -->
                    <div class="card card-outline card-success">
                         <div class="card-header">
                            <h3 class="card-title" th:text="#{config.pagamentos.novo}">Adicionar Novo Método de Pagamento</h3>
                        </div>
                        <form th:action="@{/configuracoes/pagamentos/salvar}" th:object="${novoMetodo}" method="post">
                            <div class="card-body">
                                 <div class="row">
                                    <div class="form-group col-md-4">
                                        <label th:text="#{produto.label.nome}">Nome</label>
                                        <input type="text" class="form-control" th:field="*{nome}" required>
                                    </div>
                                    <div class="form-group col-md-4">
                                        <label th:text="#{config.impostos.codigo_agt}">Código AGT</label>
                                        <select class="form-select" th:field="*{codigoAgt}">
                                            <option value="NU">NU - Numerário</option>
                                            <option value="CC">CC - Cartão de Crédito</option>
                                            <option value="CD">CD - Cartão de Débito</option>
                                            <option value="CH">CH - Cheque</option>
                                            <option value="TB">TB - Transferência Bancária</option>
                                            <option value="TR">TR - Ticket de Refeição</option>
                                            <option value="MC">MC - Multicaixa</option>
                                            <option value="OU">OU - Outro</option>
                                        </select>
                                    </div>
                                    <div class="form-group col-md-4">
                                        <label th:text="#{config.series.estado}">Estado</label>
                                        <select class="form-select" th:field="*{activo}">
                                            <option value="true" th:text="#{config.series.activa}">Activo</option>
                                            <option value="false" th:text="#{config.series.inactiva}">Inactivo</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                             <div class="card-footer">
                                <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i><span th:text="#{config.pagamentos.btn.salvar}">Salvar
                                    Método</span></button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Scripts already loaded via menu :: head -->
</body>

</html>
