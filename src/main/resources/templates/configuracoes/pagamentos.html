<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <section class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1><i class="fas fa-credit-card me-2"></i>Métodos de Pagamento</h1>
                        </div>
                    </div>
                </div>
            </section>

            <section class="content">
                <div class="container-fluid">
                    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        <strong>Sucesso!</strong> Método de pagamento salvo correctamente.
                    </div>
                    <div th:if="${param.deleted}" class="alert alert-warning alert-dismissible fade show" role="alert">
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        <strong>Eliminado!</strong> Método de pagamento removido com sucesso.
                    </div>

                    <!-- Tabela de Métodos de Pagamento -->
                    <div class="card card-outline card-primary">
                        <div class="card-header">
                            <h3 class="card-title">Métodos de Pagamento Registados</h3>
                        </div>
                        <div class="card-body table-responsive p-0">
                            <table class="table table-hover table-striped table-valign-middle">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Nome</th>
                                        <th>Código AGT</th>
                                        <th>Estado</th>
                                        <th>Acções</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="mp : ${metodos}">
                                        <td th:text="${mp.id}">1</td>
                                        <td th:text="${mp.nome}">Numerário</td>
                                        <td><span class="badge bg-info" th:text="${mp.codigoAgt}">NU</span></td>
                                        <td>
                                            <span class="badge"
                                                th:classappend="${mp.activo ? 'bg-success' : 'bg-danger'}"
                                                th:text="${mp.activo ? 'Activo' : 'Inactivo'}">Activo</span>
                                        </td>
                                        <td>
                                            <a th:href="@{'/configuracoes/pagamentos/eliminar/' + ${mp.id}}"
                                                class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Tem certeza que deseja eliminar este método?')">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Formulário Novo Método -->
                    <div class="card card-outline card-success">
                        <div class="card-header">
                            <h3 class="card-title">Adicionar Novo Método de Pagamento</h3>
                        </div>
                        <form th:action="@{/configuracoes/pagamentos/salvar}" th:object="${novoMetodo}" method="post">
                            <div class="card-body">
                                <div class="row">
                                    <div class="form-group col-md-4">
                                        <label>Nome</label>
                                        <input type="text" class="form-control" th:field="*{nome}"
                                            placeholder="Ex: Numerário, Transferência Bancária" required>
                                    </div>
                                    <div class="form-group col-md-4">
                                        <label>Código AGT</label>
                                        <select class="form-select" th:field="*{codigoAgt}">
                                            <option value="NU">NU - Numerário</option>
                                            <option value="CC">CC - Cartão de Crédito</option>
                                            <option value="CD">CD - Cartão de Débito</option>
                                            <option value="CH">CH - Cheque</option>
                                            <option value="TB">TB - Transferência Bancária</option>
                                            <option value="TR">TR - Ticket de Refeição</option>
                                            <option value="MC">MC - Multicaixa</option>
                                            <option value="OU">OU - Outro</option>
                                        </select>
                                    </div>
                                    <div class="form-group col-md-4">
                                        <label>Estado</label>
                                        <select class="form-select" th:field="*{activo}">
                                            <option value="true">Activo</option>
                                            <option value="false">Inactivo</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer">
                                <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i>Salvar
                                    Método</button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Scripts already loaded via menu :: head -->
</body>

</html>
