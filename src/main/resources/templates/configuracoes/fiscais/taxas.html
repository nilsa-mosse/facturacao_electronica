<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper px-4 py-2">
            <div class="content-header p-0 mb-4">
                <div class="container-fluid">
                    <div class="row align-items-center">
                        <div class="col-sm-6">
                            <h1 class="fw-bold"><i class="fas fa-hand-holding-usd text-warning me-2"></i><span th:text="#{menu.configuracoes.fiscais.taxas}">Taxas e Emolumentos</span></h1>
                            <p class="text-muted mb-0" th:text="#{config.fiscais.taxas.subtitulo}">Configuração de taxas especiais e emolumentos aduaneiros.</p>
                        </div>
                    </div>
                </div>
            </div>

            <section class="content">
                <div class="container-fluid">
                    <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 mb-4" role="alert">
                        <i class="fas fa-check-circle me-2"></i>
                        <span th:text="${mensagem}">Operação realizada com sucesso.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div class="row g-4">
                        <div class="col-lg-8">
                            <div class="card shadow-sm border-0">
                                <div class="card-header bg-white border-0 py-3">
                                    <h3 class="card-title fw-bold"><i class="fas fa-list-ul me-2"></i><span th:text="#{config.fiscais.taxas.ativas}">Taxas Activas</span></h3>
                                </div>
                                <div class="card-body p-0">
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle mb-0">
                                            <thead class="table-light text-muted small text-uppercase">
                                                <tr>
                                                    <th class="ps-4" th:text="#{config.fiscais.taxas.col.taxa}">Taxa</th>
                                                    <th th:text="#{config.fiscais.taxas.col.codigo}">Código</th>
                                                    <th th:text="#{config.fiscais.taxas.col.valor}">Valor/Percentual</th>
                                                    <th th:text="#{config.fiscais.taxas.col.estado}">Estado</th>
                                                    <th class="text-end pe-4" th:text="#{column.acoes}">Acções</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="t : ${taxas}">
                                                    <td class="ps-4 fw-bold" th:text="${t.nome}">IEC</td>
                                                    <td th:text="${t.codigo}">IEC-01</td>
                                                    <td>
                                                        <span th:text="${t.valor}">0.00</span>
                                                        <span th:text="${t.percentual ? '%' : ' Kz'}"></span>
                                                    </td>
                                                    <td>
                                                        <span th:if="${t.activo}" class="badge bg-soft-success text-success px-2" th:text="#{config.series.activa}">Activo</span>
                                                        <span th:unless="${t.activo}" class="badge bg-soft-danger text-danger px-2" th:text="#{config.series.inactiva}">Inactivo</span>
                                                    </td>
                                                    <td class="text-end pe-4">
                                                        <a th:href="@{'/configuracoes/fiscais/taxas/eliminar/' + ${t.id}}" class="btn btn-sm btn-outline-danger border-0 rounded-circle"><i class="fas fa-trash"></i></a>
                                                    </td>
                                                </tr>
                                                <tr th:if="${#lists.isEmpty(taxas)}">
                                                    <td colspan="5" class="text-center py-5 text-muted" th:text="#{config.fiscais.taxas.msg.nenhuma}">Nenhuma taxa configurada.</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-4">
                            <div class="card shadow-sm border-0">
                                <div class="card-header bg-white border-0 py-3">
                                    <h3 class="card-title fw-bold"><i class="fas fa-plus-circle me-2"></i><span th:text="#{config.fiscais.taxas.nova}">Nova Taxa</span></h3>
                                </div>
                                <form th:action="@{/configuracoes/fiscais/taxas/salvar}" th:object="${novaTaxa}" method="post">
                                    <div class="card-body">
                                        <div class="mb-3">
                                            <label class="form-label fw-bold small text-muted text-uppercase" th:text="#{config.fiscais.taxas.label.nome}">Nome da Taxa</label>
                                            <input type="text" class="form-control" th:field="*{nome}" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label fw-bold small text-muted text-uppercase" th:text="#{config.fiscais.taxas.label.codigo}">Código</label>
                                            <input type="text" class="form-control" th:field="*{codigo}" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label fw-bold small text-muted text-uppercase" th:text="#{config.fiscais.taxas.label.valor}">Valor</label>
                                            <input type="number" step="0.01" class="form-control" th:field="*{valor}" required>
                                        </div>
                                        <div class="mb-3 form-check">
                                            <input type="checkbox" class="form-check-input" th:field="*{percentual}" id="isPercentual">
                                            <label class="form-check-label" for="isPercentual" th:text="#{config.fiscais.taxas.label.percentual}">É um valor percentual?</label>
                                        </div>
                                    </div>
                                    <div class="card-footer bg-white border-0 pb-4">
                                        <button type="submit" class="btn btn-warning w-100 py-2 fw-bold shadow-sm">
                                            <i class="fas fa-save me-2"></i><span th:text="#{config.fiscais.taxas.btn.salvar}">Salvar Taxa</span>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
