<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper px-4 py-2">
            <div class="content-header p-0 mb-4">
                <div class="container-fluid">
                    <div class="row align-items-center">
                        <div class="col-sm-6">
                            <h1 class="fw-bold"><i class="fas fa-hand-holding-usd text-danger me-2"></i><span th:text="#{menu.configuracoes.fiscais.retencoes}">Retenções na Fonte</span></h1>
                            <p class="text-muted mb-0" th:text="#{config.fiscais.retencoes.subtitulo}">Gestão de percentagens de retenção de impostos (IRT, Imposto Industrial, etc.).</p>
                        </div>
                    </div>
                </div>
            </div>

            <section class="content">
                <div class="container-fluid">
                    <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 mb-4" role="alert">
                        <i class="fas fa-check-circle me-2"></i>
                        <span th:text="${mensagem}">Operação realizada com sucesso.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div class="row g-4">
                        <div class="col-lg-8">
                            <div class="card shadow-sm border-0 h-100">
                                <div class="card-header bg-white border-0 py-3">
                                    <h3 class="card-title fw-bold"><i class="fas fa-list me-2"></i><span th:text="#{config.fiscais.retencoes.ativas}">Retenções Activas</span></h3>
                                </div>
                                <div class="card-body p-0">
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle mb-0">
                                            <thead class="table-light text-muted small text-uppercase">
                                                <tr>
                                                    <th class="ps-4" th:text="#{config.fiscais.retencoes.col.imposto}">Imposto/Retenção</th>
                                                    <th th:text="#{config.fiscais.retencoes.col.percentagem}">Percentagem (%)</th>
                                                    <th th:text="#{config.fiscais.retencoes.col.estado}">Estado</th>
                                                    <th class="text-end pe-4" th:text="#{column.acoes}">Acções</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="r : ${retencoes}">
                                                    <td class="ps-4 fw-bold" th:text="${r.nome}">IRT</td>
                                                    <td th:text="${r.percentagem + '%'}">6.5%</td>
                                                    <td>
                                                        <span th:if="${r.activo}" class="badge bg-soft-success text-success px-2" th:text="#{config.series.activa}">Activo</span>
                                                        <span th:unless="${r.activo}" class="badge bg-soft-danger text-danger px-2" th:text="#{config.series.inactiva}">Inactivo</span>
                                                    </td>
                                                    <td class="text-end pe-4">
                                                        <a th:href="@{'/configuracoes/fiscais/retencoes/eliminar/' + ${r.id}}" class="btn btn-sm btn-outline-danger border-0 rounded-circle"><i class="fas fa-trash"></i></a>
                                                    </td>
                                                </tr>
                                                <tr th:if="${#lists.isEmpty(retencoes)}">
                                                    <td colspan="4" class="text-center py-5 text-muted" th:text="#{config.fiscais.retencoes.msg.nenhuma}">Nenhuma retenção configurada.</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-4">
                            <div class="card shadow-sm border-0">
                                <div class="card-header bg-white border-0 py-3">
                                    <h3 class="card-title fw-bold"><i class="fas fa-plus-circle me-2"></i><span th:text="#{config.fiscais.retencoes.nova}">Nova Retenção</span></h3>
                                </div>
                                <form th:action="@{/configuracoes/fiscais/retencoes/salvar}" th:object="${novaRetencao}" method="post">
                                    <div class="card-body">
                                        <div class="mb-3">
                                            <label class="form-label fw-bold small text-muted text-uppercase" th:text="#{config.fiscais.retencoes.label.nome}">Nome da Retenção</label>
                                            <input type="text" class="form-control" th:field="*{nome}" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label fw-bold small text-muted text-uppercase" th:text="#{config.fiscais.retencoes.label.percentagem}">Percentagem (%)</label>
                                            <input type="number" step="0.01" class="form-control" th:field="*{percentagem}" required>
                                        </div>
                                        <div class="form-check mb-3">
                                            <input type="checkbox" class="form-check-input" th:field="*{activo}" id="retencaoActiva" checked>
                                            <label class="form-check-label" for="retencaoActiva" th:text="#{config.fiscais.retencoes.label.activo}">Activo</label>
                                        </div>
                                    </div>
                                    <div class="card-footer bg-white border-0 pb-4">
                                        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold shadow-sm">
                                            <i class="fas fa-save me-2"></i><span th:text="#{config.fiscais.retencoes.btn.salvar}">Salvar Retenção</span>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
