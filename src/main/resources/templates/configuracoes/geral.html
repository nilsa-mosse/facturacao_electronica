<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
    <nav th:replace="menu :: topbar"></nav>
    <aside th:replace="menu :: sidebar"></aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <h1><i class="fas fa-cogs me-2"></i><span th:text="#{config.geral.titulo}">Parâmetros Gerais</span></h1>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                 <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    <i class="fas fa-check-circle me-1"></i>
                    <span th:text="${mensagem}">Configurações actualizadas com sucesso!</span>
                </div>

                <div class="card card-outline card-primary">
                     <div class="card-header">
                        <h3 class="card-title" th:text="#{config.geral.preferencias}">Preferências do Sistema</h3>
                    </div>
                    <form th:action="@{/configuracoes/geral/salvar}" th:object="${sistema}" method="post">
                        <div class="card-body">
                            <div class="row">
                                 <div class="form-group col-md-6">
                                    <label th:text="#{config.geral.nome_sistema}">Nome do Sistema</label>
                                    <input type="text" class="form-control" th:field="*{nome}">
                                </div>
                                <div class="form-group col-md-6">
                                    <label th:text="#{config.geral.tema}">Modo de Visualização (Tema)</label>
                                    <select class="form-select" th:field="*{tema}" id="temaSelector">
                                        <option value="light" th:text="#{config.geral.tema.light}">Modo Claro (Padrão)</option>
                                        <option value="dark" th:text="#{config.geral.tema.dark}">Modo Escuro</option>
                                    </select>
                                    <small class="text-muted" th:text="#{config.geral.tema.hint}">A alteração será aplicada globalmente após salvar.</small>
                                </div>
                            </div>
                            <div class="row mt-3">
                                 <div class="form-group col-md-6">
                                    <label th:text="#{config.geral.email_suporte}">Email de Suporte</label>
                                    <input type="email" class="form-control" th:field="*{emailSuporte}">
                                </div>
                                <div class="form-group col-md-6 mt-4">
                                    <div class="custom-control custom-switch">
                                        <input type="checkbox" class="custom-control-input" id="backup"
                                            th:field="*{backup}">
                                        <label class="custom-control-label" for="backup" th:text="#{config.geral.backup}">Backup Automático
                                            Diário</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                         <div class="card-footer">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i><span th:text="#{config.geral.btn.aplicar}">Aplicar Alterações</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
    </div>
<!-- Scripts already loaded via menu :: head -->
    <script>
        // Pré-visualização imediata ao mudar o select (opcional)
        document.getElementById('temaSelector').addEventListener('change', function () {
            if (this.value === 'dark') {
                document.body.classList.add('dark-mode');
                const sidebar = document.querySelector('.main-sidebar');
                if (sidebar) sidebar.classList.replace('sidebar-light-primary', 'sidebar-dark-primary');
            } else {
                document.body.classList.remove('dark-mode');
                const sidebar = document.querySelector('.main-sidebar');
                if (sidebar) sidebar.classList.replace('sidebar-dark-primary', 'sidebar-light-primary');
            }
        });
    </script>
</body>

</html>
