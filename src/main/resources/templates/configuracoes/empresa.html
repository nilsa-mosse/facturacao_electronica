<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Dados da Empresa</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
        crossorigin="anonymous">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous">

    <style>
        .main-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 250px;
            background-color: #2c3e50;
            color: #ecf0f1;
            z-index: 1000;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link {
            color: #bdc3c7;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link:hover {
            background-color: #34495e;
            color: #ffffff;
        }

        .main-sidebar .nav-sidebar>.nav-item>.nav-link.active {
            background-color: #2980b9;
            color: #ffffff;
        }

        .main-sidebar .user-panel {
            background-color: #34495e;
            padding: 10px;
            border-bottom: 1px solid #9ea1a4;
        }

        .content-wrapper {
            margin-left: 250px;
            padding: 20px;
        }
    </style>
</head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <aside th:replace="menu :: sidebar"></aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1><i class="fas fa-building me-2"></i>Dados da Empresa</h1>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    <strong>Sucesso!</strong> Dados salvos correctamente.
                </div>

                <div class="card card-outline card-info">
                    <div class="card-header">
                        <h3 class="card-title">Informações Gerais</h3>
                    </div>
                    <form th:action="@{/configuracoes/empresa/salvar}" th:object="${empresa}" method="post">
                        <div class="card-body">
                            <div class="row">
                                <div class="form-group col-md-4">
                                    <label>Nome Comercial</label>
                                    <input type="text" class="form-control" th:field="*{nome}" required>
                                </div>
                                <div class="form-group col-md-4">
                                    <label>NIF (Número de Identificação Fiscal)</label>
                                    <input type="text" class="form-control" th:field="*{nif}"
                                        placeholder="Ex: 5000123456" required>
                                </div>
                                <div class="form-group col-md-4">
                                    <label>E-mail</label>
                                    <input type="email" class="form-control" th:field="*{email}">
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="form-group col-md-4">
                                    <label>Telefone</label>
                                    <input type="text" class="form-control" th:field="*{telefone}">
                                </div>
                                <div class="form-group col-md-4">
                                    <label>Website</label>
                                    <input type="text" class="form-control" th:field="*{website}">
                                </div>
                                <div class="form-group col-md-4">
                                    <label>Logotipo (URL)</label>
                                    <input type="text" class="form-control" th:field="*{logotipo}">
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="form-group col-12">
                                    <label>Endereço Completo</label>
                                    <textarea class="form-control" th:field="*{endereco}" rows="2"></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button type="submit" class="btn btn-info"><i class="fas fa-save me-1"></i>Actualizar
                                Empresa</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
