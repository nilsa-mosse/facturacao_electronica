<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>

        <div class="content-wrapper">
            <section class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1><i class="fas fa-building me-2"></i><span th:text="#{config.empresa.titulo}">Dados da Empresa</span></h1>
                        </div>
                    </div>
                </div>
            </section>

            <section class="content">
                <div class="container-fluid">
                     <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        <i class="fas fa-check-circle me-1"></i>
                        <span th:text="${mensagem}">Dados salvos correctamente.</span>
                    </div>

                    <div class="card card-outline card-info">
                         <div class="card-header">
                            <h3 class="card-title" th:text="#{config.empresa.info_geral}">Informações Gerais</h3>
                        </div>
                        <form th:action="@{/configuracoes/empresa/salvar}" th:object="${empresa}" method="post" enctype="multipart/form-data">
                            <input type="hidden" th:field="*{id}" />
                            <input type="hidden" th:field="*{logotipo}" />
                            <div class="card-body">
                                <div class="row">
                                     <div class="form-group col-md-4">
                                        <label th:text="#{config.empresa.nome}">Nome Comercial</label>
                                        <input type="text" class="form-control" th:field="*{nome}" required>
                                    </div>
                                     <div class="form-group col-md-4">
                                         <label th:text="#{config.empresa.nif}">NIF (Número de Identificação Fiscal)</label>
                                         <input type="text" class="form-control" th:field="*{nif}"
                                             th:placeholder="#{produto.placeholder.codigoBarra}" required>
                                     </div>
                                     <div class="form-group col-md-4">
                                         <label th:text="#{config.empresa.email}">E-mail</label>
                                         <input type="email" class="form-control" th:field="*{email}">
                                     </div>
                                </div>
                                <div class="row mt-3">
                                     <div class="form-group col-md-4">
                                         <label th:text="#{config.empresa.telefone}">Telefone</label>
                                         <input type="text" class="form-control" th:field="*{telefone}">
                                     </div>
                                     <div class="form-group col-md-4">
                                         <label th:text="#{config.empresa.website}">Website</label>
                                         <input type="text" class="form-control" th:field="*{website}">
                                     </div>
                                     <div class="form-group col-md-4">
                                         <label th:text="#{config.empresa.logotipo}">Carregar Logotipo</label>
                                         <div class="d-flex align-items-center gap-3">
                                            <input type="file" name="logoFile" class="form-control" accept="image/*">
                                            <div th:if="*{logotipo != null and !logotipo.isEmpty()}" class="border rounded bg-light p-1" title="Logotipo actual">
                                                <img th:src="*{logotipo}" alt="Logo" style="height: 38px; max-width: 60px; object-fit: contain;"
                                                     onerror="this.parentElement.style.display='none'">
                                            </div>
                                         </div>
                                         <small class="text-muted" th:if="*{logotipo != null and !logotipo.isEmpty()}"
                                                th:text="*{logotipo}"></small>
                                     </div>
                                </div>
                                 <div class="row mt-3">
                                      <div class="form-group col-md-8">
                                          <label th:text="#{config.empresa.endereco}">Endereço Completo</label>
                                          <textarea class="form-control" th:field="*{endereco}" rows="2"></textarea>
                                      </div>
                                      <div class="form-group col-md-4">
                                          <label>Regime Fiscal</label>
                                          <select class="form-control select2" th:field="*{regimeFiscal}">
                                              <option value="" disabled>Seleccione um regime...</option>
                                              <option th:each="r : ${regimes}" th:value="${r.codigo}" th:text="${r.nome}"></option>
                                          </select>
                                          <small class="text-muted"><a th:href="@{/configuracoes/fiscais/regime-fiscal}" class="text-info"><i class="fas fa-external-link-alt me-1"></i>Gerir Regimes</a></small>
                                      </div>
                                 </div>
                            </div>
                             <div class="card-footer">
                                <button type="submit" class="btn btn-info"><i class="fas fa-save me-1"></i><span th:text="#{config.empresa.btn.actualizar}">Actualizar Empresa</span></button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- JavaScript -->
    <!-- Scripts already loaded via menu :: head -->
</body>

</html>
