<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="menu :: head"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
  <nav th:replace="menu :: topbar"></nav>
  <aside th:replace="menu :: sidebar"></aside>

  <div class="content-wrapper px-4 py-3">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="h4 fw-bold mb-0"><i class="fas fa-sitemap text-primary me-2"></i>Departamentos</h1>
        <small class="text-muted">Gerir as divisões e secções da empresa</small>
      </div>
      <button class="btn btn-primary rounded-pill px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#modalDepartamento">
        <i class="fas fa-plus me-1"></i> Novo Departamento
      </button>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3 shadow-sm" role="alert">
      <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3 shadow-sm" role="alert">
      <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th class="ps-4">Nome</th>
              <th>Descrição</th>
              <th class="text-end pe-4">Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(departamentos)}">
              <td colspan="3" class="text-center py-5 text-muted">
                <i class="fas fa-folder-open fa-2x mb-2 d-block"></i>
                Nenhum departamento cadastrado. Clique em "Novo Departamento" para começar.
              </td>
            </tr>
            <tr th:each="dep : ${departamentos}">
              <td class="ps-4 fw-semibold" th:text="${dep.nome}"></td>
              <td class="text-muted" th:text="${dep.descricao != null ? dep.descricao : '-'}"></td>
              <td class="text-end pe-4">
                <button class="btn btn-sm btn-outline-primary rounded-circle me-1"
                        title="Editar"
                        th:data-id="${dep.id}"
                        th:data-nome="${dep.nome}"
                        th:data-descricao="${dep.descricao != null ? dep.descricao : ''}"
                        onclick="abrirEdicaoDep(this)">
                  <i class="fas fa-pen"></i>
                </button>
                <a th:href="@{/rh/departamentos/eliminar/{id}(id=${dep.id})}"
                   class="btn btn-sm btn-outline-danger rounded-circle"
                   title="Eliminar"
                   onclick="return confirm('Tem a certeza que deseja eliminar este departamento?')">
                  <i class="fas fa-trash"></i>
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal Departamento -->
  <div class="modal fade" id="modalDepartamento" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 shadow">
        <form th:action="@{/rh/departamentos/salvar}" method="POST">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold" id="modalDepTitle"><i class="fas fa-sitemap text-primary me-2"></i>Novo Departamento</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id" id="depId">
            <div class="mb-3">
              <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
              <input type="text" name="nome" id="depNome" class="form-control rounded-3" placeholder="ex: Recursos Humanos" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Descrição</label>
              <textarea name="descricao" id="depDescricao" class="form-control rounded-3" rows="2" placeholder="Descrição opcional do departamento"></textarea>
            </div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary rounded-pill px-4"><i class="fas fa-save me-1"></i>Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer th:replace="menu :: footer"></footer>
</div>

<script>
function abrirEdicaoDep(btn) {
  const id = btn.getAttribute('data-id');
  const nome = btn.getAttribute('data-nome');
  const descricao = btn.getAttribute('data-descricao');
  document.getElementById('depId').value = id;
  document.getElementById('depNome').value = nome;
  document.getElementById('depDescricao').value = descricao;
  document.getElementById('modalDepTitle').innerHTML = '<i class="fas fa-pen text-primary me-2"></i>Editar Departamento';
  new bootstrap.Modal(document.getElementById('modalDepartamento')).show();
}
document.getElementById('modalDepartamento').addEventListener('hidden.bs.modal', function() {
  document.getElementById('depId').value = '';
  document.getElementById('depNome').value = '';
  document.getElementById('depDescricao').value = '';
  document.getElementById('modalDepTitle').innerHTML = '<i class="fas fa-sitemap text-primary me-2"></i>Novo Departamento';
});
</script>
</body>
</html>
