<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">

    <!-- Sidebar e Wrapper do AdminLTE -->
    <aside th:replace="menu :: sidebar"></aside>

    <div class="content-wrapper">
        <section class="content">
            <div class="container-fluid pt-4">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card">
                    <div class="card-header d-flex align-items-center">
                        <i class="fas fa-undo fa-lg icon"></i>
                        <h3 class="mb-0">Devoluções</h3>
                    </div>
                    <div class="card-body">
                        <table class="table table-bordered table-striped table-hover">
                            <thead class="table-primary">
                                <tr>
                                    <th>ID</th>
                                    <th>Data</th>
                                    <th>Total</th>
                                    <th>Itens</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="devolucao : ${devolucoes}">
                                    <td th:text="${devolucao.id}"></td>
                                    <td th:text="${#temporals.format(devolucao.dataDevolucao, 'dd/MM/yyyy HH:mm')}">
                                    </td>
                                    <td><span class="badge bg-primary" th:text="${devolucao.total} + ' Kz'"></span></td>
                                    <td>
                                        <ul class="list-unstyled mb-0">
                                            <li th:each="item : ${devolucao.itens}">
                                                <span class="fw-bold" th:text="${item.nomeProduto}"></span>
                                                <span class="badge bg-secondary ms-2"
                                                    th:text="'x ' + ${item.quantidade}"></span>
                                                <span class="badge bg-info ms-2"
                                                    th:text="${item.subtotal} + ' Kz'"></span>
                                            </li>
                                        </ul>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
            </div>
        </section>
    </div>

    <!-- JS -->
    <!-- Scripts already loaded in menu :: head -->
</body>

</html>
