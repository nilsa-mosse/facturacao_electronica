<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
  <div class="wrapper">
    <!-- Topbar-->
    <nav th:replace="menu :: topbar"></nav>

    <!-- Sidebar -->
    <aside th:replace="menu :: sidebar" class="main-sidebar"></aside>

    <!-- Conteúdo principal -->
    <div class="content-wrapper">

      <div class="container-fluid px-4">

        <!-- Cabeçalho -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
          <h3 class="fw-bold mb-2 mb-md-0" th:text="#{produtos.gestao.titulo}">📦 Gestão de Produtos</h3>
          <a href="/produtos/novo" class="btn btn-primary shadow-sm" th:text="#{produtos.btn.novo}">+ Novo Produto</a>
        </div>

        <!-- Alerta de Mensagem -->
        <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${mensagem}">Mensagem de sucesso</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Filtros -->
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body">
            <form th:action="@{/produtos/listar}" method="get">
              <div class="row g-3">

                <div class="col-md-5">
                  <div class="input-group">
                    <span class="input-group-text bg-white">🔎</span>
                    <input type="text" name="busca" class="form-control" th:placeholder="#{produtos.filtro.pesquisar}"
                      th:value="${busca}">
                  </div>
                </div>

                <div class="col-md-4">
                  <select name="cat" class="form-select">
                    <option value="" th:selected="${categoriaSelecionada == null}" th:text="#{produtos.filtro.todas_categorias}">Todas categorias</option>
                    <option th:each="catObj : ${categorias}" th:value="${catObj.id}" th:text="${catObj.nome}"
                      th:selected="${catObj.id == categoriaSelecionada}">
                    </option>
                  </select>
                </div>

                <div class="col-md-3 d-grid">
                  <button class="btn btn-dark" th:text="#{produtos.filtro.btn}">Filtrar</button>
                </div>

              </div>
            </form>
          </div>
        </div>

        <!-- Tabela -->
        <div class="card shadow-sm border-0">
          <div class="card-body p-0 table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                 <tr>
                  <th th:text="#{pos.cart.produto}">Produto</th>
                  <th th:text="#{column.categoria}">Categoria</th>
                  <th th:text="#{listagem.produtos.sku}">Código</th>
                  <th th:text="#{column.preco}">Preço</th>
                  <th th:text="#{column.estoque}">Stock</th>
                  <th>Estado</th>
                  <th th:text="#{produto.iva}">IVA (%)</th>
                  <th class="text-end" th:text="#{column.acoes}">Ações</th>
                </tr>
              </thead>
              <tbody id="tabela-produtos">
                <tr th:each="produto : ${produtos}" th:id="'produto-' + ${produto.id}">
                  <td>
                    <div class="d-flex align-items-center gap-3">
                      <img th:if="${produto.imagemBlob != null}" th:src="@{/produto/imagem/{id}(id=${produto.id})}"
                        class="product-img">
                      <div>
                        <div class="fw-semibold" th:text="${produto.nome}"></div>
                        <small class="text-muted" th:text="${produto.descricao}"></small>
                      </div>
                    </div>
                  </td>
                   <td th:text="${produto.categoria != null ? produto.categoria.nome : #messages.msg('produtos.tabela.sem_categoria')}"></td>
                  <td th:text="${produto.codigoBarra}"></td>
                  <td><span class="badge bg-success" th:text="${produto.preco} + ' Kz'"></span></td>
                  <td>
                    <span class="badge" th:classappend="${produto.quantidadeEstoque != null && produto.quantidadeEstoque < 5} ? 'bg-danger' : 'bg-primary'"
                      th:text="${produto.quantidadeEstoque}"></span>
                  </td>
                  <td>
                    <span class="badge" th:classappend="${!produto.disponivel} ? 'bg-danger' : 'bg-success'"
                      th:text="${produto.estado != null ? produto.estado.nome : 'DISPONÍVEL'}"></span>
                  </td>
                  <td th:text="${produto.ivaPercentual != null ? produto.ivaPercentual + '%': '-'}"></td>
                  <td class="text-end">
                    <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal"
                      th:data-bs-target="${'#detalhesModal_' + produto.id}">✏️</button>
                    <button class="btn btn-sm btn-outline-danger"
                      th:onclick="|apagarProduto('${produto.id}')|">🗑️</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>

    <!-- MODAIS (Edit Produto) -->
    <div th:each="produto : ${produtos}">
      <div class="modal fade" th:id="${'detalhesModal_' + produto.id}">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <form th:action="@{/produtos/editar}" method="post" enctype="multipart/form-data"
              onsubmit="return atualizarProdutos(event, this)">
               <div class="modal-header">
                <h5 class="modal-title" th:text="#{produto.editar.titulo}">Editar Produto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <input type="hidden" name="id" th:value="${produto.id}">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label>Nome</label>
                    <input type="text" name="nome" class="form-control" th:value="${produto.nome}" required>
                  </div>
                  <div class="col-md-6">
                    <label>Preço</label>
                    <input type="number" name="preco" class="form-control" th:value="${produto.preco}" required>
                  </div>
                  <div class="col-md-12">
                    <label>Descrição</label>
                    <textarea name="descricao" class="form-control" rows="2" th:text="${produto.descricao}"
                      required></textarea>
                  </div>
                  <div class="col-md-6">
                    <label>Categoria</label>
                    <select name="categoriaId" class="form-select" required>
                      <option th:each="catObj : ${categorias}" th:value="${catObj.id}" th:text="${catObj.nome}"
                        th:selected="${produto.categoria != null && produto.categoria.id == catObj.id}"></option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label>Stock</label>
                    <input type="number" name="quantidadeEstoque" class="form-control"
                      th:value="${produto.quantidadeEstoque}" required>
                  </div>
                   <div class="col-md-6">
                    <label th:text="#{produto.codigo_barra}">Código de Barra</label>
                    <input type="text" name="codigoBarra" class="form-control" th:value="${produto.codigoBarra}"
                      required>
                  </div>
                  <div class="col-md-6">
                    <label th:text="#{produto.imagem}">Imagem</label>
                    <input type="file" name="imagem" class="form-control">
                  </div>
                </div>
              </div>
               <div class="modal-footer">
                <button class="btn btn-success" th:text="#{form.salvar}">Salvar</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{form.fechar}">Fechar</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <!-- Scripts already loaded in menu :: head -->
  <script th:src="@{/plugins/fontawesome/js/all.min.js}"></script>

   <script th:inline="javascript">
    function apagarProduto(id) {
      if (confirm([[#{msg.confirmar_excluir}]])) {
        fetch('/produtos/apagar/' + id)
          .then(response => {
            if (response.redirected || response.ok) {
              window.location.replace('/produtos/listar');
            } else {
              alert([[#{msg.erro_excluir}]]);
            }
          });
      }
    }

    function atualizarProdutos(event, form) {
      event.preventDefault();
      var formData = new FormData(form);
      fetch(form.action, { method: 'POST', body: formData })
        .then(response => {
          if (response.redirected || response.ok) {
            window.location.replace('/produtos/listar');
          } else {
            alert([[#{msg.erro_salvar}]]);
          }
        });
      return false;
    }
  </script>

</body>

</html>
