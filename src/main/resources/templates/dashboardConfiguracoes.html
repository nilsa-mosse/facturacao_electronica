<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout :: head"></head>

<body th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <main class="py-4">
        <div class="container-fluid px-4">
             <h3 class="fw-bold mb-4" th:text="#{dashboard.config.titulo}">Dashboard - Configurações</h3>

            <!-- Preferências do usuário -->
            <div class="card mb-4">
                 <div class="card-header" th:text="#{dashboard.config.user_prefs}">Preferências do Usuário</div>
                <div class="card-body">
                    <form>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                 <label th:text="#{clientes.col.nome}">Nome</label>
                                <input type="text" name="nome" class="form-control" th:value="${usuario.nome}">
                            </div>
                            <div class="col-md-6">
                                 <label th:text="#{clientes.col.email}">E-mail</label>
                                <input type="email" name="email" class="form-control" th:value="${usuario.email}">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                 <label th:text="#{menu.idioma}">Idioma</label>
                                <select name="idioma" class="form-select">
                                     <option value="pt" th:selected="${usuario.idioma == 'pt'}" th:text="#{idioma.pt}">Português</option>
                                    <option value="en" th:selected="${usuario.idioma == 'en'}" th:text="#{idioma.en}">Inglês</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                 <label th:text="#{config.utilizadores.col.senha}">Atualizar Senha</label>
                                <input type="password" name="senha" class="form-control" placeholder="Nova senha">
                            </div>
                        </div>
                         <button class="btn btn-primary" th:text="#{dashboard.config.btn.save_prefs}">Salvar Preferências</button>
                    </form>
                </div>
            </div>

            <!-- Parâmetros do sistema -->
            <div class="card mb-4">
                 <div class="card-header" th:text="#{dashboard.config.sys_params}">Parâmetros do Sistema</div>
                <div class="card-body">
                    <form>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                 <label th:text="#{dashboard.config.sys_params}">Nome do Sistema</label>
                                <input type="text" name="nomeSistema" class="form-control" th:value="${sistema.nome}">
                            </div>
                            <div class="col-md-6">
                                 <label th:text="#{config.agt.comun.col.versao}">Versão</label>
                                <input type="text" name="versao" class="form-control" th:value="${sistema.versao}"
                                    readonly>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                 <label th:text="#{clientes.col.email}">E-mail de suporte</label>
                                <input type="email" name="emailSuporte" class="form-control"
                                    th:value="${sistema.emailSuporte}">
                            </div>
                            <div class="col-md-6">
                                <label>Backup automático</label>
                                <select name="backup" class="form-select">
                                    <option value="true" th:selected="${sistema.backup}">Ativado</option>
                                    <option value="false" th:selected="${!sistema.backup}">Desativado</option>
                                </select>
                            </div>
                        </div>
                         <button class="btn btn-success" th:text="#{dashboard.config.btn.save_params}">Salvar Parâmetros</button>
                    </form>
                </div>
            </div>

            <!-- Integrações -->
            <div class="card mb-4">
                 <div class="card-header" th:text="#{dashboard.config.integrations}">Integrações</div>
                <div class="card-body">
                    <form>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label>API AGT</label>
                                <input type="text" name="apiAgt" class="form-control" th:value="${integracao.apiAgt}">
                            </div>
                            <div class="col-md-6">
                                <label>Token AGT</label>
                                <input type="text" name="tokenAgt" class="form-control"
                                    th:value="${integracao.tokenAgt}">
                            </div>
                        </div>
                         <button class="btn btn-info" th:text="#{dashboard.config.btn.save_integrations}">Salvar Integrações</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
