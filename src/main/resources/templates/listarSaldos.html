<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Saldos por Produto - eFacturacao</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #10b981;
            --dark: #0f172a;
            --bg: #f8fafc;
        }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(at 100% 0%, hsla(225,100%,94%,1) 0, transparent 50%), 
                              radial-gradient(at 0% 100%, hsla(225,100%,94%,1) 0, transparent 50%);
            font-family: 'Outfit', sans-serif; 
            color: var(--dark);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .premium-container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section { margin-bottom: 50px; }
        
        .balance-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            overflow: hidden;
            padding: 30px;
        }

        .search-bar {
            background: white;
            border-radius: 20px;
            padding: 15px 25px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            font-weight: 600;
            color: var(--dark);
        }

        .table {
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .table thead th {
            border: none;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            padding: 15px 25px;
        }

        .table tbody tr td {
            background: white;
            border: none;
            padding: 20px 25px;
            vertical-align: middle;
            transition: all 0.3s;
        }

        .table tbody tr:hover td { transform: scale(1.01); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); z-index: 10; cursor: pointer; }

        .table tbody tr td:first-child { border-top-left-radius: 16px; border-bottom-left-radius: 16px; }
        .table tbody tr td:last-child { border-top-right-radius: 16px; border-bottom-right-radius: 16px; }

        .qty-badge {
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--dark);
        }

        .qty-low { background: #fee2e2; color: #dc2626; }
        .qty-ok { background: #ecfdf5; color: #059669; }

        .btn-back {
            background: white;
            color: var(--dark);
            border-radius: 14px;
            padding: 10px 20px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }
        .btn-back:hover { background: #f8fafc; transform: translateX(-5px); }

        .row-out-of-stock td {
            background: #fff1f2 !important;
            border-bottom: 2px solid #fecaca !important;
        }
        
        .status-unavailable {
            background: #991b1b;
            color: white !important;
        }

    </style>
</head>
<body>
    <div class="premium-container">
        <div class="header-section">
            <a th:href="@{/dashboard}" class="btn-back mb-3"><i class="fas fa-arrow-left"></i> VOLTAR</a>
            <h1 class="fw-900 mb-0" style="letter-spacing: -1.5px; font-size: 3rem;">Saldos por <span style="color: var(--primary);">Produto</span></h1>
            <p class="text-muted fw-600">Visão consolidada do inventário disponível em tempo real.</p>
        </div>

        <div class="balance-card">
            <div class="search-bar">
                <i class="fas fa-search text-muted"></i>
                <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Pesquisar por nome, código ou descrição...">
            </div>

            <div class="table-responsive">
                <table class="table align-middle" id="productTable">
                    <thead>
                        <tr>
                            <th>Identificação</th>
                            <th>Categoria</th>
                            <th>Preço Unit.</th>
                            <th class="text-center">Stock Atual</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="produto : ${produtos}" 
                            th:classappend="${!produto.disponivel ? 'row-out-of-stock' : ''}">
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <div class="product-icon" style="width: 40px; height: 40px; background: #eff6ff; color: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                                        <i class="fas fa-tag"></i>
                                    </div>
                                    <div>
                                        <div class="fw-800" th:text="${produto.nome}">Produto</div>
                                        <div class="small text-muted fw-600" th:text="${produto.codigoBarra}">000000</div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="badge bg-light text-dark fw-700 px-2 py-1" th:text="${produto.categoria != null ? produto.categoria.nome : 'Sem Categoria'}">Geral</span>
                            </td>
                            <td class="fw-700" th:text="${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')} + ' Kz'">0,00 Kz</td>
                            <td class="text-center">
                                <span th:class="'qty-badge ' + (${!produto.disponivel} ? 'qty-low' : 'qty-ok')"
                                      th:text="${produto.quantidadeEstoque}">0</span>
                            </td>
                            <td>
                                <div th:if="${!produto.disponivel}" class="text-white bg-danger fw-700 small px-2 py-1 rounded">
                                    <i class="fas fa-times-circle me-1"></i> INDISPONÍVEL
                                </div>
                                <div th:if="${produto.disponivel}" class="text-success fw-700 small">
                                    <i class="fas fa-check-circle me-1"></i> DISPONÍVEL
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function filterProducts() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toLowerCase();
            const table = document.getElementById("productTable");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                const td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    const txtValue = td.textContent || td.innerText;
                    if (txtValue.toLowerCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }
            }
        }
    </script>
</body>
</html>
