<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head th:replace="menu :: head"></head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>
        <div class="content-wrapper">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-10">
                        <div class="card p-4">
                            <div class="card-header bg-transparent text-center">
                                <h3><i class="fas fa-info-circle"></i> Estado das Facturas AGT</h3>
                            </div>
                            <div class="card-body">
                                <table class="table table-hover align-middle">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Número</th>
                                            <th>Data Emissão</th>
                                            <th>Cliente</th>
                                            <th>Valor</th>
                                            <th>Estado</th>
                                            <th>Mensagem AGT</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="factura, iterStat : ${facturas}">
                                            <td th:text="${iterStat.count}"></td>
                                            <td th:text="${factura.numero}"></td>
                                            <td th:text="${#dates.format(factura.dataEmissao, 'dd/MM/yyyy')}"></td>
                                            <td th:text="${factura.nomeCliente}"></td>
                                            <td th:text="${factura.valorTotal}"></td>
                                            <td>
                                                <span th:if="${factura.estado} == 'EM_PROCESSAMENTO'"
                                                    class="badge bg-warning text-dark">Em processamento</span>
                                                <span th:if="${factura.estado} == 'VALIDADA'"
                                                    class="badge bg-success">Validada</span>
                                                <span th:if="${factura.estado} == 'REJEITADA'"
                                                    class="badge bg-danger">Rejeitada</span>
                                            </td>
                                            <td th:text="${factura.mensagemAGT}"></td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(facturas)}">
                                            <td colspan="7" class="text-center text-muted">Nenhuma factura eletrônica
                                                enviada para AGT.</td>
                                        </tr>
                                    </tbody>
                                </table>
                                <div class="text-end mt-3">
                                    <a th:href="@{/dashboard}" class="btn btn-secondary"><i
                                            class="fas fa-arrow-left"></i>
                                        Voltar</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Scripts already loaded in menu :: head -->
</body>

</html>
