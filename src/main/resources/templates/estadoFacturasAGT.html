<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado das Facturas AGT</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous">
    <style>
        .content-wrapper {
            padding: 40px 20px 20px 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .table thead {
            background: #4e73df;
            color: #fff;
        }

        .table tbody tr {
            background: #fff;
        }

        .table tbody tr:hover {
            background: #e3e9ff;
        }

        .badge {
            font-size: 1em;
        }

        @media (max-width: 900px) {
            .content-wrapper {
                padding: 10px;
            }
        }
    </style>
</head>

<body class="hold-transition sidebar-mini layout-fixed" th:classappend="${globalTema == 'dark' ? 'dark-mode' : ''}">
    <div class="wrapper">
        <nav th:replace="menu :: topbar"></nav>
        <aside th:replace="menu :: sidebar"></aside>
        <div class="content-wrapper">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-10">
                        <div class="card p-4">
                            <div class="card-header bg-transparent text-center">
                                <h3><i class="fas fa-info-circle"></i> Estado das Facturas AGT</h3>
                            </div>
                            <div class="card-body">
                                <table class="table table-hover align-middle">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Número</th>
                                            <th>Data Emissão</th>
                                            <th>Cliente</th>
                                            <th>Valor</th>
                                            <th>Estado</th>
                                            <th>Mensagem AGT</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="factura, iterStat : ${facturas}">
                                            <td th:text="${iterStat.count}"></td>
                                            <td th:text="${factura.numero}"></td>
                                            <td th:text="${#dates.format(factura.dataEmissao, 'dd/MM/yyyy')}"></td>
                                            <td th:text="${factura.nomeCliente}"></td>
                                            <td th:text="${factura.valorTotal}"></td>
                                            <td>
                                                <span th:if="${factura.estado} == 'EM_PROCESSAMENTO'"
                                                    class="badge bg-warning text-dark">Em processamento</span>
                                                <span th:if="${factura.estado} == 'VALIDADA'"
                                                    class="badge bg-success">Validada</span>
                                                <span th:if="${factura.estado} == 'REJEITADA'"
                                                    class="badge bg-danger">Rejeitada</span>
                                            </td>
                                            <td th:text="${factura.mensagemAGT}"></td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(facturas)}">
                                            <td colspan="7" class="text-center text-muted">Nenhuma factura eletrônica
                                                enviada para AGT.</td>
                                        </tr>
                                    </tbody>
                                </table>
                                <div class="text-end mt-3">
                                    <a th:href="@{/dashboard}" class="btn btn-secondary"><i
                                            class="fas fa-arrow-left"></i>
                                        Voltar</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
