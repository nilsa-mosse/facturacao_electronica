<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de Produto</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
</head>
<body>
<main class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title">Cadastro de Produto</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/salvarProduto}" method="post" enctype="multipart/form-data">
                            <div class="form-group mb-3">
                                <label for="nome">Nome:</label>
                                <input type="text" name="nome" id="nome" class="form-control" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="descricao">Descrição:</label>
                                <input type="text" name="descricao" id="descricao" class="form-control">
                            </div>
                            <div class="form-group mb-3">
                                <label for="preco">Preço:</label>
                                <input type="number" step="0.01" name="preco" id="preco" class="form-control" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="quantidadeEstoque">Estoque:</label>
                                <input type="number" name="quantidadeEstoque" id="quantidadeEstoque" class="form-control" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="codigoBarra">Código de Barras:</label>
                                <input type="text" name="codigoBarra" id="codigoBarra" class="form-control" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="imagem">Imagem:</label>
                                <input type="file" name="imagem" id="imagem" class="form-control">
                            </div>
                            <div class="form-group mb-3">
                                <label for="categoriaId">Categoria:</label>
                                <select name="categoriaId" id="categoriaId" class="form-control" required>
                                    <option value="">Selecione a categoria</option>
                                    <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nome}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary mt-2">Cadastrar Produto</button>
                        </form>
                        <div th:if="${mensagem}" class="alert alert-success mt-3" th:text="${mensagem}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
