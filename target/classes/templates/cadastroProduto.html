<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de Produto</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        crossorigin="anonymous">

  <!-- AdminLTE CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
        crossorigin="anonymous">

  <!-- Font Awesome CSS -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous">
    <style>
        body {
            background-color: #e9ecef;
            font-family: 'Roboto', sans-serif;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .card-header {
            background: linear-gradient(90deg, #007bff, #0056b3);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .form-label {
            font-weight: 500;
        }
        .form-control {
            border-radius: 10px;
            border: 1px solid #ced4da;
        }
        .btn-primary {
            background: linear-gradient(90deg, #007bff, #0056b3);
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #0056b3, #003f7f);
        }
        .alert-success {
            border-radius: 10px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
<aside th:replace="menu :: sidebar"></aside>
<main class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Cadastro de Produto</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/salvarProduto}" method="post" enctype="multipart/form-data">
                            <div class="form-group mb-3">
                                <label for="nome" class="form-label">Nome:</label>
                                <input type="text" name="nome" id="nome" class="form-control" placeholder="Digite o nome do produto" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="descricao" class="form-label">Descrição:</label>
                                <textarea name="descricao" id="descricao" class="form-control" rows="3" placeholder="Digite a descrição do produto"></textarea>
                            </div>
                            <div class="form-group mb-3">
                                <label for="preco" class="form-label">Preço:</label>
                                <input type="number" step="0.01" name="preco" id="preco" class="form-control" placeholder="Digite o preço" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="quantidadeEstoque" class="form-label">Estoque:</label>
                                <input type="number" name="quantidadeEstoque" id="quantidadeEstoque" class="form-control" placeholder="Digite a quantidade em estoque" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="codigoBarra" class="form-label">Código de Barras:</label>
                                <input type="text" name="codigoBarra" id="codigoBarra" class="form-control" placeholder="Digite o código de barras" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="imagem" class="form-label">Imagem:</label>
                                <input type="file" name="imagem" id="imagem" class="form-control">
                            </div>
                            <div class="form-group mb-3">
                                <label for="categoriaId" class="form-label">Categoria:</label>
                                <select name="categoriaId" id="categoriaId" class="form-select" required>
                                    <option value="">Selecione a categoria</option>
                                    <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nome}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-3">Cadastrar Produto</button>
                        </form>
                        <div th:if="${mensagem}" class="alert alert-success mt-3" th:text="${mensagem}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<!-- jQuery primeiro -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js" crossorigin="anonymous"></script>

<!-- Bootstrap bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- FontAwesome (opcional) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous"></script>

<!-- AdminLTE -->
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
