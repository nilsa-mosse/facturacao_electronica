<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Facturação Eletrónica</title>
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
            <li class="nav-item d-none d-sm-inline-block">
                <a href="#" class="nav-link">Home</a>
            </li>
        </ul>
    </nav>
    <!-- Sidebar -->
    <div th:replace="menu :: aside"></div>
    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <section class="content pt-4">
            <div class="container-fluid">
     
                <div class="row mt-4">
                    <div class="col-12">
                        <div class="card card-info">
                            <div class="card-header">
                                <h3 class="card-title">Todos os Produtos</h3>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-3 mb-4" th:each="produto : ${produtos}" th:if="${categoriaSelecionada == null or categoriaSelecionada == '' or produto.categoria.nome == categoriaSelecionada}">
                                        <div class="card h-100 shadow-sm border-0">
                                            <img th:if="${produto.imagemBlob}" th:src="@{/produto/imagem/{id}(id=${produto.id})}" class="card-img-top" alt="Imagem" style="height:180px;object-fit:cover;cursor:pointer;" th:onclick="|window.abrirProdutoModal(${produto.id})|">
                                            <img th:if="${produto.imagemBlob == null}" th:src="${produto.imagem}" class="card-img-top" alt="Imagem" style="height:180px;object-fit:cover;cursor:pointer;" th:onclick="|window.abrirProdutoModal(${produto.id})|">
                                            <div class="card-body">
                                                <h5 class="card-title text-primary" th:text="${produto.nome}"></h5>
                                                <p class="card-text text-muted" th:text="${produto.descricao}"></p>
                                                <p class="card-text"><strong>Preço:</strong> <span th:text="${produto.preco}"></span> Kz</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div th:if="${#lists.isEmpty(produtos)}" class="alert alert-info text-center mt-4">Nenhum produto encontrado.</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <!-- Footer -->
    <footer class="main-footer text-center">
        <strong>&copy; 2026 eFacturação.</strong> Todos os direitos reservados.
    </footer>
</div>
<!-- Modal para detalhes do produto e carrinho -->
<div class="modal fade" id="produtoModal" tabindex="-1" aria-labelledby="produtoModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="produtoModalLabel">Detalhes do Produto</h5>
        <!-- Corrigir botão de fechar para Bootstrap 4 -->
        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
      </div>
      <div class="modal-body">
        <div id="modalProdutoDetalhes"></div>
        <hr>
        <h5>Carrinho de Compras</h5>
        <div id="modalCarrinho"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        <button type="button" class="btn btn-success" id="finalizarCompraBtn">Finalizar Compra</button>
      </div>
    </div>
  </div>
</div>
<!-- AdminLTE JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/js/all.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    window.produtos = /*[[${produtos}]]*/ [];
    window.carrinho = /*[[${carrinho}]]*/ {};
    window.abrirProdutoModal = function(produtoId) {
        var produto = window.produtos.find(function(p) { return p.id == produtoId; });
        var html = '';
        if (produto) {
            html += '<div class="row">';
            html += '<div class="col-md-4"><img src="/produto/imagem/' + produto.id + '" class="img-fluid" alt="Imagem"></div>';
            html += '<div class="col-md-8">';
            html += '<h5>' + (produto.nome || '-') + '</h5>';
            html += '<p>' + (produto.descricao || '-') + '</p>';
            html += '<p><strong>Preço:</strong> ' + (produto.preco != null ? produto.preco : '-') + ' Kz</p>';
            html += '<p><strong>Estoque:</strong> ' + (produto.quantidadeEstoque != null ? produto.quantidadeEstoque : '-') + '</p>';
            html += '<p><strong>Código de Barras:</strong> ' + (produto.codigoBarra || '-') + '</p>';
            html += '<form id="addCarrinhoForm">';
            html += '<input type="hidden" name="produtoId" value="' + produto.id + '">';
            html += '<label>Quantidade:</label> <input type="number" name="quantidade" value="1" min="1" class="form-control mb-2">';
            html += '<button type="submit" class="btn btn-primary">Adicionar ao Carrinho</button>';
            html += '<div id="msgAddCarrinho" class="mt-2"></div>';
            html += '</form>';
            html += '</div></div>';
        }
        document.getElementById('modalProdutoDetalhes').innerHTML = html;
        atualizarCarrinhoModal();
        document.getElementById('finalizarCompraBtn').onclick = function() {
            window.location.href = '/finalizarVenda';
        };
        var addCarrinhoForm = document.getElementById('addCarrinhoForm');
        if (addCarrinhoForm) {
            addCarrinhoForm.onsubmit = function(e) {
                e.preventDefault();
                var form = e.target;
                var produtoId = form.produtoId.value;
                var quantidade = form.quantidade.value;
                fetch('/api/adicionarProduto', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'produtoId=' + produtoId + '&quantidade=' + quantidade
                })
                .then(response => response.json())
                .then(data => {
                    window.carrinho = data;
                    atualizarCarrinhoModal();
                    document.getElementById('msgAddCarrinho').innerHTML = '<span class="text-success">Produto adicionado ao carrinho!</span>';
                })
                .catch(() => {
                    document.getElementById('msgAddCarrinho').innerHTML = '<span class="text-danger">Erro ao adicionar ao carrinho.</span>';
                });
            };
        }
        $('#produtoModal').modal('show');
    }

    function atualizarCarrinhoModal() {
        var carrinhoHtml = '<table class="table table-bordered"><thead><tr><th>Produto</th><th>Qtd</th><th>Preço Total</th></tr></thead><tbody>';
        if (window.carrinho && window.carrinho.itens && window.carrinho.itens.length > 0) {
            window.carrinho.itens.forEach(function(item) {
                carrinhoHtml += '<tr><td>' + (item.produto.nome || '-') + '</td><td>' + (item.quantidade != null ? item.quantidade : '-') + '</td><td>' + (item.precoTotal != null ? item.precoTotal : '-') + '</td></tr>';
            });
        } else {
            carrinhoHtml += '<tr><td colspan="3" class="text-center">Carrinho vazio</td></tr>';
        }
        carrinhoHtml += '</tbody></table>';
        document.getElementById('modalCarrinho').innerHTML = carrinhoHtml;
    }
    /*]]>*/
</script>
</body>
</html>
