<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<aside th:replace="menu :: sidebar"></aside>

<main class="py-4">

<div class="container-fluid px-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">📦 Gestão de Produtos</h3>
        <a href="/produtos/novo" class="btn btn-primary shadow-sm">+ Novo Produto</a>
    </div>

    <!-- FILTROS -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form th:action="@{/produtos/listar}" method="get">
                <div class="row g-3">

                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text bg-white">🔎</span>
                            <input type="text" name="busca" class="form-control"
                                   placeholder="Buscar produtos..." th:value="${busca}">
                        </div>
                    </div>

                    <div class="col-md-4">
                        <select name="cat" class="form-select">
                            <option value="" th:selected="${categoriaSelecionada == null}">Todas categorias</option>
                            <option th:each="catObj : ${categorias}"
                                    th:value="${catObj.id}"
                                    th:text="${catObj.nome}"
                                    th:selected="${catObj.id == categoriaSelecionada}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3 d-grid">
                        <button class="btn btn-dark">Filtrar</button>
                    </div>

                </div>
            </form>
        </div>
    </div>

    <!-- TABELA -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">

            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Produto</th>
                        <th>Categoria</th>
                        <th>Código</th>
                        <th>Preço</th>
                        <th>Stock</th>
                        <th class="text-end">Ações</th>
                    </tr>
                </thead>

                <tbody id="tabela-produtos">

                <tr th:each="produto : ${produtos}"
                    th:id="'produto-' + ${produto.id}">

                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <img th:if="${produto.imagemBlob != null}"
                                 th:src="@{/produto/imagem/{id}(id=${produto.id})}"
                                 style="width:50px;height:50px;object-fit:cover;border-radius:8px;">

                            <div>
                                <div class="fw-semibold" th:text="${produto.nome}"></div>
                                <small class="text-muted" th:text="${produto.descricao}"></small>
                            </div>
                        </div>
                    </td>

                    <td th:text="${produto.categoria != null ? produto.categoria.nome : 'Sem categoria'}"></td>

                    <td th:text="${produto.codigoBarra}"></td>

                    <td>
                        <span class="badge bg-success"
                              th:text="${produto.preco} + ' Kz'"></span>
                    </td>

                    <td>
                        <span class="badge"
                              th:classappend="${produto.quantidadeEstoque < 5} ? 'bg-danger' : 'bg-primary'"
                              th:text="${produto.quantidadeEstoque}">
                        </span>
                    </td>

                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-primary"
                                data-bs-toggle="modal"
                                th:data-bs-target="${'#detalhesModal_' + produto.id}">
                            ✏️
                        </button>

                        <button class="btn btn-sm btn-outline-danger"
                                th:onclick="|apagarProduto('${produto.id}')|">
                            🗑️
                        </button>
                    </td>

                </tr>

                </tbody>
            </table>

        </div>
    </div>

</div>

<!-- MODAIS (mantive igual ao teu) -->
<div th:each="produto : ${produtos}">
    <div class="modal fade" th:id="${'detalhesModal_' + produto.id}">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <form th:action="@{/produtos/editar}" method="post"
                      enctype="multipart/form-data"
                      onsubmit="return atualizarProdutos(event, this)">

                    <div class="modal-header">
                        <h5 class="modal-title">Editar Produto</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <input type="hidden" name="id" th:value="${produto.id}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label>Nome</label>
                                <input type="text" name="nome" class="form-control"
                                       th:value="${produto.nome}" required>
                            </div>
                            <div class="col-md-6">
                                <label>Preço</label>
                                <input type="number" name="preco" class="form-control"
                                       th:value="${produto.preco}" required>
                            </div>
                            <div class="col-md-12">
                                <label>Descrição</label>
                                <textarea name="descricao" class="form-control" rows="2"
                                          th:text="${produto.descricao}" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label>Categoria</label>
                                <select name="categoriaId" class="form-select" required>
                                    <option th:each="catObj : ${categorias}"
                                            th:value="${catObj.id}"
                                            th:text="${catObj.nome}"
                                            th:selected="${produto.categoria != null && produto.categoria.id == catObj.id}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label>Stock</label>
                                <input type="number" name="quantidadeEstoque" class="form-control"
                                       th:value="${produto.quantidadeEstoque}" required>
                            </div>
                            <div class="col-md-6">
                                <label>Código de Barra</label>
                                <input type="text" name="codigoBarra" class="form-control"
                                       th:value="${produto.codigoBarra}" required>
                            </div>
                            <div class="col-md-6">
                                <label>Imagem</label>
                                <input type="file" name="imagem" class="form-control">
                            </div>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-success">Salvar</button>
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>
        <script>
        function apagarProduto(id) {
            if(confirm('Deseja realmente apagar este produto?')) {
                fetch('/produtos/apagar/' + id)
                    .then(response => {
                        if (response.redirected || response.ok) {
                            window.location.replace('/produtos/listar');
                        } else {
                            alert('Erro ao apagar produto.');
                        }
                    });
            }
}

function atualizarProdutos(event, form) {
  event.preventDefault();
  var formData = new FormData(form);
  fetch(form.action, {
    method: 'POST',
    body: formData
  }).then(response => {
    if (response.redirected || response.ok) {
      window.location.replace('/produtos/listar');
    } else {
      alert('Erro ao salvar alterações.');
    }
  });
  return false;
}

function atualizarListagemProdutos() {
  fetch('/produtos/listar-parcial')
    .then(resp => resp.text())
    .then(html => {
      document.getElementById('produtos-listagem').innerHTML = html;
      // Reaplica scripts do Bootstrap para modais
      $("[data-bs-toggle='modal']").off('click').on('click', function() {
        var target = $(this).attr('data-bs-target');
        $(target).modal('show');
      });
    });
}
        </script>

<script src="/assets/bootstrap.bundle.min.js"></script>
<script src="/assets/jquery-3.6.0.min.js"></script>
<script src="/assets/bootstrap.bundle.min.js"></script>

</main>
</body>
</html>
